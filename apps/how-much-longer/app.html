<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>还能活多久 · 网页体验版</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,300;1,500&family=Noto+Serif+SC:wght@200;300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #F8F7F4;
    --bg2: #EEECEE;
    --text: #1C1C1A;
    --text2: #9A9490;
    --accent: #C8782A;
    --danger: #C0392B;
    --border: rgba(28, 28, 26, 0.09);
    --card: rgba(248, 247, 244, 0.92);
    --serif: 'Cormorant Garamond', serif;
    --sc: 'Noto Serif SC', serif;
  }
  body.night {
    --bg: #0E0E0C;
    --bg2: #1A1A18;
    --text: #E6DDD2;
    --text2: #6A6460;
    --accent: #C8782A;
    --border: rgba(230, 221, 210, 0.09);
    --card: rgba(26, 26, 24, 0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--sc);
    background: #2a2a28;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.5s ease;
  }

  /* 手机外框 — 桌面居中，移动端全屏 */
  #phone {
    position: relative;
    width: 390px;
    height: 844px;
    max-height: 100vh;
    background: var(--bg);
    overflow: hidden;
    transition: background 0.5s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  @media (max-width: 430px) {
    body { background: var(--bg); }
    #phone { width: 100vw; height: 100vh; box-shadow: none; }
  }

  /* 同心圆背景 canvas */
  #halo {
    position: absolute;
    top: -55px;
    left: -21px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Banner ─── */
  .banner-wrap {
    position: absolute;
    top: 14px;
    left: 16px;
    right: 16px;
    z-index: 30;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .banner {
    padding: 10px 16px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 300;
    backdrop-filter: blur(8px);
    animation: fadeDown 0.5s ease;
  }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .banner.fixed {
    background: rgba(200, 120, 42, 0.12);
    border: 1px solid rgba(200, 120, 42, 0.3);
    color: var(--accent);
  }
  .banner.care {
    background: var(--card);
    border: 1px solid rgba(200, 120, 42, 0.3);
    color: var(--text);
  }
  .banner .grow { flex: 1; }
  .banner .tail { font-size: 10px; opacity: 0.75; }
  .banner.care .tail { color: var(--accent); opacity: 1; font-size: 11px; }
  .banner .warn { color: var(--accent); font-size: 14px; }

  /* ─── 硬币翻转区 ─── */
  #coin-area {
    position: absolute;
    inset: 0;
    z-index: 10;
    perspective: 1600px;
    cursor: pointer;
  }
  #coin {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  #coin.flipped { transform: rotateY(180deg); }
  .coin-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-start;
    padding: 0 36px 32px;
  }
  .coin-back { transform: rotateY(180deg); }

  .figures { opacity: 0.85; margin-bottom: 24px; }
  .divider-row {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 10px;
  }
  .divider-row .line { flex: 1; height: 1px; background: var(--border); }
  .divider-row .hint {
    font-family: var(--serif);
    font-style: italic;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text2);
    white-space: nowrap;
  }
  .big-number {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 152px;
    line-height: 0.84;
    letter-spacing: -7px;
    color: var(--text);
    margin-top: 16px;
    font-feature-settings: 'lnum' 1;
  }
  .coin-back .big-number { color: var(--text2); }
  .label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-top: 12px;
  }
  .front-label {
    font-size: 11px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .back-label {
    font-size: 11px;
    font-weight: 300;
    color: var(--text2);
    letter-spacing: 3.5px;
    margin-top: 12px;
  }
  .label-controls { display: flex; align-items: center; gap: 12px; }
  .help-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-style: italic; font-size: 13px;
    color: var(--text2); cursor: pointer;
  }
  .phase-toggle {
    font-family: var(--serif); font-style: italic; font-size: 11px;
    color: var(--text2); letter-spacing: 1.5px; cursor: pointer;
  }

  /* ─── 底部导航 ─── */
  #bottom-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 40;
    height: 76px;
    display: flex;
    background: var(--card);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    position: relative;
    padding-top: 6px;
  }
  .nav-item:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0; top: 22px; bottom: 22px;
    width: 1px;
    background: var(--border);
  }
  .nav-item .ico {
    font-family: var(--sc);
    font-size: 19px;
    font-weight: 300;
    color: var(--text2);
    transition: color 0.25s;
  }
  .nav-item .ico svg { display: block; width: 21px; height: 21px; stroke: var(--text2); fill: none; stroke-width: 1.4; transition: stroke 0.25s; }
  .nav-item .tag {
    font-family: var(--serif);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text2);
    transition: color 0.25s;
  }
  .nav-item.active .ico { color: var(--accent); }
  .nav-item.active .ico svg { stroke: var(--accent); }
  .nav-item.active .tag { color: var(--accent); }

  /* ─── 面板 (bottom sheet) ─── */
  .panel {
    position: absolute;
    inset: 0;
    z-index: 50;
    background: var(--bg);
    transform: translateY(100%);
    transition: transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex;
    flex-direction: column;
    visibility: hidden;
  }
  .panel.open { transform: translateY(0); visibility: visible; }
  .panel-header {
    padding: 28px 24px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-title {
    font-family: var(--sc);
    font-size: 19px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 1px;
  }
  .panel-subtitle {
    font-family: var(--sc);
    font-size: 11px;
    font-weight: 300;
    color: var(--text2);
    margin-top: 6px;
    letter-spacing: 0.5px;
  }
  .panel-actions { display: flex; align-items: center; gap: 4px; }
  .panel-close, .panel-act {
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text2);
  }
  .panel-close svg { width: 18px; height: 18px; }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px 40px;
    -webkit-overflow-scrolling: touch;
  }

  /* 钱包 */
  .balance-display { text-align: center; padding: 24px 0 28px; }
  .balance-label { font-size: 11px; color: var(--text2); letter-spacing: 2px; font-weight: 300; }
  .balance-value {
    font-family: var(--serif); font-style: italic; font-weight: 300;
    font-size: 64px; color: var(--text); margin-top: 6px;
    font-feature-settings: 'lnum' 1;
  }
  .section-title {
    font-family: var(--sc); font-size: 11px; font-weight: 300;
    color: var(--text2); letter-spacing: 4px; text-align: center;
    margin: 24px 0 16px;
  }

  /* 柱状图 */
  .bar-chart { display: flex; align-items: flex-end; justify-content: space-between; height: 130px; gap: 6px; padding: 0 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
  .bar-val { font-family: var(--serif); font-size: 9px; color: var(--text2); }
  .bar {
    width: 100%; max-width: 22px;
    background: var(--accent);
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    opacity: 0.85;
    transition: height 0.4s ease;
  }
  .bar.zero { background: var(--border); opacity: 1; }
  .bar-day { font-family: var(--serif); font-size: 8px; color: var(--text2); letter-spacing: 0.5px; }

  /* 通用按钮 */
  .btn-primary {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: var(--accent); color: #fff;
    font-family: var(--sc); font-size: 14px; font-weight: 400;
    cursor: pointer; letter-spacing: 1px;
  }
  .btn-ghost {
    width: 100%; padding: 13px; border: 1px solid var(--border); border-radius: 10px;
    background: transparent; color: var(--text);
    font-family: var(--sc); font-size: 13px; font-weight: 300;
    cursor: pointer; margin-top: 10px;
  }
  .input {
    width: 100%; padding: 13px 14px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--bg2); color: var(--text);
    font-family: var(--sc); font-size: 14px; font-weight: 300;
    outline: none; margin-bottom: 10px;
  }
  .input::placeholder { color: var(--text2); }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* 列表项 */
  .list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 4px; border-bottom: 1px solid var(--border);
  }
  .li-left { display: flex; flex-direction: column; gap: 3px; }
  .li-name { font-size: 14px; font-weight: 300; color: var(--text); }
  .li-meta { font-size: 11px; color: var(--text2); font-weight: 300; }
  .li-amount { font-family: var(--serif); font-size: 17px; font-style: italic; color: var(--text); }
  .li-amount.income { color: var(--accent); }
  .li-del { color: var(--danger); font-size: 11px; cursor: pointer; margin-left: 14px; }
  .day-group-date {
    font-family: var(--serif); font-size: 11px; color: var(--text2);
    letter-spacing: 1px; margin: 18px 0 4px; font-style: italic;
  }
  .empty-hint { text-align: center; color: var(--text2); font-size: 12px; font-weight: 300; padding: 30px 0; }

  /* 分类选择 */
  .cat-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .cat-chip {
    padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 13px; font-weight: 300; color: var(--text2); cursor: pointer;
    background: transparent; transition: all 0.2s;
  }
  .cat-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cat-chip .nc { font-size: 9px; opacity: 0.7; margin-left: 3px; }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; font-size: 13px; font-weight: 300; color: var(--text);
  }
  .switch { width: 44px; height: 26px; border-radius: 13px; background: var(--border); position: relative; cursor: pointer; transition: background 0.25s; flex-shrink: 0; }
  .switch.on { background: var(--accent); }
  .switch .knob { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: left 0.25s; }
  .switch.on .knob { left: 21px; }

  .seg { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
  .seg div { flex: 1; text-align: center; padding: 11px; font-size: 13px; font-weight: 300; color: var(--text2); cursor: pointer; }
  .seg div.active { background: var(--accent); color: #fff; }

  /* 生存印章海报 */
  .seal-poster {
    background: var(--bg);
    padding: 50px 30px 30px;
    display: flex; flex-direction: column; align-items: center;
    position: relative;
    min-height: 560px;
  }
  .seal-head1 { font-family: var(--serif); font-size: 16px; font-weight: 600; letter-spacing: 5px; color: var(--text); }
  .seal-head2 { font-family: var(--sc); font-size: 11px; font-weight: 300; letter-spacing: 3px; color: var(--text2); margin-top: 4px; }
  .seal-bignum {
    font-family: var(--serif); font-style: italic; font-weight: 300;
    font-size: 180px; line-height: 0.82; letter-spacing: -10px;
    color: var(--accent); opacity: 0.25; margin: 36px 0;
    font-feature-settings: 'lnum' 1;
  }
  .seal-quote {
    font-family: var(--serif); font-style: italic; font-size: 18px; font-weight: 300;
    line-height: 1.8; color: var(--text2); text-align: center; padding: 0 10px;
  }
  .seal-author { font-family: var(--serif); font-style: italic; font-size: 13px; font-weight: 300; color: var(--text2); opacity: 0.6; margin-top: 12px; }
  .seal-date { font-family: var(--serif); font-size: 14px; font-weight: 300; color: var(--text2); margin-top: 50px; }
  .seal-footer { display: flex; align-items: flex-end; justify-content: space-between; width: 100%; margin-top: 40px; }
  .seal-stamp {
    width: 58px; height: 58px; border-radius: 50%; border: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .seal-stamp .s1 { font-family: var(--sc); font-size: 17px; font-weight: 300; color: var(--text2); }
  .seal-stamp .s2 { font-family: var(--sc); font-size: 7px; font-weight: 300; letter-spacing: 2.5px; color: var(--text2); }
  .seal-status { text-align: right; }
  .seal-status .t1 { font-family: var(--serif); font-size: 9px; letter-spacing: 2.5px; color: var(--text2); }
  .seal-status .t2 { font-family: var(--serif); font-size: 8px; letter-spacing: 1.5px; color: var(--text2); opacity: 0.7; margin-top: 2px; }
  .seal-status .t3 { font-family: var(--serif); font-style: italic; font-size: 16px; color: var(--text); margin-top: 4px; }

  /* ─── Modal ─── */
  #modal-layer {
    position: absolute; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.32);
    display: none; align-items: center; justify-content: center;
    padding: 0 36px;
  }
  #modal-layer.show { display: flex; }
  .modal-card {
    background: var(--card); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 26px 24px; width: 100%; max-width: 320px;
    animation: popIn 0.25s ease;
  }
  @keyframes popIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
  .modal-title { font-family: var(--sc); font-size: 15px; font-weight: 400; color: var(--text); text-align: center; line-height: 1.9; }
  .modal-text { font-family: var(--sc); font-size: 13px; font-weight: 300; color: var(--text2); text-align: center; margin-top: 8px; line-height: 1.7; }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .modal-actions button {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-family: var(--sc); font-size: 13px; cursor: pointer;
  }
  .modal-btn-cancel { background: var(--bg2); color: var(--text2); }
  .modal-btn-ok { background: var(--accent); color: #fff; }

  /* ─── Toast ─── */
  #toast {
    position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    z-index: 200;
    background: var(--text); color: var(--bg);
    padding: 11px 20px; border-radius: 22px;
    font-family: var(--sc); font-size: 12px; font-weight: 300;
    opacity: 0; transition: all 0.3s ease; pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 0.95; transform: translateX(-50%) translateY(0); }

  /* 演示水印徽标 */
  #demo-badge {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 25; font-family: var(--serif); font-style: italic;
    font-size: 10px; letter-spacing: 2px; color: var(--text2); opacity: 0.5;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="phone">
  <canvas id="halo" width="439" height="588"></canvas>
  <div id="demo-badge">DEMO · 网页体验版</div>

  <!-- Banner -->
  <div class="banner-wrap" id="banner-wrap"></div>

  <!-- 硬币翻转区 -->
  <div id="coin-area">
    <div id="coin">
      <div class="coin-face coin-front">
        <svg class="figures" width="110" height="135" viewBox="0 0 110 135"></svg>
        <div class="divider-row"><div class="line"></div><div class="hint">轻触翻面</div><div class="line"></div></div>
        <div class="big-number" id="front-num">100</div>
        <div class="label-row">
          <div class="front-label">还能活的天数</div>
          <div class="label-controls">
            <div class="help-btn" id="help-btn">?</div>
            <div class="phase-toggle" id="phase-toggle">— 白天 —</div>
          </div>
        </div>
      </div>
      <div class="coin-face coin-back">
        <svg class="figures figures-back" width="110" height="135" viewBox="0 0 110 135"></svg>
        <div class="divider-row"><div class="line"></div><div class="hint">轻触翻面</div><div class="line"></div></div>
        <div class="big-number" id="back-num">1</div>
        <div class="back-label">已存活天数</div>
      </div>
    </div>
  </div>

  <!-- 面板们 -->
  <div class="panel" id="panel-wallet"></div>
  <div class="panel" id="panel-fixed"></div>
  <div class="panel" id="panel-flow"></div>
  <div class="panel" id="panel-seal"></div>
  <div class="panel" id="panel-settings"></div>

  <!-- 底部导航 -->
  <div id="bottom-nav">
    <div class="nav-item" data-panel="panel-wallet"><div class="ico">钱</div><div class="tag">My Wallet</div></div>
    <div class="nav-item" data-panel="panel-fixed"><div class="ico">定</div><div class="tag">Fixed</div></div>
    <div class="nav-item" data-panel="panel-flow"><div class="ico">转</div><div class="tag">Flow</div></div>
    <div class="nav-item" data-panel="panel-seal"><div class="ico">印</div><div class="tag">Seal</div></div>
    <div class="nav-item" data-panel="panel-settings"><div class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div><div class="tag">Settings</div></div>
  </div>

  <!-- Modal & Toast -->
  <div id="modal-layer"><div class="modal-card" id="modal-card"></div></div>
  <div id="toast"></div>
</div>

<script>
"use strict";

/* ════════════════ 格言数据 ════════════════ */
const QUOTES = [
  ["应当想象西西弗斯是幸福的。","加缪"],["今天是你剩余人生的第一天。","查尔斯·狄龙"],

/* ════════════════ 同心圆背景 ════════════════ */
const LIGHT_COLORS = ['#EBECED','#B8BBBE','#D0D2D4','#BEC1C4','#D4D6D8','#C4C7CA','#D8DADC','#CACCCE','#DCDDDF','#D0D2D4','#E2E3E5','#D8D9DB','#E8E9EA','#E0E1E2','#EEEEEF','#F4F4F5','#FAFAFB'];
const DARK_COLORS = ['#0A0A0A','#1E1E1E','#101010','#222222','#131313','#262626','#161616','#2B2B2B','#1A1A1A','#303030','#1E1E1E','#363636','#242424','#3E3E3E','#2C2C2C','#484848','#555555'];
const STOPS = [0.0,0.30,0.37,0.42,0.48,0.53,0.58,0.63,0.68,0.72,0.77,0.81,0.85,0.89,0.93,0.97,1.0];

function drawHalo(isDark) {
  const canvas = document.getElementById('halo');
  const ctx = canvas.getContext('2d');
  const W = 439, H = 588;
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H * 0.38;
  const maxR = Math.max(W, H) * 0.85;
  const colors = isDark ? DARK_COLORS : LIGHT_COLORS;

  // 离屏图层用于底部 alpha 遮罩 (等效 saveLayer + dstIn)
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');

  // 环渐变
  const ring = octx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
  for (let i = 0; i < STOPS.length; i++) ring.addColorStop(STOPS[i], colors[i]);
  octx.fillStyle = ring;
  octx.fillRect(0, 0, W, H);

  // 中心高光
  if (!isDark) {
    const g = octx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.30);
    g.addColorStop(0.0, 'rgba(255,255,255,0.95)');
    g.addColorStop(0.3, 'rgba(255,255,255,0.5)');
    g.addColorStop(0.65, 'rgba(255,255,255,0.12)');
    g.addColorStop(1.0, 'rgba(255,255,255,0)');
    octx.fillStyle = g;
    octx.beginPath(); octx.arc(cx, cy, maxR * 0.30, 0, Math.PI * 2); octx.fill();
  } else {
    const g = octx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.35);
    g.addColorStop(0.0, 'rgba(255,255,255,0.40)');
    g.addColorStop(0.3, 'rgba(255,255,255,0.20)');
    g.addColorStop(0.65, 'rgba(255,255,255,0.06)');
    g.addColorStop(1.0, 'rgba(255,255,255,0)');
    octx.fillStyle = g;
    octx.beginPath(); octx.arc(cx, cy, maxR * 0.35, 0, Math.PI * 2); octx.fill();
  }

  // 底部 alpha 遮罩
  octx.globalCompositeOperation = 'destination-in';
  const mask = octx.createLinearGradient(0, H * 0.48, 0, H * 0.78);
  mask.addColorStop(0, 'rgba(0,0,0,1)');
  mask.addColorStop(1, 'rgba(0,0,0,0)');
  octx.fillStyle = mask;
  octx.fillRect(0, 0, W, H);

  ctx.drawImage(off, 0, 0);
}

/* ════════════════ 计算 (E₇ 算法) ════════════════ */
function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

function getAvgDailyExpense() {
  const cutoff = startOfDay(today);
  cutoff.setDate(cutoff.getDate() - 6); // 近7天含今天
  let sum = 0;
  for (const e of state.expenses) {
    if (!e.countedInAvg) continue;
    if (startOfDay(e.date) >= cutoff) sum += e.amount;
  }
  return Math.max(50, sum / 7);
}
function getRemainingDays() { return Math.floor(state.balance / getAvgDailyExpense()); }
function getSurvivedDays() {
  const diff = startOfDay(today) - startOfDay(state.firstUseDate);
  return Math.max(1, Math.floor(diff / 86400000) + 1);
}
function getLargeThreshold() { return 5 * getAvgDailyExpense(); }

function getPendingFixedExpenses() {
  return state.fixedExpenses.filter(f =>
    f.dueDay === today.getDate() && !state.confirmedFixedThisMonth.includes(f.id)
  );
}

/* ════════════════ 渲染：硬币 + Banner ════════════════ */
function fmtMoney(n) {
  return '¥' + Math.round(n).toLocaleString('en-US');
}

function renderCoin() {
  document.getElementById('front-num').textContent = getRemainingDays();
  document.getElementById('back-num').textContent = getSurvivedDays();
}

function renderBanners() {
  const wrap = document.getElementById('banner-wrap');
  wrap.innerHTML = '';

  const pending = getPendingFixedExpenses();
  if (pending.length > 0) {
    const total = pending.reduce((s, f) => s + f.amount, 0);
    const b = document.createElement('div');
    b.className = 'banner fixed';
    b.innerHTML = '<span class="warn">⚠</span><span class="grow">' +
      pending.length + '笔固定支出待确认（共计 ' + fmtMoney(total) + '）</span>' +
      '<span class="tail">立即确认</span>';
    b.onclick = showFixedConfirmDialog;
    wrap.appendChild(b);
  }

  if (state.daysSinceLastRecord >= 3) {
    const b = document.createElement('div');
    b.className = 'banner care';
    b.innerHTML = '<span class="grow">已经' + state.daysSinceLastRecord +
      '天没记账了，一切还好吗？</span><span class="tail">去记一笔 →</span>';
    b.onclick = () => openPanel('panel-flow');
    wrap.appendChild(b);
  }
}

function applyTheme() {
  document.body.classList.toggle('night', state.isNight);
  document.getElementById('phase-toggle').textContent = state.isNight ? '— 夜晚 —' : '— 白天 —';
  drawHalo(state.isNight);
  paintFigures(document.querySelector('.coin-front .figures'), getCss('--text'));
  paintFigures(document.querySelector('.coin-back .figures'), getCss('--text2'));
  document.getElementById('halo').style.opacity = HALO_OPACITY;
}
function getCss(name) {
  return getComputedStyle(document.body).getPropertyValue(name).trim();
}

}

/* ════════════════ 面板导航 ════════════════ */
function openPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
  document.getElementById(id).classList.add('open');
  state.activePanel = id;
  document.querySelectorAll('.nav-item').forEach(n =>
    n.classList.toggle('active', n.dataset.panel === id));
  renderPanel(id);
}
function closePanel() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  state.activePanel = null;
}
document.querySelectorAll('.nav-item').forEach(n => {
  n.addEventListener('click', () => {
    if (state.activePanel === n.dataset.panel) closePanel();
    else openPanel(n.dataset.panel);
  });
});

const CLOSE_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="transform:rotate(45deg)"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';

function panelHeader(title, subtitle, actionHtml) {

function renderPanel(id) {

/* ════════════════ 近7天数据（柱状图通用） ════════════════ */
function last7DaysData(onlyExpense) {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = startOfDay(today);
    d.setDate(d.getDate() - i);
    let val = 0;
    for (const e of state.expenses) {
      if (startOfDay(e.date).getTime() === d.getTime()) val += e.amount;
    }
    if (!onlyExpense) {
      for (const inc of state.incomes) {
        if (startOfDay(inc.date).getTime() === d.getTime()) val += inc.amount;
      }
    }
    days.push({ date: d, val });
  }
  return days;
}
function barChartHtml(onlyExpense) {
  const data = last7DaysData(onlyExpense);
  const maxV = Math.max(1, ...data.map(d => d.val));
  let html = '<div class="bar-chart">';
  for (const d of data) {
    const h = d.val > 0 ? Math.max(4, (d.val / maxV) * 110) : 2;
    html += '<div class="bar-col">' +
      '<div class="bar-val">' + (d.val > 0 ? Math.round(d.val) : '') + '</div>' +
      '<div class="bar' + (d.val > 0 ? '' : ' zero') + '" style="height:' + h + 'px"></div>' +
      '<div class="bar-day">' + (d.date.getMonth() + 1) + '/' + d.date.getDate() + '</div>' +
      '</div>';
  }
  return html + '</div>';
}

/* ════════════════ 钱包面板 (C-01~04) ════════════════ */

}
function incomeListHtml() {

function showIncomeDialog() {
  showModal(

    '<input class="input" id="inc-amount" type="number" inputmode="decimal" placeholder="金额" />' +

function addIncome() {

function delIncome(id) {

  refreshAll(); toast('已删除');
}

/* ════════════════ 固定支出面板 (F-01~03) ════════════════ */

}
function fixedListHtml() {

    '<div class="list-item"><div class="li-left">' +

}
let _fxCycle = '月';
function showFixedDialog() {
  _fxCycle = '月';
  showModal(
    '<div class="modal-title">添加固定支出</div>' +
    '<div style="margin-top:18px">' +
    '<input class="input" id="fx-name" placeholder="名称，如：房租" />' +
    '<input class="input" id="fx-amount" type="number" inputmode="decimal" placeholder="金额" />' +
    '<div class="seg" id="fx-seg">' +
      '<div class="active" data-c="月" onclick="pickCycle(this)">每月</div>' +
      '<div data-c="周" onclick="pickCycle(this)">每周</div>' +
      '<div data-c="年" onclick="pickCycle(this)">每年</div></div>' +
    '<input class="input" id="fx-day" type="number" inputmode="numeric" placeholder="扣款日（几号）" />' +
    '<div style="font-size:11px;color:var(--text2);font-weight:300;margin:-4px 0 4px 4px">将从下一个扣款日开始计入</div>' +
    '</div>' +
    '<div class="modal-actions"><button class="modal-btn-cancel" onclick="closeModal()">取消</button>' +
    '<button class="modal-btn-ok" onclick="addFixed()">确认</button></div>'
  );
}
function pickCycle(elm) {
  _fxCycle = elm.dataset.c;
  document.querySelectorAll('#fx-seg div').forEach(d => d.classList.toggle('active', d === elm));
}
function addFixed() {
  const name = document.getElementById('fx-name').value.trim();
  const amt = parseFloat(document.getElementById('fx-amount').value);
  const day = parseInt(document.getElementById('fx-day').value, 10);
  if (!name) { toast('请输入名称'); return; }
  if (!amt || amt <= 0) { toast('请输入有效金额'); return; }
  const dueDay = (day && day >= 1 && day <= 31) ? day : 1;
  state.fixedExpenses.push({ id: nextId(), name, amount: amt, cycle: _fxCycle, dueDay });
  closeModal(); refreshAll();
  toast('已添加，将从下一个扣款日开始计入');
}
function delFixed(id) {
  state.fixedExpenses = state.fixedExpenses.filter(f => f.id !== id);
  refreshAll(); toast('已删除');
}

/* H-06 固定支出到期确认弹窗 */
function showFixedConfirmDialog() {
  const pending = getPendingFixedExpenses();
  if (pending.length === 0) return;
  const total = pending.reduce((s, f) => s + f.amount, 0);
  let rows = pending.map(f =>
    '<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;font-weight:300">' +
    '<span>' + f.name + '</span><span>' + fmtMoney(f.amount) + ' / ' + f.cycle + '</span></div>'
  ).join('');
  showModal(
    '<div class="modal-title">固定支出到期确认</div>' +
    '<div class="modal-text">以下 ' + pending.length + ' 笔固定支出已到期，确认扣减？</div>' +
    '<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px">' + rows +
    '<div style="display:flex;justify-content:space-between;border-top:1px solid var(--border);margin-top:6px;padding-top:8px;font-size:13px">' +
    '<span>合计</span><span style="font-family:var(--serif);font-size:16px;color:var(--accent)">' + fmtMoney(total) + '</span></div></div>' +
    '<div class="modal-actions"><button class="modal-btn-cancel" onclick="closeModal()">暂不确认</button>' +
    '<button class="modal-btn-ok" onclick="confirmFixedDeduct()">确认扣减</button></div>'
  );
}
function confirmFixedDeduct() {
  const pending = getPendingFixedExpenses();
  const total = pending.reduce((s, f) => s + f.amount, 0);
  for (const f of pending) {
    state.expenses.push({
      id: nextId(), amount: f.amount, category: '固定支出',
      note: f.name, countedInAvg: false, date: new Date(),
    });
    state.balance -= f.amount;
    state.confirmedFixedThisMonth.push(f.id);
  }
  closeModal(); refreshAll();
  toast('已确认扣减 ' + fmtMoney(total));
}

/* ════════════════ 每日流转面板 (Z-01~06) ════════════════ */
let _flowCat = null;       // 当前选中分类 name
let _flowBackfill = 0;     // 补记天数偏移 0=今天
function renderFlow() {
  const el = document.getElementById('panel-flow');
  if (_flowCat === null) _flowCat = state.categories[0].name;
  el.innerHTML = panelHeader('每日流转', '「花了什么记下来，哪些影响节奏你说了算。」') +
    '<div class="panel-body">' +
      '<input class="input" id="flow-amount" type="number" inputmode="decimal" placeholder="金额" />' +
      '<div class="cat-row" id="flow-cats">' +
        state.categories.map(c =>
          '<div class="cat-chip' + (c.name === _flowCat ? ' active' : '') + '" data-cat="' + c.name + '" onclick="pickCat(this)">' +
          c.name + (c.counted ? '' : '<span class="nc">不计入</span>') + '</div>'
        ).join('') +
      '</div>' +
      '<input class="input" id="flow-note" placeholder="备注..." />' +
      '<div style="display:flex;gap:8px;margin-bottom:6px">' +
        '<button class="cat-chip' + (_flowBackfill === 0 ? ' active' : '') + '" onclick="setBackfill(0)">今天</button>' +
        '<button class="cat-chip' + (_flowBackfill === 1 ? ' active' : '') + '" onclick="setBackfill(1)">昨天</button>' +
        '<button class="cat-chip' + (_flowBackfill === 2 ? ' active' : '') + '" onclick="setBackfill(2)">2天前</button>' +
        '<button class="cat-chip' + (_flowBackfill === 3 ? ' active' : '') + '" onclick="setBackfill(3)">3天前</button>' +
      '</div>' +
      '<button class="btn-primary" onclick="addExpense()">记下</button>' +
      '<div style="display:flex;gap:8px;margin-top:10px">' +
        '<button class="btn-ghost" style="margin-top:0" onclick="fakeOcr(\'拍照\')">拍照记账</button>' +
        '<button class="btn-ghost" style="margin-top:0" onclick="fakeOcr(\'截图\')">截图识别</button>' +
      '</div>' +
      '<div class="section-title">近 7 天 支 出</div>' +
      barChartHtml(true) +
      '<div class="section-title">历 史 记 录</div>' +
      expenseHistoryHtml() +
    '</div>';
}
function pickCat(elm) {
  _flowCat = elm.dataset.cat;
  document.querySelectorAll('#flow-cats .cat-chip').forEach(c =>
    c.classList.toggle('active', c === elm));
}
function setBackfill(n) { _flowBackfill = n; renderFlow(); }
function fakeOcr(kind) {
  toast(kind + '识别为 App 专属功能，网页版请手动输入');
}
function addExpense() {
  const amt = parseFloat(document.getElementById('flow-amount').value);
  const note = document.getElementById('flow-note').value.trim();
  if (!amt || amt <= 0) { toast('请输入有效金额'); return; }
  const cat = state.categories.find(c => c.name === _flowCat) || state.categories[0];
  const d = startOfDay(today);
  d.setDate(d.getDate() - _flowBackfill);
  d.setHours(12, 0, 0, 0);

  // C-03 大额支出判定
  const threshold = getLargeThreshold();
  if (amt > threshold && cat.counted) {
    pendingExpenseDraft = { amount: amt, category: cat.name, note, date: d };
    showLargeExpenseDialog(amt);
    return;
  }
  commitExpense({ amount: amt, category: cat.name, note, countedInAvg: cat.counted, date: d });
}
let pendingExpenseDraft = null;
function showLargeExpenseDialog(amt) {
  showModal(
    '<div class="modal-title">大额支出提示</div>' +
    '<div class="modal-text">这笔 ' + fmtMoney(amt) + ' 的支出数额较大，是否不计入日均消费计算？</div>' +
    '<div class="modal-actions" style="flex-direction:column;gap:8px">' +
    '<button class="modal-btn-ok" style="width:100%" onclick="resolveLarge(false)">不计入日均（保护天数不瞬间崩塌）</button>' +
    '<button class="modal-btn-cancel" style="width:100%" onclick="resolveLarge(true)">正常计入日均</button></div>'
  );
}
function resolveLarge(counted) {
  if (!pendingExpenseDraft) return;
  commitExpense({ ...pendingExpenseDraft, countedInAvg: counted });
  pendingExpenseDraft = null;
}
function commitExpense(e) {
  state.expenses.push({ id: nextId(), ...e });
  state.balance -= e.amount;
  state.daysSinceLastRecord = 0; // 记账后关怀 Banner 消失
  closeModal(); refreshAll();
  toast(e.countedInAvg ? '已记一笔' : '已记一笔（不计入日均）');
}
function delExpense(id) {
  const e = state.expenses.find(x => x.id === id);
  if (e) { state.balance += e.amount; state.expenses = state.expenses.filter(x => x.id !== id); }
  refreshAll(); toast('已删除');
}
function fmtDate(d) {
  const m = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][d.getMonth()];
  return m + ' ' + String(d.getDate()).padStart(2, '0');
}
function expenseHistoryHtml() {
  if (state.expenses.length === 0) return '<div class="empty-hint">暂无记录</div>';
  // 按日期分组
  const groups = {};
  for (const e of state.expenses) {
    const key = startOfDay(e.date).getTime();
    (groups[key] = groups[key] || []).push(e);
  }
  const keys = Object.keys(groups).map(Number).sort((a, b) => b - a);
  let html = '';
  for (const k of keys) {
    const d = new Date(k);
    html += '<div class="day-group-date">' + fmtDate(d) + '</div>';
    for (const e of groups[k]) {
      html += '<div class="list-item"><div class="li-left">' +
        '<div class="li-name">' + (e.note || e.category) + '</div>' +
        '<div class="li-meta">' + e.category + (e.countedInAvg ? '' : ' · 不计入日均') + '</div></div>' +
        '<div style="display:flex;align-items:center">' +
        '<div class="li-amount">' + fmtMoney(e.amount) + '</div>' +
        '<span class="li-del" onclick="delExpense(\'' + e.id + '\')">删除</span></div></div>';
    }
  }
  return html;
}
