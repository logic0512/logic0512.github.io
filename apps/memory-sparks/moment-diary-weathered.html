<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>重要时刻 · 做旧回忆簿</title>
<style>
  :root{
    --paper:#e8dabb; --paper-2:#e0cfa9; --paper-3:#d6c294;
    --ink:#534427; --ink-soft:#8a744d;
    --seal:#8a4233; --seal-2:#6e3326; --accent:#9a6a2e;
    --line:rgba(120,90,52,.26);
    --leather:#5a4129; --leather-2:#3f2c1a; --leather-edge:#2c1d10;
    --tape:rgba(214,196,150,.5);
    --hand-cn:'Kaiti SC','STKaiti','Songti SC',serif;
    --serif:'Songti SC','Source Han Serif SC','STSong',serif;
    --hand-en:'Snell Roundhand','Brush Script MT',cursive;
    --body:'PingFang SC',-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1); --LH:34px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--body);overflow:hidden;
    background:radial-gradient(ellipse 100% 90% at 50% 26%,#6b5538 0%,#4d3b24 60%,#352616 100%);
    display:flex;align-items:center;justify-content:center;}
  .hint{position:fixed;top:20px;left:0;right:0;text-align:center;z-index:40;font-size:12px;letter-spacing:.14em;color:rgba(230,210,170,.8);pointer-events:none;transition:opacity .4s ease;}
  .hint b{color:#f0dcae;}

  .stage{position:relative;width:min(95vw,1000px);height:min(85vh,640px);perspective:2400px;z-index:10;}

  /* ── 封面：旧皮 + 贴片相片 + 火漆 ── */
  .cover{position:absolute;inset:0;margin:auto;width:50%;height:97%;left:0;right:0;cursor:pointer;z-index:20;overflow:hidden;
    border-radius:5px 11px 11px 5px;
    background:linear-gradient(135deg,#5e4429 0%,#4a3520 55%,#382611 100%);
    box-shadow:0 34px 80px rgba(30,20,8,.65),inset 0 0 0 1px rgba(255,225,170,.1);
    transform-origin:left center;transition:transform 1s var(--ease),opacity .5s ease .45s;}
  /* 皮纹 + 做旧暗角 */
  .cover::before{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
    box-shadow:inset 0 0 80px 20px rgba(20,12,4,.6), inset 0 0 0 1px rgba(0,0,0,.3);}
  .cover::after{content:'';position:absolute;inset:0;opacity:.5;mix-blend-mode:overlay;pointer-events:none;z-index:1;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.5' numOctaves='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");}
  .cover .stitch{position:absolute;inset:16px;border-radius:6px;border:1.5px dashed rgba(225,200,150,.4);z-index:2;}
  /* 贴片相片 */
  .cover .plate{position:absolute;top:21%;left:50%;transform:translateX(-50%) rotate(-2.5deg);width:62%;z-index:3;
    background:#efe2c6;padding:12px 12px 14px;border-radius:2px;box-shadow:0 14px 30px rgba(0,0,0,.45);}
  .cover .plate img{width:100%;display:block;border-radius:1px;filter:sepia(.45) saturate(.85) contrast(.96) brightness(.96);}
  .cover .plate .pcorner{position:absolute;width:18px;height:18px;border:0;}
  .cover .plate .c1{top:4px;left:4px;border-top:2px solid #b89a5e;border-left:2px solid #b89a5e;}
  .cover .plate .c2{top:4px;right:4px;border-top:2px solid #b89a5e;border-right:2px solid #b89a5e;}
  .cover .plate .c3{bottom:4px;left:4px;border-bottom:2px solid #b89a5e;border-left:2px solid #b89a5e;}
  .cover .plate .c4{bottom:4px;right:4px;border-bottom:2px solid #b89a5e;border-right:2px solid #b89a5e;}
  /* 封面标签 */
  .cover .label{position:absolute;bottom:13%;left:50%;transform:translateX(-50%) rotate(-1deg);z-index:4;
    background:#e7d8b5;padding:10px 26px;border-radius:2px;box-shadow:0 8px 18px rgba(0,0,0,.4);text-align:center;}
  .cover .label .zh{font-family:var(--serif);font-weight:700;font-size:23px;letter-spacing:.22em;color:#4a3a22;padding-left:.22em;}
  .cover .label .en{font-family:var(--hand-en);font-size:14px;color:#8a744d;margin-top:3px;}
  /* 火漆封 */
  .cover .wax{position:absolute;bottom:8%;right:16%;width:54px;height:54px;border-radius:50%;z-index:5;
    background:radial-gradient(circle at 38% 34%,#a84f3c,#7a3022 70%,#5e2418);
    box-shadow:0 6px 14px rgba(0,0,0,.45),inset 0 2px 4px rgba(255,180,150,.4),inset 0 -3px 6px rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;color:rgba(255,220,200,.5);font-family:var(--serif);font-size:22px;transform:rotate(-6deg);}
  .cover .open-tip{position:absolute;bottom:18px;left:0;right:0;text-align:center;font-size:11px;color:rgba(230,205,160,.75);letter-spacing:.22em;z-index:6;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
  .stage.open .cover{transform:rotateY(-160deg);opacity:0;pointer-events:none;}

  /* ── 内页 ── */
  .spread{position:absolute;inset:0;border-radius:9px;display:flex;padding:13px;
    background:linear-gradient(180deg,#43301c,#2c1d10);box-shadow:0 40px 90px rgba(30,20,8,.6);
    opacity:0;transform:scale(.96);pointer-events:none;transition:opacity .6s ease .55s,transform .6s var(--ease) .55s;}
  .stage.open .spread{opacity:1;transform:scale(1);pointer-events:auto;}
  .book{position:relative;flex:1;display:flex;border-radius:3px;overflow:hidden;box-shadow:inset 0 0 50px rgba(40,25,8,.5);}
  .book::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:46px;transform:translateX(-50%);z-index:6;pointer-events:none;
    background:linear-gradient(90deg,rgba(60,38,16,0),rgba(60,38,16,.38) 45%,rgba(60,38,16,.38) 55%,rgba(60,38,16,0));}

  .page{position:relative;width:50%;height:100%;overflow:hidden;
    background:
      radial-gradient(circle at 28% 30%, transparent 30px, rgba(130,85,40,.09) 32px, rgba(130,85,40,.12) 34px, transparent 37px),
      radial-gradient(circle at 76% 68%, transparent 22px, rgba(120,75,35,.08) 24px, rgba(120,75,35,.11) 26px, transparent 29px),
      radial-gradient(ellipse 44% 32% at 18% 22%, rgba(150,105,50,.14), transparent 60%),
      radial-gradient(ellipse 38% 30% at 82% 78%, rgba(140,95,45,.16), transparent 60%),
      linear-gradient(160deg,var(--paper),var(--paper-2) 60%,var(--paper-3));}
  /* 焦边暗角 + 茶渍噪点 */
  .page::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
    box-shadow:inset 0 0 60px 8px rgba(90,55,20,.4);}
  .page::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:1;opacity:.85;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.5' numOctaves='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/></svg>");}
  .page.left{box-shadow:inset -22px 0 34px -18px rgba(70,42,16,.55), inset 26px 30px 60px -34px rgba(90,55,20,.5);}
  .page.right{box-shadow:inset 22px 0 34px -18px rgba(70,42,16,.55), inset -26px 30px 60px -34px rgba(90,55,20,.5);}
  .page-inner{position:relative;z-index:3;height:100%;padding:34px 38px;display:flex;flex-direction:column;}
  .pageno{position:absolute;bottom:14px;font-family:var(--serif);font-size:13px;color:var(--ink-soft);z-index:4;font-style:italic;}
  .page.left .pageno{left:38px;} .page.right .pageno{right:38px;}

  /* 邮戳日期 */
  .stamp{align-self:flex-start;font-family:var(--serif);font-size:13px;letter-spacing:.12em;color:var(--seal);
    border:2px solid var(--seal);border-radius:3px;padding:5px 12px;transform:rotate(-3.5deg);font-variant-numeric:tabular-nums;
    position:relative;z-index:5;opacity:.82;box-shadow:inset 0 0 0 1px rgba(138,66,51,.4);text-shadow:0 0 1px rgba(138,66,51,.3);}
  .stamp small{font-family:var(--hand-cn);font-size:12px;color:var(--ink-soft);margin-left:7px;letter-spacing:.05em;}

  .write{flex:1;margin-top:16px;font-family:var(--hand-cn);font-size:18px;line-height:var(--LH);color:var(--ink);
    outline:none;letter-spacing:.02em;overflow-y:auto;
    background-image:repeating-linear-gradient(180deg,transparent 0 calc(var(--LH) - 1px),var(--line) calc(var(--LH) - 1px) var(--LH));
    background-attachment:local;background-position:0 0;}
  .write:empty::before{content:'今天想记下点什么……';color:var(--ink-soft);opacity:.55;}

  .rslot{margin:auto;width:178px;height:128px;border-radius:4px;border:2px dashed rgba(120,90,52,.45);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--ink-soft);
    background:rgba(255,250,235,.12);transition:all .3s var(--ease);position:relative;z-index:2;}
  .rslot:hover{border-color:var(--seal);color:var(--seal);transform:scale(1.03);}
  .rslot .ic{font-size:20px;} .rslot .t{font-family:var(--hand-cn);font-size:14px;} .rslot .t2{font-family:var(--hand-en);font-size:12px;opacity:.7;}
  .rnote{font-family:var(--hand-cn);font-size:15px;color:var(--ink-soft);text-align:center;margin-top:8px;outline:none;position:relative;z-index:2;}
  .rnote:empty::before{content:'写一句…';opacity:.5;}

  /* 照片：泛黄旧相片 + 旧胶带 */
  .photolayer{position:absolute;inset:0;z-index:20;pointer-events:none;}
  .photo{position:absolute;background:#f0e4c8;padding:8px 8px 8px;border-radius:1px;box-shadow:0 12px 26px rgba(50,30,10,.42);
    cursor:grab;transition:box-shadow .18s;pointer-events:auto;user-select:none;-webkit-user-select:none;}
  .photo:hover{box-shadow:0 18px 36px rgba(50,30,10,.52);}
  .photo img{display:block;border-radius:0;background:#cdbf9a;filter:sepia(.35) saturate(.9) contrast(.97);pointer-events:none;}
  .photo .cap{font-family:var(--hand-en);font-size:15px;color:#5b4a33;text-align:center;padding:6px 2px 2px;outline:none;min-height:14px;}
  .photo .cap:empty::before{content:'caption…';color:#a9926a;font-size:12px;}
  .photo .tape{position:absolute;top:-11px;left:50%;width:60px;height:22px;transform:translateX(-50%) rotate(-3deg);
    background:var(--tape);box-shadow:0 2px 5px rgba(0,0,0,.12);
    background-image:repeating-linear-gradient(45deg,rgba(150,120,70,.18) 0 4px,transparent 4px 8px);}
  .photo .del{position:absolute;top:-9px;right:-9px;width:21px;height:21px;border-radius:50%;border:0;background:var(--seal);color:#f0dcae;font-size:12px;cursor:pointer;opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;z-index:3;}
  .photo:hover .del{opacity:1;}

  /* 目录 */
  .toc-head{font-family:var(--serif);font-weight:700;font-size:24px;color:var(--ink);letter-spacing:.1em;}
  .toc-head .en{font-family:var(--hand-en);font-size:18px;color:var(--seal);margin-left:12px;font-weight:400;}
  .toc-rule{height:2px;background:var(--seal);width:54px;margin:9px 0 18px;opacity:.7;}
  .toc-list{list-style:none;overflow-y:auto;flex:1;}
  .toc-item{display:flex;align-items:baseline;gap:10px;padding:11px 4px;cursor:pointer;border-bottom:1px dashed rgba(120,90,52,.3);}
  .toc-item:hover{background:rgba(138,66,51,.07);}
  .toc-date{font-family:var(--serif);font-size:12.5px;color:var(--ink-soft);width:74px;flex-shrink:0;font-variant-numeric:tabular-nums;}
  .toc-prev{font-family:var(--hand-cn);font-size:15px;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .toc-pg{font-family:var(--serif);font-size:13px;color:var(--ink-soft);flex-shrink:0;font-style:italic;}
  .toc-empty{font-family:var(--hand-cn);color:var(--ink-soft);font-size:15px;margin-top:20px;line-height:2;}
  .wax2{margin:24px auto 0;width:64px;height:64px;border-radius:50%;
    background:radial-gradient(circle at 38% 34%,#a84f3c,#7a3022 70%,#5e2418);
    box-shadow:0 6px 14px rgba(0,0,0,.3),inset 0 2px 4px rgba(255,180,150,.4),inset 0 -3px 6px rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;color:rgba(255,220,200,.55);font-family:var(--serif);font-size:26px;transform:rotate(-5deg);}

  .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:30;width:40px;height:40px;border-radius:50%;border:1px solid rgba(138,66,51,.4);
    background:rgba(231,216,181,.85);backdrop-filter:blur(4px);color:var(--seal);font-size:19px;cursor:pointer;
    box-shadow:0 6px 16px rgba(40,25,8,.4);transition:all .25s var(--ease);display:flex;align-items:center;justify-content:center;}
  .nav:hover{background:#efe2c6;transform:translateY(-50%) scale(1.1);}
  .nav.prev{left:-5px;} .nav.next{right:-5px;}

  .leaf{position:absolute;top:13px;bottom:13px;width:calc(50% - 13px);z-index:25;pointer-events:none;
    background:linear-gradient(160deg,var(--paper),var(--paper-2));transform-style:preserve-3d;box-shadow:0 0 40px rgba(40,25,8,.4);opacity:0;}
  .leaf.right{right:13px;transform-origin:left center;}
  .leaf.flip{animation:flipNext .72s var(--ease) forwards;}
  @keyframes flipNext{from{opacity:1;transform:rotateY(0);}to{opacity:1;transform:rotateY(-178deg);}}
  .leaf.left{left:13px;transform-origin:right center;}
  .leaf.flipback{animation:flipPrev .72s var(--ease) forwards;}
  @keyframes flipPrev{from{opacity:1;transform:rotateY(0);}to{opacity:1;transform:rotateY(178deg);}}

  .toolbar{position:absolute;left:-52px;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column;gap:8px;
    background:rgba(231,216,181,.82);backdrop-filter:blur(8px);padding:9px 8px;border-radius:14px;box-shadow:0 8px 24px rgba(40,25,8,.4);}
  .tb{font-size:12px;letter-spacing:.04em;color:var(--leather-2);background:transparent;border:0;padding:12px 10px;border-radius:10px;cursor:pointer;
    font-family:var(--body);transition:background .2s;writing-mode:vertical-rl;text-orientation:upright;line-height:1.1;}
  .tb:hover{background:rgba(138,66,51,.14);}
  .tb.primary{background:var(--seal);color:#f0dcae;}
</style>
</head>
<body>
  <div class="hint" id="hint"><b>点封面</b>，翻开你的回忆簿 →</div>

  <div class="stage" id="stage">
    <div class="cover" id="cover">
      <div class="stitch"></div>
      <div class="plate">
        <span class="pcorner c1"></span><span class="pcorner c2"></span><span class="pcorner c3"></span><span class="pcorner c4"></span>
        <img src="assets/cover-prince.png" alt="" />
      </div>
      <div class="label"><div class="zh">重要时刻</div><div class="en">a book of memories</div></div>
      <div class="wax">M</div>
      <div class="open-tip">轻触翻开 →</div>
    </div>
    <div class="spread">
      <button class="nav prev" id="navPrev">‹</button>
      <button class="nav next" id="navNext">›</button>
      <div class="book" id="book">
        <div class="page left"><div class="page-inner" id="pageL"></div><span class="pageno" id="pnL"></span></div>
        <div class="page right"><div class="page-inner" id="pageR"></div><span class="pageno" id="pnR"></span></div>
        <div class="photolayer" id="photolayer"></div>
      </div>
      <div class="leaf right" id="leafR"></div>
      <div class="leaf left" id="leafL"></div>
    </div>
    <div class="toolbar">
      <button class="tb" id="btnToc">目录</button>
      <button class="tb primary" id="btnNew">新记录</button>
      <button class="tb" id="btnClose">合上</button>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" multiple style="display:none" />

<script>
(function(){
  const stage=document.getElementById('stage'),cover=document.getElementById('cover'),hint=document.getElementById('hint');
  const pageL=document.getElementById('pageL'),pageR=document.getElementById('pageR');
  const pnL=document.getElementById('pnL'),pnR=document.getElementById('pnR');
  const leafR=document.getElementById('leafR'),leafL=document.getElementById('leafL'),book=document.getElementById('book');
  const photolayer=document.getElementById('photolayer'),fileInput=document.getElementById('fileInput');
  let topZ=30;

  function demoImg(c,label,w,h){const svg="<svg xmlns='http://www.w3.org/2000/svg' width='"+w+"' height='"+h+"'><rect width='"+w+"' height='"+h+"' fill='"+c+"'/><text x='"+(w/2)+"' y='"+(h/2)+"' font-size='15' fill='rgba(80,50,20,.5)' text-anchor='middle' font-family='cursive'>"+label+"</text></svg>";return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);}

  const TITLE_SAFE=70;
  const entries=[
    {date:'2024.11.12',dateCn:'星期二 · 晴',
     html:'今天和妈妈聊了很久，<br>她说她年轻的时候也想过当画家。<br><br>第一次听她讲这个。她说那时候没钱买颜料，<br>就用铅笔在练习本背面画。',
     note:'妈妈',
     photos:[{src:demoImg('#c2a878','mom',300,400),cap:'',x:560,y:150,rot:3,w:150}]},
  ];
  let pos=0,busy=false;
  const seqLen=()=>entries.length+1;

  function render(){photolayer.innerHTML='';if(pos===0){renderToc();pnL.textContent='';pnR.textContent='';return;}renderEntry(entries[pos-1],pos);}

  function renderToc(){
    pageL.innerHTML='<div class="toc-head">目录<span class="en">contents</span></div><div class="toc-rule"></div><ul class="toc-list" id="tocList"></ul>';
    const ul=pageL.querySelector('#tocList');
    if(entries.length===0)ul.innerHTML='<li class="toc-empty">这本子还是空的。<br>点左边「新记录」写下第一页 →</li>';
    entries.forEach((e,i)=>{const prev=stripHtml(e.html)||(e.photos.length?'（'+e.photos.length+' 张旧照片）':'（空白）');
      const li=document.createElement('li');li.className='toc-item';
      li.innerHTML='<span class="toc-date">'+e.date+'</span><span class="toc-prev">'+prev+'</span><span class="toc-pg">p.'+(i+1)+'</span>';
      li.addEventListener('click',()=>jumpTo(i+1));ul.appendChild(li);});
    pageR.innerHTML='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--ink-soft);">'+
      '<div style="font-family:var(--hand-en);font-size:30px;color:var(--seal);">to remember,</div>'+
      '<div style="font-family:var(--hand-cn);font-size:16px;margin-top:10px;letter-spacing:.1em;color:var(--ink);">把值得记住的，<br>都收进这本旧书里。</div>'+
      '<div class="wax2">M</div></div>';
  }

  function renderEntry(e,p){
    pageL.innerHTML='<div class="stamp">'+e.date+' <small>'+(e.dateCn||'')+'</small></div><div class="write" id="wr" contenteditable="true"></div>';
    const wr=pageL.querySelector('#wr');wr.innerHTML=e.html;wr.addEventListener('input',ev=>e.html=ev.target.innerHTML);
    pageR.innerHTML='<div class="rslot" id="rslot"><span class="ic">▢</span><span class="t">贴照片</span><span class="t2">paste a memory</span></div><div class="rnote" id="rnote" contenteditable="true"></div>';
    pageR.querySelector('#rnote').textContent=e.note||'';
    pageR.querySelector('#rnote').addEventListener('input',ev=>e.note=ev.target.textContent);
    pageR.querySelector('#rslot').addEventListener('click',()=>{curEntry=e;fileInput.click();});
    e.photos.forEach((ph,i)=>photolayer.appendChild(buildPhoto(e,ph,i)));
    pnL.textContent=(p*2-1);pnR.textContent=(p*2);
  }

  function buildPhoto(e,ph,i){
    const el=document.createElement('div');el.className='photo';
    el.style.left=(ph.x||120)+'px';el.style.top=(ph.y||TITLE_SAFE+20)+'px';el.style.transform='rotate('+(ph.rot||0)+'deg)';el.style.zIndex=ph.z||(30+i);
    const w=ph.w||160;
    el.innerHTML='<span class="tape"></span><button class="del">×</button><img src="'+ph.src+'" style="width:'+w+'px;height:auto" draggable="false"/><div class="cap" contenteditable="true">'+(ph.cap||'')+'</div>';
    el.querySelector('.cap').addEventListener('input',ev=>ph.cap=ev.target.textContent);
    el.querySelector('.del').addEventListener('click',ev=>{ev.stopPropagation();e.photos.splice(e.photos.indexOf(ph),1);render();});
    dragify(el,ph);return el;
  }
  function dragify(el,ph){let sx,sy,ox,oy,d=false;
    el.addEventListener('pointerdown',ev=>{if(ev.target.classList.contains('cap')||ev.target.classList.contains('del'))return;ev.preventDefault();
      d=true;el.classList.add('dragging');el.setPointerCapture(ev.pointerId);ph.z=(++topZ);el.style.zIndex=ph.z;sx=ev.clientX;sy=ev.clientY;ox=ph.x||120;oy=ph.y||90;});
    el.addEventListener('pointermove',ev=>{if(!d)return;const bw=book.clientWidth,bh=book.clientHeight;let nx=ox+(ev.clientX-sx),ny=oy+(ev.clientY-sy);
      nx=Math.max(-30,Math.min(nx,bw-60));ny=Math.max(TITLE_SAFE,Math.min(ny,bh-60));ph.x=nx;ph.y=ny;el.style.left=nx+'px';el.style.top=ny+'px';});
    el.addEventListener('pointerup',()=>{d=false;el.classList.remove('dragging');});
  }
  let curEntry=null;
  function addPhotoFromFile(f,e,dropX,dropY){const r=new FileReader();
    r.onload=()=>{const img=new Image();img.onload=()=>{const ratio=img.width/img.height;let w=ratio>=1?200:150;const n=e.photos.length;
      const x=dropX!=null?dropX-w/2:520+n*26,y=dropY!=null?Math.max(TITLE_SAFE,dropY-60):TITLE_SAFE+30+n*22;
      e.photos.push({src:r.result,cap:'',x:x,y:y,rot:(Math.random()*12-6),w:w,z:(++topZ)});render();};img.src=r.result;};
    r.readAsDataURL(f);}
  fileInput.addEventListener('change',ev=>{[...ev.target.files].forEach(f=>addPhotoFromFile(f,curEntry));ev.target.value='';});
  ['dragenter','dragover'].forEach(t=>book.addEventListener(t,ev=>{ev.preventDefault();ev.dataTransfer.dropEffect='copy';}));
  book.addEventListener('drop',ev=>{ev.preventDefault();ev.stopPropagation();if(pos===0)return;const e=entries[pos-1];
    const rect=book.getBoundingClientRect();const dx=ev.clientX-rect.left,dy=ev.clientY-rect.top;
    [...(ev.dataTransfer.files||[])].filter(f=>f.type.startsWith('image')).forEach(f=>addPhotoFromFile(f,e,dx,dy));});
  ['dragover','drop'].forEach(t=>document.addEventListener(t,ev=>{if(!ev.target.closest('.book'))ev.preventDefault();}));

  function stripHtml(h){const dv=document.createElement('div');dv.innerHTML=h||'';return (dv.textContent||'').replace(/\s+/g,' ').trim().slice(0,28);}
  function openBook(){stage.classList.add('open');hint.style.opacity=0;pos=0;render();}
  cover.addEventListener('click',openBook);
  function flip(dir){if(busy)return;const ni=pos+dir;if(ni<0||ni>=seqLen())return;busy=true;const leaf=dir>0?leafR:leafL;
    leaf.classList.remove('flip','flipback');void leaf.offsetWidth;leaf.classList.add(dir>0?'flip':'flipback');
    setTimeout(()=>{leaf.classList.remove('flip','flipback');pos=ni;render();busy=false;},700);}
  function jumpTo(p){if(busy||p===pos)return;busy=true;const dir=p>pos?1:-1;const leaf=dir>0?leafR:leafL;
    leaf.classList.remove('flip','flipback');void leaf.offsetWidth;leaf.classList.add(dir>0?'flip':'flipback');
    setTimeout(()=>{leaf.classList.remove('flip','flipback');pos=p;render();busy=false;},700);}
  document.getElementById('navNext').addEventListener('click',()=>flip(1));
  document.getElementById('navPrev').addEventListener('click',()=>flip(-1));
  document.getElementById('btnToc').addEventListener('click',()=>{if(!stage.classList.contains('open'))openBook();else jumpTo(0);});
  document.getElementById('btnClose').addEventListener('click',()=>{stage.classList.remove('open');hint.style.opacity=1;});
  document.getElementById('btnNew').addEventListener('click',()=>{if(!stage.classList.contains('open'))openBook();entries.push({date:todayStr(),dateCn:'',html:'',note:'',photos:[]});jumpTo(entries.length);});
  function todayStr(){const d=new Date();return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}
  if(location.hash.startsWith('#open')){stage.classList.add('open');hint.style.opacity=0;pos=1;render();}
})();
</script>
</body>
</html>
