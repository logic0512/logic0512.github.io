<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Memory Sparks · 8 颗星修订总览（逐星核对清单）</title>
<style>
  :root {
    --bg: #1a1620;
    --surface: #261e2e;
    --surface-2: #2f2738;
    --line: rgba(255, 240, 200, 0.08);
    --text: #ece2d4;
    --mute: rgba(220, 200, 175, 0.65);
    --mute-2: rgba(220, 200, 175, 0.42);
    --accent: #f5dca8;
    --good: #8ec694;
    --warn: #e4c772;
    --bad: #d88a8a;
    --info: #8fb5d8;
    --type-mono: "SF Mono", "Menlo", monospace;
    --type-sans: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--type-sans); font-weight: 300; }
  body { padding: 48px 32px 120px; }

  /* ─── 顶部 ─── */
  .header {
    max-width: 1280px;
    margin: 0 auto 36px;
    padding: 30px 36px;
    background: var(--surface);
    border-radius: 18px;
    border: 1px solid var(--line);
  }
  .header h1 { margin: 0 0 10px; font-size: 22px; font-weight: 500; letter-spacing: 0.1em; color: var(--accent); }
  .header p { margin: 0; font-size: 13px; line-height: 1.85; color: var(--mute); }
  .header code { background: rgba(255,238,200,0.10); padding: 1px 6px; border-radius: 3px; font-family: var(--type-mono); font-size: 11.5px; color: var(--accent); }

  /* 全局进度 */
  .global-stats {
    max-width: 1280px;
    margin: 0 auto 24px;
    padding: 22px 28px;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .global-stats .label { font-size: 11px; letter-spacing: 0.28em; color: var(--mute-2); text-transform: uppercase; }
  .global-stats .num { font-family: var(--type-mono); font-size: 28px; color: var(--accent); margin-left: 8px; }
  .global-stats .progress-bar {
    flex: 1;
    height: 8px;
    background: rgba(0, 0, 0, 0.32);
    border-radius: 4px;
    overflow: hidden;
    min-width: 180px;
  }
  .global-stats .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--good), var(--accent));
    transition: width 240ms ease;
  }
  .global-stats button {
    background: rgba(255, 220, 168, 0.12);
    color: var(--accent);
    border: 1px solid rgba(245, 220, 168, 0.32);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.06em;
    transition: all 160ms ease;
  }
  .global-stats button:hover { background: rgba(255, 220, 168, 0.22); }

  /* ─── 星卡片栅格 ─── */
  .cards {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
  }
  @media (max-width: 880px) {
    .cards { grid-template-columns: 1fr; }
  }
  .card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .card.full {
    grid-column: 1 / -1;
  }
  .card-head {
    padding: 18px 22px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .card-head .star-num {
    font-family: "EB Garamond", "Cormorant Garamond", "Georgia", serif;
    font-style: italic;
    font-size: 24px;
    color: rgba(245, 200, 120, 0.55);
    width: 32px;
  }
  .card-head .name { font-size: 17px; font-weight: 500; letter-spacing: 0.08em; color: var(--accent); flex: 1; }
  .card-head .keyword { font-size: 10.5px; letter-spacing: 0.24em; color: var(--mute-2); text-transform: uppercase; }
  .card-head .copy-btn {
    background: rgba(143, 181, 216, 0.14);
    color: var(--info);
    border: 1px solid rgba(143, 181, 216, 0.32);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.06em;
    transition: all 160ms ease;
  }
  .card-head .copy-btn:hover { background: rgba(143, 181, 216, 0.26); }
  .card-head .copy-btn.copied { color: var(--good); border-color: rgba(142, 198, 148, 0.5); }

  .card-stats {
    padding: 11px 22px;
    font-size: 11px;
    color: var(--mute-2);
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--line);
  }
  .card-stats .stat-num { font-family: var(--type-mono); color: var(--text); margin-left: 4px; }
  .card-stats .progress-mini {
    flex: 1;
    height: 5px;
    background: rgba(0, 0, 0, 0.32);
    border-radius: 3px;
    overflow: hidden;
    margin-left: 8px;
  }
  .card-stats .progress-mini .fill { height: 100%; background: linear-gradient(90deg, var(--good), var(--accent)); transition: width 240ms ease; }

  .card-body { padding: 14px 22px 22px; }

  /* 单项 */
  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed rgba(255, 240, 200, 0.05);
  }
  .item:last-child { border-bottom: 0; }
  .item input[type="checkbox"] {
    margin-top: 4px;
    width: 16px; height: 16px;
    accent-color: var(--good);
    cursor: pointer;
    flex-shrink: 0;
  }
  .item .body { flex: 1; }
  .item .top-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .item .id {
    font-family: var(--type-mono);
    font-size: 10px;
    color: var(--mute-2);
    background: rgba(255, 240, 200, 0.06);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .item .tag {
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
  }
  .item .tag.t-common { background: rgba(143, 181, 216, 0.15); color: var(--info); }
  .item .tag.t-fixed { background: rgba(142, 198, 148, 0.18); color: var(--good); }
  .item .tag.t-partial { background: rgba(228, 199, 114, 0.18); color: var(--warn); }
  .item .tag.t-unknown { background: rgba(180, 140, 220, 0.18); color: #c4a8d8; }
  .item .text {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }
  .item.done .text {
    color: var(--mute-2);
    text-decoration: line-through;
    text-decoration-color: rgba(220, 200, 175, 0.32);
  }
  .item .quote {
    margin-top: 4px;
    font-size: 11.5px;
    line-height: 1.55;
    color: var(--mute-2);
    font-style: italic;
    padding-left: 10px;
    border-left: 2px solid rgba(255, 240, 200, 0.10);
  }

  /* 分节标题 */
  .section-title {
    font-size: 10.5px;
    letter-spacing: 0.28em;
    color: var(--mute-2);
    text-transform: uppercase;
    margin: 14px 0 4px;
    padding-top: 6px;
    border-top: 1px solid rgba(255, 240, 200, 0.06);
  }
  .section-title:first-child { margin-top: 0; padding-top: 0; border-top: 0; }

  /* 通知 */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(120%);
    padding: 10px 22px;
    background: var(--surface-2);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 99px;
    font-size: 12.5px;
    z-index: 999;
    transition: transform 280ms ease;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

    title: '总结报告',
    items: [
      { id: 'E1', status: 'open', text: 'P-099 最终报告', quote: '64 项逐一附「修改前截图 / 修改后截图 / 改了什么」' },
    ]
  }
];

// ────────────────────────────────────────────────────────
// 渲染
// ────────────────────────────────────────────────────────
const STORAGE_KEY = 'memory-sparks-checklist-2026-06-01';
const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function uid(starKey, itemId) { return `${starKey}__${itemId}`; }

function tagFor(item) {
  if (item.status === 'fixed') return '<span class="tag t-fixed">已修 ✓</span>';
  if (item.status === 'partial') return '<span class="tag t-partial">部分修</span>';
  if (item.status === 'unknown') return '<span class="tag t-unknown">不确定</span>';
  return '';
}

function renderItem(starKey, item) {
  const id = uid(starKey, item.id);
  // 已修项目默认勾上（除非用户取消过）
  if (item.status === 'fixed' && state[id] === undefined) state[id] = true;
  const checked = state[id] ? 'checked' : '';
  const doneClass = state[id] ? ' done' : '';
  const commonTag = item.common ? '<span class="tag t-common">共性</span>' : '';
  const quote = item.quote ? `<div class="quote">${item.quote}</div>` : '';
  return `
    <div class="item${doneClass}" data-uid="${id}">
      <input type="checkbox" ${checked} onchange="toggleItem('${id}', this)">
      <div class="body">
        <div class="top-row">
          <span class="id">${item.id}</span>
          ${commonTag}
          ${tagFor(item)}
        </div>
        <div class="text">${item.text}</div>
        ${quote}
      </div>
    </div>
  `;
}

function renderStar(s) {
  const total = s.items.length;
  const done = s.items.filter(it => state[uid(s.key, it.id)]).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const itemsHTML = s.items.map(it => renderItem(s.key, it)).join('');
  return `
    <section class="card" data-star="${s.key}">
      <div class="card-head">
        <span class="star-num">${s.num}</span>
        <span class="name">${s.name}</span>
        <span class="keyword">· ${s.keyword}</span>
        <button class="copy-btn" onclick="copyStar('${s.key}', this)">复制本星清单</button>
      </div>
      <div class="card-stats">
        总计<span class="stat-num">${total}</span> · 已完成<span class="stat-num">${done}</span> · 剩余<span class="stat-num">${total - done}</span>
        <div class="progress-mini"><div class="fill" style="width:${pct}%"></div></div>
      </div>
      <div class="card-body">${itemsHTML}</div>
    </section>
  `;
}

function renderExtras(group) {
  const itemsHTML = group.items.map(it => renderItem('extra-' + group.title.replace(/[^a-z]/gi, ''), it)).join('');
  return `
    <section class="card full">
      <div class="card-head">
        <span class="star-num">·</span>
        <span class="name">${group.title}</span>
        <button class="copy-btn" onclick="copyGroup('${group.title}', this)">复制本组清单</button>
      </div>
      <div class="card-body">${itemsHTML}</div>
    </section>
  `;
}

function renderAll() {
  const cards = document.getElementById('cards');
  cards.innerHTML = STARS.map(renderStar).join('') + EXTRAS.map(renderExtras).join('');
  updateGlobal();
}

// ────────────────────────────────────────────────────────
// 交互
// ────────────────────────────────────────────────────────
function toggleItem(id, el) {
  state[id] = el.checked;
  saveState();
  el.closest('.item').classList.toggle('done', el.checked);
  // 局部更新统计（重新渲染该卡片头部）
  const card = el.closest('.card');
  if (card && card.dataset.star) {
    const s = STARS.find(x => x.key === card.dataset.star);
    if (s) {
      const total = s.items.length;
      const done = s.items.filter(it => state[uid(s.key, it.id)]).length;
      const pct = total ? Math.round(done / total * 100) : 0;
      card.querySelector('.card-stats').innerHTML = `
        总计<span class="stat-num">${total}</span> · 已完成<span class="stat-num">${done}</span> · 剩余<span class="stat-num">${total - done}</span>
        <div class="progress-mini"><div class="fill" style="width:${pct}%"></div></div>
      `;
    }
  }
  updateGlobal();
}

function updateGlobal() {
  let total = 0, done = 0;
  STARS.forEach(s => s.items.forEach(it => {
    total++;
    if (state[uid(s.key, it.id)]) done++;
  }));
  EXTRAS.forEach(g => g.items.forEach(it => {
    total++;
    if (state[uid('extra-' + g.title.replace(/[^a-z]/gi, ''), it.id)]) done++;
  }));
  document.getElementById('globalProgress').textContent = `${done}/${total}`;
  document.getElementById('globalFill').style.width = (total ? (done / total * 100) : 0) + '%';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// 复制本星清单（纯文本）
function copyStar(starKey, btn) {
  const s = STARS.find(x => x.key === starKey);
  if (!s) return;
  const lines = [`## ${s.num} · ${s.name}（${s.keyword}）`, ''];
  s.items.forEach(it => {
    const mark = state[uid(s.key, it.id)] ? '[x]' : '[ ]';
    const tagStr = it.status === 'fixed' ? ' ✅' :
                   it.status === 'partial' ? ' 🟡' :
                   it.status === 'unknown' ? ' ❓' : '';
    const common = it.common ? '【共性】' : '';
    lines.push(`- ${mark} **${it.id}**${tagStr} ${common}${it.text}`);
    if (it.quote) lines.push(`  > ${it.quote}`);
  });
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制本星清单'; btn.classList.remove('copied'); }, 1800);
  });
}

function copyGroup(title, btn) {
  const g = EXTRAS.find(x => x.title === title);
  if (!g) return;
  const lines = [`## ${g.title}`, ''];
  g.items.forEach(it => {
    const key = uid('extra-' + g.title.replace(/[^a-z]/gi, ''), it.id);
    const mark = state[key] ? '[x]' : '[ ]';
    lines.push(`- ${mark} **${it.id}** ${it.text}`);
    if (it.quote) lines.push(`  > ${it.quote}`);
  });
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制本组清单'; btn.classList.remove('copied'); }, 1800);
  });
}

function copyAll() {
  const parts = STARS.map(s => {
    const lines = [`## ${s.num} · ${s.name}（${s.keyword}）`, ''];
    s.items.forEach(it => {
      const mark = state[uid(s.key, it.id)] ? '[x]' : '[ ]';
      const tagStr = it.status === 'fixed' ? ' ✅' :
                     it.status === 'partial' ? ' 🟡' :
                     it.status === 'unknown' ? ' ❓' : '';
      const common = it.common ? '【共性】' : '';
      lines.push(`- ${mark} **${it.id}**${tagStr} ${common}${it.text}`);
    });
    return lines.join('\n');
  });
  EXTRAS.forEach(g => {
    const lines = [`## ${g.title}`, ''];
    g.items.forEach(it => {
      const key = uid('extra-' + g.title.replace(/[^a-z]/gi, ''), it.id);
      const mark = state[key] ? '[x]' : '[ ]';
      lines.push(`- ${mark} **${it.id}** ${it.text}`);
    });
    parts.push(lines.join('\n'));
  });
  navigator.clipboard.writeText(parts.join('\n\n')).then(() => showToast('全部清单已复制到剪贴板'));
}

function resetAll() {
  if (!confirm('确定重置所有勾选？')) return;
  Object.keys(state).forEach(k => delete state[k]);
  saveState();
  renderAll();
  showToast('已重置');
}

renderAll();
</script>

</body>
</html>
