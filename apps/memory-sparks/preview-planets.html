<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>5 颗星 · 视觉对比</title>
<style>
  :root {
    --bg: #050810;
    --panel: rgba(15, 22, 38, 0.9);
    --text: #e8edf5;
    --text-mute: rgba(232, 237, 245, 0.55);
    --gold: #ffd070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", sans-serif;
    overflow: hidden;
    height: 100%;
  }
  .toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--panel);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .toolbar h1 {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.06em;
  }
  .toolbar .hint {
    font-size: 11px;
    color: var(--text-mute);
    letter-spacing: 0.04em;
  }
  .scale-chip {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }
  .scale-chip button {
    padding: 4px 10px;
    border-radius: 99px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--text-mute);
    font-size: 11px;
    cursor: pointer;
  }
  .scale-chip button.on {
    background: rgba(255, 208, 112, 0.18);
    color: var(--gold);
    border-color: rgba(255, 208, 112, 0.4);
  }
  .grid {
    padding: 56px 12px 12px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: minmax(260px, 1fr);
    gap: 10px;
    height: 100vh;
  }
  .cell {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: #000;
  }
  .cell .label {
    position: absolute;
    top: 8px;
    left: 8px;
    z-index: 5;
    background: rgba(0, 0, 0, 0.78);
    color: #fff;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 99px;
    letter-spacing: 0.04em;
    backdrop-filter: blur(6px);
    pointer-events: none;
  }
  .cell .label .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    box-shadow: 0 0 6px currentColor;
  }
  .cell iframe {
    border: 0;
    transform-origin: 0 0;
    /* JS 注入 transform 缩放 + 等比例 width/height */
  }
  .open-link {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 5;
    color: rgba(255, 255, 255, 0.7);
    background: rgba(0, 0, 0, 0.6);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 99px;
    text-decoration: none;
    backdrop-filter: blur(6px);
  }
  .open-link:hover { color: var(--gold); }
</style>
</head>
<body>

<div class="toolbar">
  <h1>8 颗星球 · 视觉对比</h1>
  <span class="hint">点右上角 ↗ 打开单星查看细节 · 想统一哪部分就指给我</span>
  <div class="scale-chip">
    <button data-scale="0.45" class="on">小</button>
    <button data-scale="0.6">中</button>
    <button data-scale="0.85">大</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
  const PLANETS = [
    { key: 'beizi',   name: '被子星',   color: '#8eb8d4' },
    { key: 'hiking',  name: '行星',     color: '#7ab048' },
    { key: 'healing', name: '治愈星',   color: '#f5c840' },
    { key: 'flower',  name: '花星',     color: '#e08aba' },
    { key: 'sea',     name: '海星',     color: '#198ed0' },
    { key: 'starry',  name: '繁星',     color: '#f0d870' },
    { key: 'cloud',   name: '云星',     color: '#c8b0e8' },
    { key: 'tree',    name: '树星',     color: '#5a8a5a' },
  ];

  const grid = document.getElementById('grid');
  for (const p of PLANETS) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `
      <span class="label"><span class="dot" style="background:${p.color}; color:${p.color}"></span>${p.name}</span>
      <a class="open-link" href="/planets/${p.key}/index.html" target="_blank">↗ 打开</a>
      <iframe src="/planets/${p.key}/index.html"></iframe>
    `;
    grid.appendChild(cell);
  }

  function applyScale(scale) {
    document.querySelectorAll('.cell').forEach(cell => {
      const iframe = cell.querySelector('iframe');
      const w = cell.clientWidth;
      const h = cell.clientHeight;
      iframe.style.width = (w / scale) + 'px';
      iframe.style.height = (h / scale) + 'px';
      iframe.style.transform = `scale(${scale})`;
    });
  }

  let currentScale = 0.45;
  document.querySelectorAll('.scale-chip button').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.scale-chip button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      currentScale = parseFloat(btn.dataset.scale);
      applyScale(currentScale);
    };
  });

  // 等 iframe 加载完再缩放
  setTimeout(() => applyScale(currentScale), 800);
  window.addEventListener('resize', () => applyScale(currentScale));
</script>

</body>
</html>
