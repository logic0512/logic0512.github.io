<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海星 · 声音对位调音台</title>
<style>
  :root { --bg:#0d1622; --panel:#16202f; --line:rgba(255,255,255,0.1); --txt:#e8eef6; --mut:#8aa0b8; --accent:#3aa7e0; --warm:#f0c060; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 -apple-system,"PingFang SC",sans-serif; background:var(--bg); color:var(--txt); }
  .wrap { display:grid; grid-template-columns: 1fr 420px; height:100vh; }
  .stage { position:relative; background:#000; overflow:hidden; }
  .stage iframe { width:100%; height:100%; border:0; display:block; }
  .stage .hint { position:absolute; left:14px; top:12px; z-index:5; background:rgba(0,0,0,0.5); padding:6px 12px; border-radius:8px; font-size:12px; color:var(--mut); }
  .panel { background:var(--panel); border-left:1px solid var(--line); overflow-y:auto; padding:18px 18px 60px; }
  h1 { font-size:16px; margin:0 0 4px; }
  .sub { color:var(--mut); font-size:12px; margin:0 0 16px; }
  .group { border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:14px; }
  .group h2 { font-size:13px; margin:0 0 10px; color:var(--warm); letter-spacing:0.04em; }
  .row { display:flex; align-items:center; gap:10px; margin:9px 0; }
  .row label { width:96px; flex-shrink:0; color:var(--mut); font-size:12px; }
  .row input[type=range] { flex:1; accent-color:var(--accent); }
  .row .val { width:58px; text-align:right; font-variant-numeric:tabular-nums; font-size:12px; }
  select, .btn { background:#1f2c3e; color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:7px 10px; font-size:13px; cursor:pointer; }
  select { width:100%; }
  .btn:hover { border-color:var(--accent); }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#04121d; font-weight:600; }
  .btn.full { width:100%; }
  .btns { display:flex; gap:8px; margin:10px 0; }
  .cue { border:1px solid var(--line); border-radius:10px; padding:12px; margin:10px 0; }
  .cue .chead { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .cue .chead b { font-size:13px; }
  .toggle { font-size:12px; color:var(--mut); }
  .timeline { position:relative; height:54px; background:#0a1119; border-radius:8px; margin:6px 0 4px; overflow:hidden; }
  .phase { position:absolute; top:0; height:100%; opacity:0.28; }
  .phase.surge { background:#1f6fa0; }
  .phase.cover { background:#0d3a55; }
  .phase.retreat { background:#2b86b8; }
  .phase.clean { background:#15334a; }
  .plabel { position:absolute; top:2px; font-size:9px; color:#cfe2f2; transform:translateX(2px); pointer-events:none; }
  .cuemark { position:absolute; top:0; width:2px; height:100%; background:var(--warm); }
  .cuemark::after { content:attr(data-l); position:absolute; top:-2px; left:3px; font-size:9px; color:var(--warm); white-space:nowrap; }
  .playhead { position:absolute; top:0; width:2px; height:100%; background:#fff; left:0; box-shadow:0 0 6px #fff; }
  textarea { width:100%; height:70px; background:#0a1119; color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:8px; font:12px/1.4 inherit; resize:vertical; }
  pre { background:#0a1119; border:1px solid var(--line); border-radius:8px; padding:10px; font-size:11px; overflow:auto; max-height:200px; white-space:pre-wrap; word-break:break-all; }
  .muted-note { font-size:11px; color:var(--mut); margin-top:4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <div class="hint">左侧是真实海星动画 · 点「▶ 播放一次冲洗」看动画 + 听对位音频</div>
    <iframe id="seaFrame" src="/planets/sea/index.html?synctool=1" title="海星"></iframe>
  </div>

  <div class="panel">
    <h1>海星 · 声音对位调音台</h1>
    <p class="sub">边看动画边调。满意后点「导出参数」，把结果发给我即可落地。</p>

    <div class="btns">
      <button class="btn primary full" id="playBtn">▶ 播放一次冲洗</button>
    </div>
    <div class="row">
      <label>动画强度</label>
      <input type="range" id="weight" min="1" max="5" step="1" value="2">
      <span class="val" id="weightV">2</span>
    </div>
    <p class="muted-note">强度 = 烦恼"重量"，影响海水涌起时长（1 快 ~ 5 慢）。</p>

    <!-- 时间轴：动画各阶段 + 触发点 + 播放头 -->
    <div class="timeline" id="timeline">
      <div class="playhead" id="playhead" style="display:none"></div>
    </div>
    <p class="muted-note" id="tlInfo"></p>

    <!-- 背景层 -->
    <div class="group">
      <h2>背景层（持续循环）</h2>
      <div class="row"><label>素材</label>
        <select id="bgSel">
          <option value="/assets/sounds/sea-ambience-real.mp3">真实海洋远景（去拍打）</option>
          <option value="/assets/sounds/sea-ambience-synth.mp3">合成海洋白噪</option>
        </select>
      </div>
      <div class="row"><label>音量</label><input type="range" id="bgVol" min="0" max="1" step="0.01" value="0.3"><span class="val" id="bgVolV">0.30</span></div>
      <div class="row"><label>淡入(秒)</label><input type="range" id="bgFade" min="0" max="6" step="0.1" value="2.6"><span class="val" id="bgFadeV">2.6</span></div>
      <div class="btns">
        <button class="btn" id="bgPlay">背景 试听</button>
        <button class="btn" id="bgStop">停</button>
      </div>
    </div>

    <!-- 触发音效（可多个位置） -->
    <div class="group">
      <h2>触发音效（对位到动画的某一刻）</h2>
      <div id="cues"></div>
      <button class="btn full" id="addCue">+ 增加一个触发位置</button>
    </div>

    <!-- 导出 -->
    <div class="group">
      <h2>导出</h2>
      <textarea id="note" placeholder="给我留言：哪里还不对、想要什么感觉…（会一起导出）"></textarea>
      <div class="btns">
        <button class="btn primary" id="exportBtn">导出参数</button>
        <button class="btn" id="copyBtn">复制</button>
      </div>
      <pre id="out" style="display:none"></pre>
    </div>
  </div>
</div>

<script>
// ── Web Audio 引擎（工具自带，与 iframe 内的声音隔离）──
let ctx, master, bgGain, bgSrc, bgBuf, bgTimer, bgState=null;
const sampleCache = {};
const WASHES = {
  '/assets/sounds/sea-wash-1.mp3': '海浪冲沙 · 候选1',
  '/assets/sounds/sea-wash-2.mp3': '海浪冲沙 · 候选2',
};

function ac() {
  if (!ctx) {
    ctx = new (window.AudioContext||window.webkitAudioContext)();
    master = ctx.createGain(); master.gain.value = 1; master.connect(ctx.destination);
    bgGain = ctx.createGain(); bgGain.gain.value = 0; bgGain.connect(master);
  }
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}
async function loadBuf(url) {
  if (sampleCache[url]) return sampleCache[url];
  const r = await fetch(url); const ab = await r.arrayBuffer();
  const b = await ac().decodeAudioData(ab);
  sampleCache[url] = b; return b;
}

// 背景循环（交叉淡化，跟 app 里一致）
function startBg(buf, vol, fade, xfade=3.0) {
  stopBg(true);
  bgBuf = buf;
  const dur = buf.duration;
  const xf = Math.min(xfade, dur*0.45);
  const period = Math.max(0.5, dur - xf);
  let next = ac().currentTime + 0.05;
  function cycle(at){
    const s = ctx.createBufferSource(); s.buffer = buf;
    const g = ctx.createGain(); s.connect(g); g.connect(bgGain);
    g.gain.setValueAtTime(0.0001, at);
    g.gain.linearRampToValueAtTime(1, at+xf);
    g.gain.setValueAtTime(1, at+period);
    g.gain.linearRampToValueAtTime(0.0001, at+period+xf);
    s.start(at); s.stop(at+period+xf+0.05);
  }
  bgState = { next, period };
  const tick = () => { if(!bgState) return; const h = ctx.currentTime+3; while(bgState.next<h){ cycle(bgState.next); bgState.next+=bgState.period; } };
  tick(); bgTimer = setInterval(tick, 250);
  bgGain.gain.cancelScheduledValues(ctx.currentTime);
  bgGain.gain.setValueAtTime(Math.max(0.0001,bgGain.gain.value), ctx.currentTime);
  bgGain.gain.linearRampToValueAtTime(vol, ctx.currentTime + fade);
}
function stopBg(hard) {
  if (bgTimer){ clearInterval(bgTimer); bgTimer=null; } bgState=null;
  if (bgGain && !hard){ bgGain.gain.cancelScheduledValues(ctx.currentTime); bgGain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime+0.8); }
  else if (bgGain) { bgGain.gain.value = 0.0001; }
}

// 一次性音效（带裁剪起点 / 音量 / 速度 / 淡入淡出）
function playCue(cue, whenOffset=0) {
  if (!cue.src) return;
  loadBuf(cue.src).then(buf => {
    const t0 = ac().currentTime + whenOffset;
    const s = ctx.createBufferSource(); s.buffer = buf;
    s.playbackRate.value = cue.rate;
    const g = ctx.createGain(); s.connect(g); g.connect(master);
    const start = Math.max(0, cue.trim);
    const playDur = Math.max(0.05, (buf.duration - start) / cue.rate);
    const fi = Math.min(cue.fadeIn, playDur*0.5), fo = Math.min(cue.fadeOut, playDur*0.5);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(cue.vol, t0 + Math.max(0.005,fi));
    g.gain.setValueAtTime(cue.vol, t0 + playDur - fo);
    g.gain.linearRampToValueAtTime(0.0001, t0 + playDur);
    s.start(t0, start);
    s.stop(t0 + playDur + 0.05);
  });
}

// ── 动画阶段（从 iframe 暴露的 __msSeaTimings 读，读不到用默认）──
function timings() {
  const f = document.getElementById('seaFrame').contentWindow;
  const t = (f && f.__msSeaTimings) || { waitBeforeSurge:850, surgeBase:3300, surgePerWeight:260, coverHold:760, retreatDuration:1700, cleanDelay:1900 };
  const w = +document.getElementById('weight').value;
  const surge = t.surgeBase + w*t.surgePerWeight;
  const phases = [
    { key:'surge',   label:'涌起', start:t.waitBeforeSurge, dur:surge },
    { key:'cover',   label:'覆盖', start:t.waitBeforeSurge+surge, dur:t.coverHold },
    { key:'retreat', label:'退潮', start:t.waitBeforeSurge+surge+t.coverHold, dur:t.retreatDuration },
    { key:'clean',   label:'变干净', start:t.waitBeforeSurge+surge+t.coverHold+t.retreatDuration, dur:t.cleanDelay },
  ];
  const total = phases[phases.length-1].start + phases[phases.length-1].dur;
  return { phases, total };
}

// ── 触发位置（cues）状态 ──
let cues = [
  { src:'/assets/sounds/sea-wash-1.mp3', timeMs:850,  vol:0.55, rate:1.0, trim:0, fadeIn:0.05, fadeOut:0.4 },
];
const D = (id)=>document.getElementById(id);

function renderCues() {
  const box = D('cues'); box.innerHTML='';
  cues.forEach((c,i)=>{
    const el = document.createElement('div'); el.className='cue';
    el.innerHTML = `
      <div class="chead"><b>位置 ${i+1}</b>
        <span class="toggle"><button class="btn" data-test="${i}">试这一记</button>
        ${cues.length>1?`<button class="btn" data-del="${i}">删</button>`:''}</span></div>
      <div class="row"><label>音效</label>
        <select data-f="src" data-i="${i}">
          ${Object.entries(WASHES).map(([v,n])=>`<option value="${v}" ${c.src===v?'selected':''}>${n}</option>`).join('')}
        </select></div>
      <div class="row"><label>触发(ms)</label><input type="range" data-f="timeMs" data-i="${i}" min="0" max="9000" step="10" value="${c.timeMs}"><span class="val">${c.timeMs}</span></div>
      <div class="row"><label>音量</label><input type="range" data-f="vol" data-i="${i}" min="0" max="1.2" step="0.01" value="${c.vol}"><span class="val">${c.vol.toFixed(2)}</span></div>
      <div class="row"><label>裁剪起点(s)</label><input type="range" data-f="trim" data-i="${i}" min="0" max="4" step="0.05" value="${c.trim}"><span class="val">${c.trim.toFixed(2)}</span></div>
      <div class="row"><label>速度</label><input type="range" data-f="rate" data-i="${i}" min="0.5" max="1.5" step="0.01" value="${c.rate}"><span class="val">${c.rate.toFixed(2)}</span></div>
      <div class="row"><label>淡入(s)</label><input type="range" data-f="fadeIn" data-i="${i}" min="0" max="2" step="0.05" value="${c.fadeIn}"><span class="val">${c.fadeIn.toFixed(2)}</span></div>
      <div class="row"><label>淡出(s)</label><input type="range" data-f="fadeOut" data-i="${i}" min="0" max="2" step="0.05" value="${c.fadeOut}"><span class="val">${c.fadeOut.toFixed(2)}</span></div>
    `;
    box.appendChild(el);
  });
  box.querySelectorAll('input[type=range],select').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const i=+e.target.dataset.i, f=e.target.dataset.f;
      let v = e.target.value; if(e.target.type==='range') v=parseFloat(v);
      cues[i][f]=v;
      if(e.target.type==='range') e.target.nextElementSibling.textContent = (f==='timeMs')? v : (typeof v==='number'? v.toFixed(2): v);
      drawTimeline();
    });
  });
  box.querySelectorAll('[data-test]').forEach(b=>b.addEventListener('click',()=>{ ac(); playCue(cues[+b.dataset.test],0); }));
  box.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{ cues.splice(+b.dataset.del,1); renderCues(); drawTimeline(); }));
  drawTimeline();
}

function drawTimeline() {
  const tl = D('timeline'); const { phases, total } = timings();
  tl.querySelectorAll('.phase,.plabel,.cuemark').forEach(n=>n.remove());
  phases.forEach(p=>{
    const d=document.createElement('div'); d.className='phase '+p.key;
    d.style.left=(p.start/total*100)+'%'; d.style.width=(p.dur/total*100)+'%'; tl.appendChild(d);
    const l=document.createElement('div'); l.className='plabel'; l.style.left=(p.start/total*100)+'%'; l.textContent=p.label; tl.appendChild(l);
  });
  cues.forEach((c,i)=>{ const m=document.createElement('div'); m.className='cuemark'; m.style.left=(Math.min(c.timeMs,total)/total*100)+'%'; m.dataset.l='♪'+(i+1); tl.appendChild(m); });
  D('tlInfo').textContent = `总时长约 ${(total/1000).toFixed(1)}s · 阶段：涌起→覆盖→退潮→变干净`;
}

// ── 播放一次：动画 + 背景(若没在放则起) + 所有 cue 对位 ──
function playOnce() {
  ac();
  const f = D('seaFrame').contentWindow;
  const w = +D('weight').value;
  if (f && f.__msSeaDemoWash) f.__msSeaDemoWash(w);
  // 背景没在放就起一下，方便整体听
  if (!bgState) startBgFromUI();
  cues.forEach(c=> playCue(c, c.timeMs/1000));
  runPlayhead();
}
function runPlayhead() {
  const ph=D('playhead'); const { total }=timings(); ph.style.display='block';
  const t0=performance.now();
  function step(){ const e=performance.now()-t0; const r=Math.min(e/total,1); ph.style.left=(r*100)+'%'; if(r<1) requestAnimationFrame(step); else ph.style.display='none'; }
  requestAnimationFrame(step);
}

function startBgFromUI(){ ac(); loadBuf(D('bgSel').value).then(b=> startBg(b, parseFloat(D('bgVol').value), parseFloat(D('bgFade').value))); }

// ── 绑定 ──
D('playBtn').addEventListener('click', playOnce);
D('weight').addEventListener('input', e=>{ D('weightV').textContent=e.target.value; drawTimeline(); });
D('bgVol').addEventListener('input', e=>{ D('bgVolV').textContent=parseFloat(e.target.value).toFixed(2); if(bgState&&bgGain){ bgGain.gain.linearRampToValueAtTime(parseFloat(e.target.value), ctx.currentTime+0.2);} });
D('bgFade').addEventListener('input', e=>{ D('bgFadeV').textContent=parseFloat(e.target.value).toFixed(1); });
D('bgPlay').addEventListener('click', startBgFromUI);
D('bgStop').addEventListener('click', ()=>stopBg(false));
D('addCue').addEventListener('click', ()=>{ const last=cues[cues.length-1]; cues.push({ src:'/assets/sounds/sea-wash-2.mp3', timeMs:Math.min((last?last.timeMs:0)+2000,8000), vol:0.4, rate:1.0, trim:0, fadeIn:0.1, fadeOut:0.5 }); renderCues(); });

function buildExport(){
  return {
    planet:'sea',
    background:{ src:D('bgSel').value, volume:parseFloat(D('bgVol').value), fadeIn:parseFloat(D('bgFade').value) },
    cues: cues.map(c=>({...c})),
    note: D('note').value || '',
  };
}
D('exportBtn').addEventListener('click', ()=>{ const o=D('out'); o.style.display='block'; o.textContent=JSON.stringify(buildExport(),null,2); });
D('copyBtn').addEventListener('click', async ()=>{ try{ await navigator.clipboard.writeText(JSON.stringify(buildExport(),null,2)); D('copyBtn').textContent='已复制✓'; setTimeout(()=>D('copyBtn').textContent='复制',1500);}catch(e){ D('exportBtn').click(); } });

// iframe 加载后：静音它自己的声音（工具自己驱动音频），并恢复动画可见
D('seaFrame').addEventListener('load', ()=>{
  const w=D('seaFrame').contentWindow;
  try{ w.postMessage({type:'memory-sparks:sound-muted',muted:true},'*'); }catch(e){}
  setTimeout(drawTimeline, 300);
});

// 状态恢复（localStorage）
try{ const saved=JSON.parse(localStorage.getItem('ms-sea-sync')||'null'); if(saved){ if(saved.cues) cues=saved.cues; if(saved.bg){ D('bgSel').value=saved.bg.src||D('bgSel').value; D('bgVol').value=saved.bg.volume??0.3; D('bgVolV').textContent=(saved.bg.volume??0.3).toFixed(2);} if(saved.note) D('note').value=saved.note; } }catch(e){}
setInterval(()=>{ try{ localStorage.setItem('ms-sea-sync', JSON.stringify({cues, bg:buildExport().background, note:D('note').value})); }catch(e){} }, 1500);

renderCues();
</script>
</body>
</html>
