<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>开场仪式 + 锁屏 · 原型</title>
<style>
  :root{
    --star: 205;               /* 星蓝 hue */
    --ink: #e8eef9;
    --mute: rgba(232,238,249,0.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#05070d;overflow:hidden;
    font-family:-apple-system,"PingFang SC","Songti SC",serif;color:var(--ink)}
  canvas#sky{position:fixed;inset:0;width:100%;height:100%;display:block}

  /* ====== 舞台层 ====== */
  .stage{position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:0 32px;pointer-events:none}
  .stage>*{pointer-events:auto}

  .fade{opacity:0;transition:opacity 1.6s ease}
  .fade.in{opacity:1}
  .hidden{display:none !important}

  /* 送礼者手写句 */
  .giftline{font-size:25px;line-height:2.0;letter-spacing:.04em;
    max-width:640px;font-weight:300;
    text-shadow:0 2px 30px rgba(120,170,255,.25)}
  .giftline .cursor{display:inline-block;width:2px;height:1.1em;
    background:var(--ink);vertical-align:-0.18em;margin-left:3px;
    animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  /* 主按钮 */
  .enter-btn{margin-top:46px;padding:15px 40px;border-radius:40px;
    border:1px solid hsla(var(--star),70%,80%,.45);
    background:hsla(var(--star),60%,60%,.08);
    color:var(--ink);font-size:16px;letter-spacing:.18em;cursor:pointer;
    backdrop-filter:blur(6px);transition:.5s;
    box-shadow:0 0 30px hsla(var(--star),70%,60%,.15) inset}
  .enter-btn:hover{background:hsla(var(--star),60%,60%,.18);
    box-shadow:0 0 50px hsla(var(--star),80%,70%,.3)}

  /* 设码 / 锁屏 区 */
  .codewrap{display:flex;flex-direction:column;align-items:center}
  .code-title{font-size:21px;font-weight:300;letter-spacing:.05em;margin-bottom:8px}
  .code-hint{font-size:13px;color:var(--mute);margin-bottom:34px;letter-spacing:.06em}
  .dots{display:flex;gap:22px;margin-bottom:44px}
  .dot{width:13px;height:13px;border-radius:50%;
    border:1px solid hsla(var(--star),60%,80%,.4);
    background:transparent;transition:.35s;position:relative}
  .dot.on{background:hsla(var(--star),85%,75%,1);
    border-color:hsla(var(--star),85%,80%,.9);
    box-shadow:0 0 16px hsla(var(--star),85%,70%,.9)}
  .dots.shake{animation:shake .42s}
  @keyframes shake{0%,100%{transform:translateX(0)}
    20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}

  /* 星座数字盘 */
  .pad{display:grid;grid-template-columns:repeat(3,76px);gap:20px}
  .key{width:76px;height:76px;border-radius:50%;
    border:1px solid hsla(var(--star),50%,75%,.22);
    background:hsla(var(--star),40%,50%,.04);
    color:var(--ink);font-size:26px;font-weight:300;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:.18s;user-select:none}
  .key:hover{background:hsla(var(--star),55%,60%,.16);
    box-shadow:0 0 22px hsla(var(--star),75%,65%,.35)}
  .key:active{transform:scale(.92)}
  .key.blank{border:none;background:none;cursor:default;box-shadow:none}
  .key.fn{font-size:14px;letter-spacing:.05em;color:var(--mute)}

  /* 进入主界面的占位 */
  .home{position:fixed;inset:0;background:#070b14;display:flex;
    align-items:center;justify-content:center;opacity:0;
    transition:opacity 1.2s ease;pointer-events:none}
  .home.in{opacity:1;pointer-events:auto}
  .home .h-inner{text-align:center;color:var(--mute);letter-spacing:.1em}

  /* 顶部进度淡入用 */
  .veil{position:fixed;inset:0;background:#05070d;z-index:5;
    transition:opacity 1.4s ease;pointer-events:none}

  /* ====== 控制 / 批注台（仅原型用，交付时去掉） ====== */
  .panel{position:fixed;top:0;right:0;width:300px;height:100%;
    background:rgba(8,11,18,.92);border-left:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(10px);z-index:50;display:flex;flex-direction:column;
    transform:translateX(calc(100% - 34px));transition:transform .35s;
    font-family:-apple-system,"PingFang SC",sans-serif}
  .panel.open{transform:translateX(0)}
  .panel .tab{position:absolute;left:0;top:50%;transform:translate(-100%,-50%);
    writing-mode:vertical-lr;background:rgba(8,11,18,.92);
    padding:14px 7px;border-radius:8px 0 0 8px;cursor:pointer;
    font-size:12px;letter-spacing:.2em;color:#9bb0d4;border:1px solid rgba(255,255,255,.08);border-right:none}
  .panel h3{font-size:13px;margin:18px 16px 6px;color:#cdd9ef;font-weight:600}
  .panel .ctl{padding:0 16px;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .panel button.b{font-size:12px;padding:7px 11px;border-radius:7px;cursor:pointer;
    background:#1b2740;color:#cfe;border:1px solid rgba(255,255,255,.1)}
  .panel button.b:hover{background:#26365a}
  .panel .notes{flex:1;margin:8px 16px 12px;display:flex;flex-direction:column;min-height:0}
  .panel textarea{flex:1;width:100%;resize:none;border-radius:8px;
    background:#0e1422;color:#dce6f7;border:1px solid rgba(255,255,255,.1);
    padding:10px;font-size:13px;line-height:1.6;font-family:inherit}
  .panel .savebar{display:flex;gap:8px;margin:8px 16px 16px}
  .panel .savebar button{flex:1;font-size:12px;padding:9px;border-radius:7px;cursor:pointer;border:none}
  .panel .savebar .exp{background:#2a6df4;color:#fff}
  .panel .savebar .clr{background:#3a2330;color:#f4b8c8}
  .saved-flash{font-size:11px;color:#7fe0a0;margin:0 16px;height:14px;transition:.3s;opacity:0}
  .saved-flash.show{opacity:1}
  .step-label{position:fixed;left:18px;bottom:16px;z-index:50;
    font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.15em;
    font-family:-apple-system,sans-serif}
</style>
</head>
<body>
<canvas id="sky"></canvas>

<!-- 舞台 -->
<div class="stage" id="stage"></div>

<!-- 进入后的占位主界面 -->
<div class="home" id="home"><div class="h-inner">— 进入「足迹」主界面 —<br><span style="font-size:12px;opacity:.6">（原型到此，真机这里是地球）</span></div></div>

<div class="step-label" id="stepLabel"></div>

<!-- 控制 + 批注台 -->
<div class="panel" id="panel">
  <div class="tab" id="panelTab">批注 / 控制</div>
  <h3>播放</h3>
  <div class="ctl">
    <button class="b" id="playOpen">▶ 开箱全流程</button>
    <button class="b" id="playLock">▶ 锁屏解锁</button>
    <button class="b" id="replay">↻ 重播当前</button>
  </div>
  <h3>跳到某一幕</h3>
  <div class="ctl" id="jumpCtl"></div>
  <h3>批注（自动保存）</h3>
  <div class="saved-flash" id="savedFlash">已保存</div>
  <div class="notes"><textarea id="notes" placeholder="对每一幕的感受、想改的地方都写在这里…
例如：
· 开场微光再慢一点
· 手写句字体想换成更像钢笔的
· 数字盘想要圆点更亮"></textarea></div>
  <div class="savebar">
    <button class="exp" id="exportBtn">导出批注</button>
    <button class="clr" id="clearBtn">清空</button>
  </div>
</div>

<script>
// ============ 星空粒子 ============
const cv = document.getElementById('sky'), ctx = cv.getContext('2d');
let W,H,DPR; function resize(){DPR=Math.min(devicePixelRatio||1,2);
  W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
resize(); addEventListener('resize',resize);

const STAR_HUE = 205;
let stars = [];
function makeStars(n){
  stars = [];
  for(let i=0;i<n;i++){
    const ang = Math.random()*Math.PI*2;
    const r = Math.pow(Math.random(),0.6);   // 向外稀疏
    stars.push({
      ang, r,
      x:0,y:0,
      baseX:(Math.random()-0.5),
      baseY:(Math.random()-0.5),
      size:(Math.random()*1.4+0.3),
      tw:Math.random()*Math.PI*2,           // 闪烁相位
      twSpd:0.5+Math.random()*1.5,
      mem:false,                            // 是否「预置记忆星」
      bornDelay:Math.random()                // 扩散延迟
    });
  }
  // 指定几颗为记忆星
  for(let k=0;k<5;k++){ stars[(k*7+3)%stars.length].mem = true; }
}
makeStars(260);

// 全局动画状态
let spread = 0;      // 0=聚成一点  1=完全铺开
let bright = 1;      // 整体亮度（锁屏时压低）
let memGlow = 0;     // 记忆星额外亮度 0..1
let flyZoom = 1;     // 进入时前掠缩放
let t0 = performance.now();

function draw(now){
  const t = (now - t0)/1000;
  ctx.clearRect(0,0,W,H);
  // 深空底色渐变
  const g = ctx.createRadialGradient(W/2,H*0.46,0, W/2,H*0.46, Math.max(W,H)*0.75);
  g.addColorStop(0, `hsla(${STAR_HUE},45%,${8*bright+2}%,1)`);
  g.addColorStop(1, '#04060c');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  const cx=W/2, cy=H*0.46, maxR=Math.min(W,H)*0.62;
  for(const s of stars){
    // 扩散：从中心一点 → 各自位置
    const sp = Math.max(0, Math.min(1,(spread - s.bornDelay*0.5)/(1-0.0)));
    const ease = sp<0?0:(1-Math.pow(1-sp,3));
    const tx = cx + Math.cos(s.ang)*s.r*maxR*1.4*ease + s.baseX*40*DPR*ease;
    const ty = cy + Math.sin(s.ang)*s.r*maxR*1.0*ease + s.baseY*40*DPR*ease;
    // 前掠
    const fx = cx + (tx-cx)*flyZoom;
    const fy = cy + (ty-cy)*flyZoom;
    const tw = 0.55 + 0.45*Math.sin(s.tw + t*s.twSpd);
    let a = (0.25 + 0.75*tw) * bright * ease;
    let size = s.size*DPR*(0.6+0.4*ease)*flyZoom;
    if(s.mem){
      a = Math.min(1, a + memGlow*0.9);
      size *= (1 + memGlow*0.8);
    }
    ctx.beginPath();
    const hue = s.mem ? STAR_HUE-12 : STAR_HUE;
    const light = s.mem ? 80 : 72;
    ctx.fillStyle = `hsla(${hue},85%,${light}%,${a})`;
    ctx.arc(fx,fy,size,0,Math.PI*2); ctx.fill();
    if((s.mem && memGlow>0.2) || size>1.6*DPR){    // 光晕
      ctx.beginPath();
      ctx.fillStyle = `hsla(${hue},85%,70%,${a*0.12})`;
      ctx.arc(fx,fy,size*4,0,Math.PI*2); ctx.fill();
    }
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// 简单补间
function tween(setter, from, to, dur, ease=(x)=>x, cb){
  const st=performance.now();
  function step(now){
    let k=Math.min(1,(now-st)/dur); const e=ease(k);
    setter(from+(to-from)*e);
    if(k<1) requestAnimationFrame(step); else cb&&cb();
  }
  requestAnimationFrame(step);
}
const easeOut=x=>1-Math.pow(1-x,3);
const easeInOut=x=>x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2;

// ============ 音乐 ============
let audio;
function startMusic(){
  try{
    if(!audio){audio=new Audio('../assets/bgm/app-bgm.mp3');audio.loop=true;audio.volume=0;}
    audio.play().then(()=>tweenVol(0.32,2500)).catch(()=>{});
  }catch(e){}
}
function tweenVol(to,dur){ if(!audio)return; const f=audio.volume,st=performance.now();
  (function s(n){let k=Math.min(1,(n-st)/dur);audio.volume=f+(to-f)*k;if(k<1)requestAnimationFrame(s);})(performance.now()); }

// ============ 舞台内容 ============
const stage = document.getElementById('stage');
const home = document.getElementById('home');
const stepLabel = document.getElementById('stepLabel');
function clearStage(){ stage.innerHTML=''; }
function setLabel(t){ stepLabel.textContent = t; }

const GIFT_TEXT = '这是我们一起走过的地方，\n和那些舍不得忘记的时刻。\n现在，它们都住在这片星空里了。';

// —— 开箱全流程 ——
let flowTimers=[];
function clearTimers(){ flowTimers.forEach(clearTimeout); flowTimers=[]; }
function after(ms,fn){ flowTimers.push(setTimeout(fn,ms)); }

function playOpening(){
  clearTimers(); clearStage(); home.classList.remove('in');
  makeStars(260);
  spread=0; bright=1; memGlow=0; flyZoom=1; t0=performance.now();
  setLabel('开箱 · 1/5 微光');

  // 1. 一点微光（中心一颗渐亮）— 用 spread=0 时所有星聚中心，先整体暗
  bright=0.0;
  tween(v=>bright=v, 0, 1, 1800, easeOut);
  startMusic();

  // 2. 扩散成星场
  after(1500, ()=>{ setLabel('开箱 · 2/5 星空展开');
    tween(v=>spread=v, 0, 1, 2600, easeOut); });

  // 3. 记忆星先亮
  after(4200, ()=>{ setLabel('开箱 · 3/5 已为你点亮的记忆');
    tween(v=>memGlow=v, 0, 1, 1400, easeInOut); });

  // 4. 手写句逐字浮现
  after(5600, ()=>{ setLabel('开箱 · 4/5 送礼者的话'); showGiftLine(); });
}

function showGiftLine(){
  clearStage();
  const p=document.createElement('div'); p.className='giftline';
  const span=document.createElement('span'); p.appendChild(span);
  const cur=document.createElement('span'); cur.className='cursor'; p.appendChild(cur);
  stage.appendChild(p);
  // 逐字
  let i=0; const txt=GIFT_TEXT;
  (function type(){
    if(i<=txt.length){
      span.innerHTML = txt.slice(0,i).replace(/\n/g,'<br>');
      i++;
      flowTimers.push(setTimeout(type, txt[i-1]==='\n'?420:95));
    } else {
      flowTimers.push(setTimeout(()=>{ cur.style.display='none'; showEnterBtn(); }, 900));
    }
  })();
}

function showEnterBtn(){
  const b=document.createElement('button'); b.className='enter-btn fade';
  b.textContent='进入你的宇宙';
  stage.appendChild(b);
  requestAnimationFrame(()=>b.classList.add('in'));
  b.onclick=()=>{ b.classList.remove('in');
    after(500, ()=>{ setLabel('开箱 · 5/5 设一组暗语'); showSetCode(); }); };
}

// —— 设码（开箱内）/ 锁屏 共用数字盘 ——
const CODE_LEN = 4;
function buildCodeUI({title, hint, onComplete, lock=false}){
  clearStage();
  const wrap=document.createElement('div'); wrap.className='codewrap fade';
  wrap.innerHTML = `
    <div class="code-title">${title}</div>
    <div class="code-hint">${hint}</div>
    <div class="dots" id="dots">${Array(CODE_LEN).fill('<div class="dot"></div>').join('')}</div>
    <div class="pad" id="pad"></div>`;
  stage.appendChild(wrap);
  requestAnimationFrame(()=>wrap.classList.add('in'));

  const pad=wrap.querySelector('#pad');
  const dotsEl=wrap.querySelector('#dots');
  let buf='';
  const keys=['1','2','3','4','5','6','7','8','9','del','0','ok'];
  keys.forEach(k=>{
    const el=document.createElement('div');
    if(k==='del'){el.className='key fn';el.textContent='删除';}
    else if(k==='ok'){el.className='key fn';el.textContent='确定';}
    else {el.className='key';el.textContent=k;}
    pad.appendChild(el);
    el.onclick=()=>{
      if(k==='del'){ buf=buf.slice(0,-1); }
      else if(k==='ok'){ if(buf.length===CODE_LEN) onComplete(buf, dotsEl, ()=>{buf='';paint();}); return; }
      else if(buf.length<CODE_LEN){ buf+=k; }
      paint();
      if(buf.length===CODE_LEN){ /* 满了自动提交 */ setTimeout(()=>onComplete(buf,dotsEl,()=>{buf='';paint();}),180); }
    };
  });
  function paint(){ [...dotsEl.children].forEach((d,i)=>d.classList.toggle('on', i<buf.length)); }
  paint();
}

// 开箱里的「设码」：两次确认
function showSetCode(){
  let first=null;
  buildCodeUI({
    title:'设一组只有你记得的数字',
    hint:'比如一个重要的日子 · 之后用它进入，存在本地、无法找回',
    onComplete:(code, dotsEl, reset)=>{
      if(!first){ first=code; reset();
        // 切到「再输一次」
        after(120, ()=> buildCodeUI({
          title:'再输入一次',
          hint:'确认你记住了',
          onComplete:(code2, dotsEl2, reset2)=>{
            if(code2===first){ enterHome(); }
            else { dotsEl2.classList.add('shake'); setTimeout(()=>dotsEl2.classList.remove('shake'),450); reset2(); }
          }}));
      }
    }});
}

// 锁屏：演示正确码 = 0512（写死给原型试）
const DEMO_CODE='0512';
function playLock(){
  clearTimers(); clearStage(); home.classList.remove('in');
  makeStars(260);
  spread=1; bright=0.32; memGlow=0; flyZoom=1; t0=performance.now();   // 沉睡星空
  setLabel('锁屏 · 沉睡的星空（演示正确暗语 0512）');
  after(200,()=> buildCodeUI({
    title:'输入你的暗语',
    hint:'　',
    lock:true,
    onComplete:(code, dotsEl, reset)=>{
      if(code===DEMO_CODE){ wakeAndEnter(); }
      else { dotsEl.classList.add('shake'); setTimeout(()=>dotsEl.classList.remove('shake'),450); reset(); }
    }}));
  startMusic();
}
function wakeAndEnter(){
  setLabel('锁屏 · 星星苏醒');
  clearStage();
  tween(v=>bright=v, 0.32, 1, 1400, easeOut);
  tween(v=>memGlow=v, 0, 0.7, 1400, easeInOut, ()=> enterHome());
}

// 进入主界面：星空前掠 + 淡入 home
function enterHome(){
  setLabel('进入主界面');
  clearStage();
  tween(v=>flyZoom=v, 1, 2.4, 1300, x=>x*x, ()=>{});
  tween(v=>bright=v, bright, 0.2, 1300, easeInOut);
  after(700, ()=> home.classList.add('in'));
}

// ============ 控制台 ============
const panel=document.getElementById('panel');
document.getElementById('panelTab').onclick=()=>panel.classList.toggle('open');
document.getElementById('playOpen').onclick=()=>{currentFlow='open';playOpening();};
document.getElementById('playLock').onclick=()=>{currentFlow='lock';playLock();};
document.getElementById('replay').onclick=()=>{ currentFlow==='lock'?playLock():playOpening(); };
let currentFlow='open';

// 跳幕
const jumps=[
  ['微光',()=>{playOpening();}],
  ['星空展开',()=>{clearTimers();clearStage();makeStars(260);bright=1;memGlow=0;flyZoom=1;spread=0;t0=performance.now();tween(v=>spread=v,0,1,2200,easeOut);setLabel('星空展开');}],
  ['记忆星',()=>{clearTimers();clearStage();spread=1;bright=1;flyZoom=1;memGlow=0;tween(v=>memGlow=v,0,1,1200,easeInOut);setLabel('记忆星');}],
  ['手写句',()=>{clearTimers();spread=1;bright=1;memGlow=1;flyZoom=1;showGiftLine();}],
  ['设暗语',()=>{clearTimers();spread=1;bright=1;memGlow=.6;flyZoom=1;showSetCode();}],
  ['锁屏',()=>{currentFlow='lock';playLock();}],
];
const jumpCtl=document.getElementById('jumpCtl');
jumps.forEach(([n,fn])=>{const b=document.createElement('button');b.className='b';b.textContent=n;b.onclick=fn;jumpCtl.appendChild(b);});

// 批注
const NK='ms-entry-proto-notes';
const ta=document.getElementById('notes');
ta.value=localStorage.getItem(NK)||'';
let sT;
ta.addEventListener('input',()=>{clearTimeout(sT);sT=setTimeout(()=>{
  localStorage.setItem(NK,ta.value);
  const f=document.getElementById('savedFlash');f.classList.add('show');setTimeout(()=>f.classList.remove('show'),1200);
},500);});
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([`# 开场仪式原型 · 批注\n生成时间：${new Date().toLocaleString()}\n\n${ta.value}`],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='开场仪式-批注.md';a.click();
};
document.getElementById('clearBtn').onclick=()=>{if(confirm('清空批注？')){ta.value='';localStorage.removeItem(NK);}};

// 首次自动开场（需用户点一下才有声）
setLabel('点任意处或「▶ 开箱全流程」开始');
addEventListener('click',function once(){ if(stage.children.length===0 && !home.classList.contains('in')) playOpening(); removeEventListener('click',once); }, {once:true});
</script>
</body>
</html>
