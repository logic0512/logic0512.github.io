    --text: #ece2d4;
    --mute: rgba(220, 200, 175, 0.65);

    --accent: #f5dca8;
    --good: #8ec694;
    --warn: #e4c772;
    --bad: #d88a8a;
    --info: #8fb5d8;
    --new: #c4a8d8;

    position: sticky; top: 0;

    border-bottom: 1px solid var(--line-strong);
    z-index: 100;
    padding: 12px 36px;
  }
  .nav-inner {

    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .nav-inner .stats {

    font-size: 11.5px;
    color: var(--mute-2);
    margin-right: 12px;
  }
  .nav-inner .stats strong { color: var(--accent); }
  .nav-link {
    padding: 5px 11px;
    border-radius: 5px;
    font-size: 12px;
    color: var(--mute);
    text-decoration: none;
    border: 1px solid transparent;

    color: var(--good);
    background: rgba(142, 198, 148, 0.12);

  .nav-bar .actions {

    display: flex;
    gap: 8px;

    font-family: inherit;
    font-size: 11.5px;

    padding: 0 36px;

    border-radius: 16px;
    border: 1px solid var(--line);

    overflow: hidden;
  }
  .section-head {
    padding: 18px 24px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;

  .section-head .num {

    font-size: 22px;

    font-size: 11px;
    color: var(--mute-2);
    padding: 4px 9px;
    background: rgba(0, 0, 0, 0.3);

  .section-head .progress strong { color: var(--accent); }
  .section-head .copy-btn {

    border: 1px solid rgba(143, 181, 216, 0.32);

    font-family: inherit;
    font-size: 11px;

    font-family: var(--type-mono);
    font-size: 14px;
    transition: transform 200ms ease;
  }

  .item {
    padding: 14px 0;
    border-bottom: 1px solid rgba(255, 240, 200, 0.05);

    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;

  .item-head .id {

    font-size: 11px;

  .tag.new { background: rgba(180, 140, 220, 0.18); color: var(--new); }

  .item-head .decision-summary {

    font-family: var(--type-mono);

    color: var(--good);
    background: rgba(142, 198, 148, 0.10);
    padding: 2px 8px;
    border-radius: 3px;
    display: none;

    gap: 8px 16px;
    margin-bottom: 6px;
    align-items: start;

    color: var(--mute-2);

  .item-row .value.actual { color: rgba(220, 200, 175, 0.85); }

  .item-controls {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 8px 16px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(255, 240, 200, 0.06);

  .decision-select {
    display: flex;
    gap: 6px;

  .decision-btn {
    padding: 4px 11px;
    border-radius: 4px;
    border: 1px solid var(--line-strong);
    background: transparent;
    color: var(--mute);
    cursor: pointer;
    font-family: inherit;

    width: 100%;
    background: var(--surface-3);
    border: 1px solid var(--line-strong);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 5px;
    font-family: inherit;

    background: rgba(0,0,0,0.18);
    border-radius: 6px;

    border-radius: 3px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 140ms ease;
    color: var(--mute);

    font-size: 11px;

  .filter-bar .filt.active { background: rgba(255,220,168,0.16); color: var(--accent); border-color: var(--accent); }

  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(140%);
    padding: 10px 22px;
    background: var(--surface-2);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 99px;
    font-size: 12px;
    z-index: 999;
    transition: transform 280ms ease;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

      { id: 'CM-13', status: 'unknown', prd: '介绍卡动画治愈跟其他星不一致（用户最新反馈）', actual: '❓ 待修' },

// 状态标签
const STATUS_LABELS = {
  ok: '一致',
  partial: '部分偏离',
  major: '重大偏离',
  new: 'PRD 没说',
  unknown: '待验证'
};

// ──────────────────────────────────────────────
// 持久化
// ──────────────────────────────────────────────
const STORAGE_KEY = 'memory-sparks-prd-review-2026-06-01';
const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function getItemState(id) {
  if (!state[id]) state[id] = { decision: '', note: '' };
  return state[id];
}

// ──────────────────────────────────────────────
// 渲染
// ──────────────────────────────────────────────
function renderItem(it) {
  const s = getItemState(it.id);
  const decisionMap = {
    'revert': '改回 PRD',
    'adopt': '替换 PRD',
    'both': '两版并存',
    'defer': '待定',
    'skip': '不处理'
  };
  return `
    <div class="item${s.decision ? ' decided' : ''}" data-id="${it.id}" data-status="${it.status}">
      <div class="item-head">
        <span class="id">${it.id}</span>
        <span class="tag ${it.status}">${STATUS_LABELS[it.status]}</span>
        <span class="decision-summary">${decisionMap[s.decision] || ''}</span>
      </div>
      <div class="item-row">
        <div class="label">PRD</div>
        <div class="value prd">${it.prd}</div>
      </div>
      <div class="item-row">
        <div class="label">实际</div>
        <div class="value actual">${it.actual}</div>
      </div>
      <div class="item-controls">
        <div class="label">裁决</div>
        <div class="decision-select">
          <button class="decision-btn revert ${s.decision === 'revert' ? 'active' : ''}" onclick="setDecision('${it.id}', 'revert')">改回 PRD</button>
          <button class="decision-btn adopt ${s.decision === 'adopt' ? 'active' : ''}" onclick="setDecision('${it.id}', 'adopt')">替换 PRD</button>
          <button class="decision-btn both ${s.decision === 'both' ? 'active' : ''}" onclick="setDecision('${it.id}', 'both')">两版并存</button>
          <button class="decision-btn defer ${s.decision === 'defer' ? 'active' : ''}" onclick="setDecision('${it.id}', 'defer')">待定</button>
          <button class="decision-btn skip ${s.decision === 'skip' ? 'active' : ''}" onclick="setDecision('${it.id}', 'skip')">不处理</button>
        </div>
      </div>
      <div class="item-controls">
        <div class="label">备注</div>
        <textarea class="note-textarea${s.note ? ' has-content' : ''}" placeholder="给我的具体反馈 / 改的细节 / 待补充想法..." oninput="setNote('${it.id}', this)">${s.note || ''}</textarea>
      </div>
    </div>
  `;
}

function renderSection(sec) {
  const total = sec.items.length;
  const done = sec.items.filter(it => state[it.id]?.decision).length;
  const itemsHTML = sec.items.map(renderItem).join('');
  return `
    <section class="section" id="${sec.key}">
      <div class="section-head" onclick="toggleSection('${sec.key}', event)">
        <span class="num">${sec.num}</span>
        <div class="title-block">
          <h2>${sec.title}</h2>
          <div class="meta">${sec.prdRef} · ${sec.fileRef}</div>
        </div>
        <span class="progress" data-progress="${sec.key}">${done}/${total}</span>
        <button class="copy-btn" onclick="copySection('${sec.key}', this); event.stopPropagation();">复制本节</button>
        <span class="chev">▼</span>
      </div>
      <div class="section-body">
        <div class="filter-bar">
          筛选：
          <button class="filt active" data-filter="all" onclick="filterSection('${sec.key}', 'all', this)">全部</button>
          <button class="filt" data-filter="major" onclick="filterSection('${sec.key}', 'major', this)">仅重大偏离</button>
          <button class="filt" data-filter="new" onclick="filterSection('${sec.key}', 'new', this)">仅 PRD 没说</button>
          <button class="filt" data-filter="undecided" onclick="filterSection('${sec.key}', 'undecided', this)">未裁决</button>
          <button class="filt" data-filter="decided" onclick="filterSection('${sec.key}', 'decided', this)">已裁决</button>
        </div>
        ${itemsHTML}
      </div>
    </section>
  `;
}

function renderAll() {
  document.getElementById('sections').innerHTML = SECTIONS.map(renderSection).join('');
  updateGlobal();
}

// ──────────────────────────────────────────────
// 交互
// ──────────────────────────────────────────────
function setDecision(id, decision) {
  const s = getItemState(id);
  s.decision = s.decision === decision ? '' : decision; // 再点取消
  saveState();
  rerenderItem(id);
  updateSectionProgress(id);
  updateGlobal();
}

function setNote(id, el) {
  const s = getItemState(id);
  s.note = el.value;
  saveState();
  el.classList.toggle('has-content', !!s.note);
}

function rerenderItem(id) {
  const itemEl = document.querySelector(`.item[data-id="${id}"]`);
  if (!itemEl) return;
  // 重建该项
  let sec, it;
  for (const s of SECTIONS) {
    const found = s.items.find(x => x.id === id);
    if (found) { sec = s; it = found; break; }
  }
  if (it) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = renderItem(it);
    const newEl = wrapper.firstElementChild;
    // 保留 textarea 焦点
    const oldTextarea = itemEl.querySelector('textarea');
    const wasFocused = document.activeElement === oldTextarea;
    const cursorPos = oldTextarea ? oldTextarea.selectionStart : null;
    itemEl.replaceWith(newEl);
    if (wasFocused) {
      const newTextarea = newEl.querySelector('textarea');
      newTextarea.focus();
      if (cursorPos != null) newTextarea.setSelectionRange(cursorPos, cursorPos);
    }
  }
}

function updateSectionProgress(id) {
  for (const sec of SECTIONS) {
    if (sec.items.some(x => x.id === id)) {
      const total = sec.items.length;
      const done = sec.items.filter(it => state[it.id]?.decision).length;
      const el = document.querySelector(`[data-progress="${sec.key}"]`);
      if (el) el.innerHTML = `${done}/${total}`;
      // 更新 nav-link 状态
      const link = document.querySelector(`.nav-link[href="#${sec.key}"]`);
      if (link) link.classList.toggle('has-decisions', done > 0);
      break;
    }
  }
}

function updateGlobal() {
  let total = 0, done = 0;
  SECTIONS.forEach(sec => sec.items.forEach(it => {
    total++;
    if (state[it.id]?.decision) done++;
  }));
  document.getElementById('globalDoneCount').textContent = done;
  // 也更新 nav-link 状态
  SECTIONS.forEach(sec => {
    const sectionDone = sec.items.filter(it => state[it.id]?.decision).length;
    const link = document.querySelector(`.nav-link[href="#${sec.key}"]`);
    if (link) link.classList.toggle('has-decisions', sectionDone > 0);
  });
}

function toggleSection(key, evt) {
  if (evt.target.classList.contains('copy-btn')) return;
  const sec = document.getElementById(key);
  sec.classList.toggle('collapsed');
}

function expandAll(expand) {
  document.querySelectorAll('.section').forEach(s => {
    s.classList.toggle('collapsed', !expand);
  });
}

function filterSection(key, filter, btnEl) {
  const sec = document.getElementById(key);
  sec.querySelectorAll('.filt').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  sec.querySelectorAll('.item').forEach(item => {
    const status = item.dataset.status;
    const decided = item.classList.contains('decided');
    let show = true;
    if (filter === 'major') show = status === 'major';
    else if (filter === 'new') show = status === 'new';
    else if (filter === 'undecided') show = !decided;
    else if (filter === 'decided') show = decided;
    item.classList.toggle('hidden', !show);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ──────────────────────────────────────────────
// 复制（导出 markdown）
// ──────────────────────────────────────────────
const decisionMap = {
  'revert': '🔴 改回 PRD',
  'adopt': '🟢 替换 PRD',
  'both': '🟣 两版并存',
  'defer': '🟡 待定',
  'skip': '⚪ 不处理',
  '': '（未裁决）'
};

function buildSectionMarkdown(sec, onlyDecided = false) {
  const lines = [`## ${sec.num} · ${sec.title}`, `> ${sec.prdRef} · \`${sec.fileRef}\``, ''];
  let any = false;
  sec.items.forEach(it => {
    const s = state[it.id] || {};
    if (onlyDecided && !s.decision && !s.note) return;
    any = true;
    lines.push(`### ${it.id} · ${STATUS_LABELS[it.status]}`);
    lines.push(`- **PRD**：${it.prd}`);
    lines.push(`- **实际**：${it.actual}`);
    if (s.decision) lines.push(`- **裁决**：${decisionMap[s.decision]}`);
    if (s.note) lines.push(`- **备注**：${s.note}`);
    lines.push('');
  });
  if (!any) return null;
  return lines.join('\n');
}

function copySection(key, btn) {
  const sec = SECTIONS.find(x => x.key === key);
  if (!sec) return;
  const md = buildSectionMarkdown(sec, false);
  navigator.clipboard.writeText(md || '（本节无内容）').then(() => {
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制本节'; btn.classList.remove('copied'); }, 1800);
  });
}

function copyDecided() {
  const parts = [];
  SECTIONS.forEach(sec => {
    const md = buildSectionMarkdown(sec, true);
    if (md) parts.push(md);
  });
  if (parts.length === 0) { showToast('还没有任何裁决/备注'); return; }
  navigator.clipboard.writeText(parts.join('\n\n---\n\n')).then(() => showToast('已复制全部裁决/备注'));
}

function resetAll() {
  if (!confirm('确定清空所有裁决和备注？')) return;
  Object.keys(state).forEach(k => delete state[k]);
  saveState();
  renderAll();
  showToast('已清空');
}

renderAll();
</script>
