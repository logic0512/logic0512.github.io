<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>重要时刻 · 手帐 v8（冷调考究配色：晨光 / 青瓷）</title>
<style>
  :root{
    /* ===== 默认 = 晨光（冷调灰蓝纸 + 午夜藏青装订 + 烫金单点缀） ===== */
    --paper:#e9ebf1; --paper-2:#e2e5ee; --paper-3:#dadeea;
    --stain:rgba(70,90,140,.06); --stain-2:rgba(60,80,130,.05);
    --top-glow:rgba(240,224,170,.34);
    --line:rgba(184,160,106,.30);
    --leather:#16223c; --leather-2:#0e1830; --leather-edge:#091022;
    --ink:#2a3350; --ink-soft:#697398; --brass:#c19a52;
    --noise-op:.4; --tape-2:rgba(90,100,135,.4);
    --gold:#ecd9a0;
    --hand-cn:'Kaiti SC','STKaiti','Songti SC',serif;
    --serif:'Songti SC','Source Han Serif SC','STSong',serif;
    --hand-en:'Snell Roundhand','Brush Script MT',cursive;
    --body:'PingFang SC',-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1); --LH:34px;
  }
  /* ===== 青瓷（极淡灰青绿纸 + 藏青装订 + 古铜单点缀） ===== */
  body.theme-celadon{
    --paper:#e6e9e1; --paper-2:#dfe3d8; --paper-3:#d7dccd;
    --stain:rgba(90,120,90,.06); --stain-2:rgba(110,139,106,.05);
    --top-glow:rgba(250,252,244,.34);
    --line:rgba(120,135,100,.28);
    --leather:#16223c; --leather-2:#0e1830; --leather-edge:#091022;
    --ink:#2c3a32; --ink-soft:#6a766a; --brass:#9c854c;
    --noise-op:.45; --tape-2:rgba(110,130,100,.4);
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--body);overflow:hidden;
    background:radial-gradient(ellipse 90% 80% at 50% 30%,#aab0c0 0%,#8d93a6 60%,#767c90 100%);
    display:flex;align-items:center;justify-content:center;transition:background .5s ease;}
  body.theme-celadon{background:radial-gradient(ellipse 90% 80% at 50% 30%,#aeb4a4 0%,#929a86 60%,#7c846e 100%);}

  /* 配色切换器 */
  .switch{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:60;display:flex;gap:6px;
    background:rgba(255,255,255,.16);backdrop-filter:blur(12px);padding:6px;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,.25);}
  .sw{font-size:12px;letter-spacing:.04em;color:#2a3550;background:transparent;border:0;padding:7px 16px;border-radius:999px;cursor:pointer;font-family:var(--body);transition:all .2s;}
  .sw:hover{background:rgba(255,255,255,.25);}
  .sw.on{background:#fff;color:#18233d;box-shadow:0 2px 6px rgba(0,0,0,.15);}

  .hint{position:fixed;top:58px;left:0;right:0;text-align:center;z-index:40;font-size:12px;letter-spacing:.12em;color:rgba(255,255,255,.85);pointer-events:none;transition:opacity .4s ease;}
  .hint b{color:#fff;}

  .stage{position:relative;width:min(95vw,1000px);height:min(82vh,620px);perspective:2400px;z-index:10;}

  /* ── 封面（固定藏青小王子，是锚） ── */
  .cover{position:absolute;inset:0;margin:auto;width:50%;height:97%;left:0;right:0;cursor:pointer;z-index:20;overflow:hidden;
    border-radius:6px 12px 12px 6px;
    background:radial-gradient(ellipse 100% 70% at 50% 24%,#20304e 0%,#131d33 55%,#0a1120 100%);
    box-shadow:0 34px 70px rgba(20,28,48,.6),inset 0 0 0 1px rgba(236,217,160,.16);
    transform-origin:left center;transition:transform 1s var(--ease),opacity .5s ease .45s;}
  .cover .frame{position:absolute;inset:14px;border:1px solid rgba(236,217,160,.34);border-radius:6px;z-index:4;pointer-events:none;}
  .cover .stars{position:absolute;inset:0;z-index:1;pointer-events:none;
    background-image:radial-gradient(1.4px 1.4px at 20% 18%,rgba(255,255,255,.8),transparent),radial-gradient(1.2px 1.2px at 70% 12%,rgba(255,255,255,.7),transparent),radial-gradient(1.3px 1.3px at 82% 30%,rgba(255,255,255,.6),transparent),radial-gradient(1.1px 1.1px at 32% 8%,rgba(255,255,255,.6),transparent),radial-gradient(1.2px 1.2px at 12% 40%,rgba(255,255,255,.5),transparent);}
  .cover .art{position:absolute;bottom:-1.5%;left:50%;transform:translateX(-50%);width:96%;z-index:2;filter:drop-shadow(0 12px 28px rgba(0,0,0,.45));}
  .cover .ctitle{position:absolute;top:42px;left:0;right:0;text-align:center;z-index:5;}
  .cover .ctitle .zh{font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:.34em;background:linear-gradient(180deg,#f6e8b8,#c8a85e);-webkit-background-clip:text;background-clip:text;color:transparent;padding-left:.34em;}
  .cover .ctitle .en{font-family:var(--hand-en);font-size:17px;color:rgba(236,217,160,.78);margin-top:8px;}
  .cover .open-tip{position:absolute;bottom:22px;left:0;right:0;text-align:center;font-size:11px;color:rgba(236,217,160,.7);letter-spacing:.22em;z-index:5;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
  .stage.open .cover{transform:rotateY(-160deg);opacity:0;pointer-events:none;}

  /* ── 内页 ── */
  .spread{position:absolute;inset:0;border-radius:10px;display:flex;padding:13px;
    background:linear-gradient(180deg,var(--leather-2),var(--leather-edge));box-shadow:0 40px 90px rgba(20,20,30,.5);
    opacity:0;transform:scale(.96);pointer-events:none;transition:opacity .6s ease .55s,transform .6s var(--ease) .55s,background .5s ease;}
  .stage.open .spread{opacity:1;transform:scale(1);pointer-events:auto;}
  .book{position:relative;flex:1;display:flex;border-radius:4px;overflow:hidden;box-shadow:inset 0 0 40px rgba(20,20,30,.35);}
  .book::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:42px;transform:translateX(-50%);z-index:6;pointer-events:none;
    background:linear-gradient(90deg,rgba(20,24,40,0),rgba(20,24,40,.22) 45%,rgba(20,24,40,.22) 55%,rgba(20,24,40,0));}
  .page{position:relative;width:50%;height:100%;overflow:hidden;transition:background .5s ease;
    background:
      radial-gradient(ellipse 42% 30% at 16% 20%, var(--stain), transparent 62%),
      radial-gradient(ellipse 32% 26% at 84% 72%, var(--stain), transparent 60%),
      radial-gradient(ellipse 50% 40% at 60% 100%, var(--stain-2), transparent 70%),
      radial-gradient(ellipse 60% 50% at 50% 0%, var(--top-glow), transparent 60%),
      linear-gradient(160deg,var(--paper),var(--paper-2) 60%,var(--paper-3));}
  .page.left{box-shadow:inset -20px 0 30px -18px rgba(20,20,30,.4), inset 30px 24px 50px -30px rgba(20,20,30,.3);}
  .page.right{box-shadow:inset 20px 0 30px -18px rgba(20,20,30,.4), inset -30px 24px 50px -30px rgba(20,20,30,.3);}
  .page::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:var(--noise-op);mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/></svg>");}
  .page-inner{position:relative;z-index:2;height:100%;padding:34px 38px;display:flex;flex-direction:column;}
  .pageno{position:absolute;bottom:14px;font-family:var(--hand-en);font-size:14px;color:var(--ink-soft);z-index:4;}
  .page.left .pageno{left:38px;} .page.right .pageno{right:38px;}

  .stamp{align-self:flex-start;font-family:var(--serif);font-size:14px;letter-spacing:.14em;color:var(--brass);
    border:1.5px solid var(--brass);border-radius:3px;padding:5px 12px;transform:rotate(-2deg);font-variant-numeric:tabular-nums;
    position:relative;z-index:5;background:rgba(255,255,255,.06);}
  .stamp small{font-family:var(--hand-cn);font-size:12px;color:var(--ink-soft);margin-left:7px;letter-spacing:.05em;}

  .write{flex:1;margin-top:16px;font-family:var(--hand-cn);font-size:18px;line-height:var(--LH);color:var(--ink);
    outline:none;letter-spacing:.02em;overflow-y:auto;
    background-image:repeating-linear-gradient(180deg,transparent 0 calc(var(--LH) - 1px),var(--line) calc(var(--LH) - 1px) var(--LH));
    background-attachment:local;background-position:0 0;}
  .write:empty::before{content:'今天想记下点什么……';color:var(--ink-soft);opacity:.5;}

  .rslot{margin:auto;width:178px;height:128px;border-radius:6px;border:2px dashed var(--ink-soft);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--ink-soft);
    background:rgba(255,255,255,.05);transition:all .3s var(--ease);position:relative;z-index:2;opacity:.85;}
  .rslot:hover{border-color:var(--brass);color:var(--brass);opacity:1;transform:scale(1.03);}
  .rslot .ic{font-size:22px;} .rslot .t{font-family:var(--hand-cn);font-size:14px;} .rslot .t2{font-family:var(--hand-en);font-size:11px;opacity:.7;}
  .rnote{font-family:var(--hand-cn);font-size:15px;color:var(--ink-soft);text-align:center;margin-top:8px;outline:none;position:relative;z-index:2;}
  .rnote:empty::before{content:'写一句…';opacity:.5;}

  .photolayer{position:absolute;inset:0;z-index:20;pointer-events:none;}
  .photo{position:absolute;background:#fbf6ea;padding:8px;border-radius:2px;box-shadow:0 14px 30px rgba(20,16,30,.45),0 2px 6px rgba(20,16,30,.3);
    cursor:grab;transition:box-shadow .18s;pointer-events:auto;user-select:none;-webkit-user-select:none;}
  .photo::after{content:'';position:absolute;inset:0;border-radius:2px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.7);pointer-events:none;}
  .photo:hover{box-shadow:0 20px 40px rgba(20,16,30,.55),0 3px 8px rgba(20,16,30,.35);}
  .photo img{display:block;border-radius:1px;background:#ddd;pointer-events:none;}
  .photo .cap{font-family:var(--hand-en);font-size:15px;color:#473a2a;text-align:center;padding:6px 2px 2px;outline:none;min-height:14px;}
  .photo .cap:empty::before{content:'caption…';color:#b9a98a;font-size:12px;}
  .photo .tape{position:absolute;top:-9px;left:50%;width:54px;height:19px;background:var(--tape-2);box-shadow:0 2px 4px rgba(0,0,0,.1);}
  .photo .del{position:absolute;top:-9px;right:-9px;width:21px;height:21px;border-radius:50%;border:0;background:var(--leather);color:#fff;font-size:12px;cursor:pointer;opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;}
  .photo:hover .del{opacity:1;}

  .toc-head{font-family:var(--hand-cn);font-size:24px;color:var(--ink);letter-spacing:.1em;}
  .toc-head .en{font-family:var(--hand-en);font-size:17px;color:var(--brass);margin-left:10px;}
  .toc-rule{height:1.5px;background:var(--brass);width:54px;margin:8px 0 18px;border-radius:2px;}
  .toc-list{list-style:none;overflow-y:auto;flex:1;}
  .toc-item{display:flex;align-items:baseline;gap:10px;padding:11px 4px;cursor:pointer;border-bottom:1px dashed var(--line);}
  .toc-item:hover{background:rgba(255,255,255,.05);}
  .toc-date{font-family:var(--serif);font-size:12.5px;color:var(--ink-soft);width:74px;flex-shrink:0;font-variant-numeric:tabular-nums;}
  .toc-prev{font-family:var(--hand-cn);font-size:15px;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .toc-pg{font-family:var(--hand-en);font-size:14px;color:var(--ink-soft);flex-shrink:0;}
  .toc-empty{font-family:var(--hand-cn);color:var(--ink-soft);font-size:15px;margin-top:20px;line-height:2;}

  .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:30;width:40px;height:40px;border-radius:50%;border:0;
    background:rgba(255,255,255,.5);backdrop-filter:blur(6px);color:var(--leather);font-size:19px;cursor:pointer;
    box-shadow:0 6px 16px rgba(20,20,30,.3);transition:all .25s var(--ease);display:flex;align-items:center;justify-content:center;}
  .nav:hover{transform:translateY(-50%) scale(1.1);}
  .nav.prev{left:-5px;} .nav.next{right:-5px;}

  .leaf{position:absolute;top:13px;bottom:13px;width:calc(50% - 13px);z-index:25;pointer-events:none;
    background:linear-gradient(160deg,var(--paper),var(--paper-2));transform-style:preserve-3d;box-shadow:0 0 40px rgba(20,20,30,.35);opacity:0;}
  .leaf.right{right:13px;transform-origin:left center;}
  .leaf.flip{animation:flipNext .72s var(--ease) forwards;}
  @keyframes flipNext{from{opacity:1;transform:rotateY(0);}to{opacity:1;transform:rotateY(-178deg);}}
  .leaf.left{left:13px;transform-origin:right center;}
  .leaf.flipback{animation:flipPrev .72s var(--ease) forwards;}
  @keyframes flipPrev{from{opacity:1;transform:rotateY(0);}to{opacity:1;transform:rotateY(178deg);}}

  .toolbar{position:absolute;left:-52px;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column;gap:8px;
    background:rgba(255,255,255,.7);backdrop-filter:blur(10px);padding:9px 8px;border-radius:16px;box-shadow:0 8px 24px rgba(20,20,30,.3);}
  .tb{font-size:12px;letter-spacing:.04em;color:var(--leather);background:transparent;border:0;padding:12px 10px;border-radius:11px;cursor:pointer;
    font-family:var(--body);transition:background .2s;writing-mode:vertical-rl;text-orientation:upright;line-height:1.1;}
  .tb:hover{background:rgba(120,120,140,.18);}
  .tb.primary{background:var(--leather);color:#f3e8d4;}
</style>
</head>
<body class="theme-dawn">
  <div class="switch">
    <button class="sw on" data-t="dawn">晨光</button>
    <button class="sw" data-t="celadon">青瓷</button>
  </div>
  <div class="hint" id="hint"><b>点封面</b>翻开 · 上方切换两套冷调配色对比</div>

  <div class="stage" id="stage">
    <div class="cover" id="cover">
      <div class="stars"></div>
      <img class="art" src="assets/cover-prince.png" alt="" />
      <div class="ctitle"><div class="zh">重要时刻</div><div class="en">my little planet</div></div>
      <div class="frame"></div>
      <div class="open-tip">轻触翻开 →</div>
    </div>
    <div class="spread">
      <button class="nav prev" id="navPrev">‹</button>
      <button class="nav next" id="navNext">›</button>
      <div class="book" id="book">
        <div class="page left"><div class="page-inner" id="pageL"></div><span class="pageno" id="pnL"></span></div>
        <div class="page right"><div class="page-inner" id="pageR"></div><span class="pageno" id="pnR"></span></div>
        <div class="photolayer" id="photolayer"></div>
      </div>
      <div class="leaf right" id="leafR"></div>
      <div class="leaf left" id="leafL"></div>
    </div>
    <div class="toolbar">
      <button class="tb" id="btnToc">目录</button>
      <button class="tb primary" id="btnNew">新记录</button>
      <button class="tb" id="btnClose">合上</button>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" multiple style="display:none" />

<script>
(function(){
  const stage=document.getElementById('stage'),cover=document.getElementById('cover'),hint=document.getElementById('hint');
  const pageL=document.getElementById('pageL'),pageR=document.getElementById('pageR');
  const pnL=document.getElementById('pnL'),pnR=document.getElementById('pnR');
  const leafR=document.getElementById('leafR'),leafL=document.getElementById('leafL'),book=document.getElementById('book');
  const photolayer=document.getElementById('photolayer'),fileInput=document.getElementById('fileInput');
  let topZ=30;

  // 配色切换
  document.querySelectorAll('.sw').forEach(b=>b.addEventListener('click',()=>{
    document.body.className='theme-'+b.dataset.t;
    document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('on',s===b));
  }));

  function demoImg(c,label,w,h){const svg="<svg xmlns='http://www.w3.org/2000/svg' width='"+w+"' height='"+h+"'><rect width='"+w+"' height='"+h+"' fill='"+c+"'/><text x='"+(w/2)+"' y='"+(h/2)+"' font-size='15' fill='rgba(0,0,0,.35)' text-anchor='middle' font-family='cursive'>"+label+"</text></svg>";return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);}

  const TITLE_SAFE=70;
  const entries=[
    {date:'2024.11.12',dateCn:'星期二 · 晴',
     html:'今天和妈妈聊了很久，<br>她说她年轻的时候也想过当画家。<br><br>第一次听她讲这个。她说那时候没钱买颜料，<br>就用铅笔在练习本背面画。',
     note:'妈妈',
     photos:[{src:demoImg('#caa37a','mom',300,400),cap:'',x:560,y:150,rot:4,w:150}]},
  ];
  let pos=0,busy=false;
  const seqLen=()=>entries.length+1;

  function render(){photolayer.innerHTML='';if(pos===0){renderToc();pnL.textContent='';pnR.textContent='';return;}renderEntry(entries[pos-1],pos);}

  function renderToc(){
    pageL.innerHTML='<div class="toc-head">目录<span class="en">contents</span></div><div class="toc-rule"></div><ul class="toc-list" id="tocList"></ul>';
    const ul=pageL.querySelector('#tocList');
    if(entries.length===0)ul.innerHTML='<li class="toc-empty">还没有记录。<br>点左边「新记录」开始第一篇 →</li>';
    entries.forEach((e,i)=>{const prev=stripHtml(e.html)||(e.photos.length?'（'+e.photos.length+' 张照片）':'（空白）');
      const li=document.createElement('li');li.className='toc-item';
      li.innerHTML='<span class="toc-date">'+e.date+'</span><span class="toc-prev">'+prev+'</span><span class="toc-pg">'+(i+1)+'</span>';
      li.addEventListener('click',()=>jumpTo(i+1));ul.appendChild(li);});
    pageR.innerHTML='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--ink-soft);">'+
      '<div style="font-family:var(--hand-en);font-size:30px;color:var(--brass);">keep going,</div>'+
      '<div style="font-family:var(--hand-cn);font-size:16px;margin-top:10px;letter-spacing:.1em;">把值得记住的，<br>都收进这本子里。</div>'+
      '<div style="margin-top:24px;font-size:36px;opacity:.85;">✦</div></div>';
  }

  function renderEntry(e,p){
    pageL.innerHTML='<div class="stamp">'+e.date+' <small>'+(e.dateCn||'')+'</small></div><div class="write" id="wr" contenteditable="true"></div>';
    const wr=pageL.querySelector('#wr');wr.innerHTML=e.html;wr.addEventListener('input',ev=>e.html=ev.target.innerHTML);
    pageR.innerHTML='<div class="rslot" id="rslot"><span class="ic">📎</span><span class="t">贴照片</span><span class="t2">drop a memory</span></div><div class="rnote" id="rnote" contenteditable="true"></div>';
    pageR.querySelector('#rnote').textContent=e.note||'';
    pageR.querySelector('#rnote').addEventListener('input',ev=>e.note=ev.target.textContent);
    pageR.querySelector('#rslot').addEventListener('click',()=>{curEntry=e;fileInput.click();});
    e.photos.forEach((ph,i)=>photolayer.appendChild(buildPhoto(e,ph,i)));
    pnL.textContent=(p*2-1);pnR.textContent=(p*2);
  }

  function buildPhoto(e,ph,i){
    const el=document.createElement('div');el.className='photo';
    el.style.left=(ph.x||120)+'px';el.style.top=(ph.y||TITLE_SAFE+20)+'px';el.style.transform='rotate('+(ph.rot||0)+'deg)';el.style.zIndex=ph.z||(30+i);
    const w=ph.w||160;
    el.innerHTML='<span class="tape" style="transform:translateX(-50%) rotate('+((ph.rot||0)*-0.6)+'deg)"></span><button class="del">×</button><img src="'+ph.src+'" style="width:'+w+'px;height:auto" draggable="false"/><div class="cap" contenteditable="true">'+(ph.cap||'')+'</div>';
    el.querySelector('.cap').addEventListener('input',ev=>ph.cap=ev.target.textContent);
    el.querySelector('.del').addEventListener('click',ev=>{ev.stopPropagation();e.photos.splice(e.photos.indexOf(ph),1);render();});
    dragify(el,ph);return el;
  }
  function dragify(el,ph){let sx,sy,ox,oy,d=false;
    el.addEventListener('pointerdown',ev=>{if(ev.target.classList.contains('cap')||ev.target.classList.contains('del'))return;ev.preventDefault();
      d=true;el.classList.add('dragging');el.setPointerCapture(ev.pointerId);ph.z=(++topZ);el.style.zIndex=ph.z;sx=ev.clientX;sy=ev.clientY;ox=ph.x||120;oy=ph.y||90;});
    el.addEventListener('pointermove',ev=>{if(!d)return;const bw=book.clientWidth,bh=book.clientHeight;let nx=ox+(ev.clientX-sx),ny=oy+(ev.clientY-sy);
      nx=Math.max(-30,Math.min(nx,bw-60));ny=Math.max(TITLE_SAFE,Math.min(ny,bh-60));ph.x=nx;ph.y=ny;el.style.left=nx+'px';el.style.top=ny+'px';});
    el.addEventListener('pointerup',()=>{d=false;el.classList.remove('dragging');});
  }
  let curEntry=null;
  function addPhotoFromFile(f,e,dropX,dropY){const r=new FileReader();
    r.onload=()=>{const img=new Image();img.onload=()=>{const ratio=img.width/img.height;let w=ratio>=1?200:150;const n=e.photos.length;
      const x=dropX!=null?dropX-w/2:520+n*26,y=dropY!=null?Math.max(TITLE_SAFE,dropY-60):TITLE_SAFE+30+n*22;
      e.photos.push({src:r.result,cap:'',x:x,y:y,rot:(Math.random()*12-6),w:w,z:(++topZ)});render();};img.src=r.result;};
    r.readAsDataURL(f);}
  fileInput.addEventListener('change',ev=>{[...ev.target.files].forEach(f=>addPhotoFromFile(f,curEntry));ev.target.value='';});
  ['dragenter','dragover'].forEach(t=>book.addEventListener(t,ev=>{ev.preventDefault();ev.dataTransfer.dropEffect='copy';}));
  book.addEventListener('drop',ev=>{ev.preventDefault();ev.stopPropagation();if(pos===0)return;const e=entries[pos-1];
    const rect=book.getBoundingClientRect();const dx=ev.clientX-rect.left,dy=ev.clientY-rect.top;
    [...(ev.dataTransfer.files||[])].filter(f=>f.type.startsWith('image')).forEach(f=>addPhotoFromFile(f,e,dx,dy));});
  ['dragover','drop'].forEach(t=>document.addEventListener(t,ev=>{if(!ev.target.closest('.book'))ev.preventDefault();}));

  function stripHtml(h){const dv=document.createElement('div');dv.innerHTML=h||'';return (dv.textContent||'').replace(/\s+/g,' ').trim().slice(0,28);}
  function openBook(){stage.classList.add('open');hint.style.opacity=0;pos=0;render();}
  cover.addEventListener('click',openBook);
  function flip(dir){if(busy)return;const ni=pos+dir;if(ni<0||ni>=seqLen())return;busy=true;const leaf=dir>0?leafR:leafL;
    leaf.classList.remove('flip','flipback');void leaf.offsetWidth;leaf.classList.add(dir>0?'flip':'flipback');
    setTimeout(()=>{leaf.classList.remove('flip','flipback');pos=ni;render();busy=false;},700);}
  function jumpTo(p){if(busy||p===pos)return;busy=true;const dir=p>pos?1:-1;const leaf=dir>0?leafR:leafL;
    leaf.classList.remove('flip','flipback');void leaf.offsetWidth;leaf.classList.add(dir>0?'flip':'flipback');
    setTimeout(()=>{leaf.classList.remove('flip','flipback');pos=p;render();busy=false;},700);}
  document.getElementById('navNext').addEventListener('click',()=>flip(1));
  document.getElementById('navPrev').addEventListener('click',()=>flip(-1));
  document.getElementById('btnToc').addEventListener('click',()=>{if(!stage.classList.contains('open'))openBook();else jumpTo(0);});
  document.getElementById('btnClose').addEventListener('click',()=>{stage.classList.remove('open');hint.style.opacity=1;});
  document.getElementById('btnNew').addEventListener('click',()=>{if(!stage.classList.contains('open'))openBook();entries.push({date:todayStr(),dateCn:'',html:'',note:'',photos:[]});jumpTo(entries.length);});
  function todayStr(){const d=new Date();return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}
  if(location.hash.startsWith('#open')){stage.classList.add('open');hint.style.opacity=0;pos=1;render();
    const th=location.hash.split('-')[1];if(th){document.body.className='theme-'+th;document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('on',s.dataset.t===th));}}
})();
</script>
</body>
