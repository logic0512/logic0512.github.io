<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>重要时刻 · 旅行手帐（牛皮纸 · 可写 · 可贴图 · 有目录）</title>
<style>
  :root{
    /* 牛皮纸旅行手帐调色 */
    --paper:#e7d9be; --paper-2:#ddcca9; --paper-line:rgba(120,92,52,.16);
    --leather:#6b5235; --leather-2:#523d27; --leather-edge:#3f2e1c;
    --ink:#4a3b2a; --ink-soft:#7c6646; --brass:#9c7c46; --brass-2:#b6904a;
    --tape:rgba(150,128,86,.42); --tape-2:rgba(120,100,70,.5);
    --hand-cn:'Hannotate SC','Hanzipen SC','Kaiti SC','Songti SC',serif;
    --serif:'Songti SC','Source Han Serif SC','STSong',serif;
    --hand-en:'Snell Roundhand','Brush Script MT',cursive;
    --body:'PingFang SC',-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--body);overflow:hidden;
    background:radial-gradient(ellipse 90% 80% at 50% 30%,#b7a98e 0%,#a3957a 60%,#8f8268 100%);
    display:flex;align-items:center;justify-content:center;}

  .hint{position:fixed;top:22px;left:0;right:0;text-align:center;z-index:40;font-size:12.5px;
    letter-spacing:.12em;color:#5a4a33;pointer-events:none;transition:opacity .4s ease;}
  .hint b{color:#3f2e1c;}

  .stage{position:relative;width:min(95vw,1000px);height:min(84vh,640px);perspective:2400px;z-index:10;}

  /* ───── 封面（旅行手帐：皮质 + 束带 + 行李牌） ───── */
  .cover{position:absolute;inset:0;margin:auto;width:50%;height:97%;left:0;right:0;cursor:pointer;z-index:20;
    border-radius:6px 12px 12px 6px;
    background:
      linear-gradient(135deg,var(--leather) 0%,var(--leather-2) 55%,var(--leather-edge) 100%);
    box-shadow:0 34px 70px rgba(60,40,20,.5), inset 0 0 0 1px rgba(255,230,190,.12);
    transform-origin:left center;transition:transform 1s var(--ease),opacity .5s ease .45s;
    display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
  /* 皮纹 */
  .cover::after{content:'';position:absolute;inset:0;opacity:.5;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");}
  /* 缝线边框 */
  .cover .stitch{position:absolute;inset:16px;border-radius:6px;border:1.5px dashed rgba(220,190,140,.5);pointer-events:none;}
  /* 束带 */
  .cover .band{position:absolute;top:0;bottom:0;right:46px;width:26px;z-index:5;
    background:linear-gradient(90deg,rgba(40,28,16,.5),rgba(70,52,32,.85),rgba(40,28,16,.5));
    box-shadow:0 0 12px rgba(0,0,0,.3);}
  /* 行李牌 */
  .cover .tag{position:relative;z-index:6;background:var(--paper);color:var(--ink);
    padding:20px 30px;border-radius:6px;text-align:center;transform:rotate(-2deg);
    box-shadow:0 10px 24px rgba(0,0,0,.3);}
  .cover .tag::before{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);
    width:12px;height:12px;border-radius:50%;border:2px solid var(--ink-soft);background:transparent;}
  .cover .tag .title{font-family:var(--hand-cn);font-size:27px;letter-spacing:.1em;margin-top:14px;}
  .cover .tag .sub{font-family:var(--hand-en);font-size:15px;color:var(--ink-soft);margin-top:6px;}
  .cover .open-tip{position:absolute;bottom:24px;font-size:11px;color:rgba(230,210,170,.85);letter-spacing:.22em;
    z-index:6;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
  .stage.open .cover{transform:rotateY(-160deg);opacity:0;pointer-events:none;}

  /* ───── 对开内页 ───── */
  .spread{position:absolute;inset:0;border-radius:10px;display:flex;padding:13px;
    background:linear-gradient(180deg,var(--leather-2),var(--leather-edge));
    box-shadow:0 40px 90px rgba(60,40,20,.5);
    opacity:0;transform:scale(.96);pointer-events:none;transition:opacity .6s ease .55s,transform .6s var(--ease) .55s;}
  .stage.open .spread{opacity:1;transform:scale(1);pointer-events:auto;}

  .book{position:relative;flex:1;display:flex;border-radius:4px;overflow:hidden;box-shadow:inset 0 0 30px rgba(60,40,20,.3);}
  .book::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:40px;transform:translateX(-50%);z-index:6;pointer-events:none;
    background:linear-gradient(90deg,rgba(80,55,30,0),rgba(80,55,30,.28) 45%,rgba(80,55,30,.28) 55%,rgba(80,55,30,0));}

  .page{position:relative;width:50%;height:100%;background:linear-gradient(160deg,var(--paper),var(--paper-2));overflow:hidden;}
  .page.left{box-shadow:inset -18px 0 28px -18px rgba(80,55,30,.4);}
  .page.right{box-shadow:inset 18px 0 28px -18px rgba(80,55,30,.4);}
  .page::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:.6;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/></svg>");}
  .page-inner{position:relative;z-index:2;height:100%;padding:38px 40px;display:flex;flex-direction:column;}
  .pageno{position:absolute;bottom:16px;font-family:var(--hand-en);font-size:14px;color:var(--ink-soft);z-index:4;}
  .page.left .pageno{left:40px;} .page.right .pageno{right:40px;}

  /* 日期戳 */
  .stamp{align-self:flex-start;font-family:var(--serif);font-size:14px;letter-spacing:.14em;color:var(--brass);
    border:1.5px solid var(--brass);border-radius:3px;padding:5px 12px;transform:rotate(-2.5deg);
    font-variant-numeric:tabular-nums;}
  .stamp small{font-family:var(--hand-cn);font-size:12px;color:var(--ink-soft);margin-left:7px;letter-spacing:.05em;}

  /* washi */
  .washi{position:absolute;height:20px;width:72px;z-index:3;background:var(--tape);opacity:.8;}
  .washi.stripe{background-image:repeating-linear-gradient(45deg,rgba(120,100,70,.25) 0 4px,transparent 4px 8px);}

  /* ── 目录 ── */
  .toc{height:100%;}
  .toc-head{font-family:var(--hand-cn);font-size:24px;color:var(--ink);letter-spacing:.1em;margin-bottom:4px;}
  .toc-head .en{font-family:var(--hand-en);font-size:17px;color:var(--brass);margin-left:10px;}
  .toc-rule{height:1.5px;background:var(--brass);width:54px;margin:8px 0 22px;border-radius:2px;}
  .toc-list{list-style:none;overflow-y:auto;flex:1;}
  .toc-item{display:flex;align-items:baseline;gap:8px;padding:11px 4px;cursor:pointer;border-bottom:1px dashed rgba(120,92,52,.22);}
  .toc-item:hover{background:rgba(156,124,70,.1);}
  .toc-ic{font-size:13px;width:18px;flex-shrink:0;color:var(--brass);}
  .toc-date{font-family:var(--serif);font-size:12.5px;color:var(--ink-soft);letter-spacing:.06em;flex-shrink:0;width:70px;font-variant-numeric:tabular-nums;}
  .toc-prev{font-family:var(--hand-cn);font-size:14px;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .toc-pg{font-family:var(--hand-en);font-size:14px;color:var(--ink-soft);flex-shrink:0;}
  .toc-empty{font-family:var(--hand-cn);color:var(--ink-soft);font-size:15px;margin-top:20px;line-height:2;}

  /* ── 写日记型 ── */
  .write{flex:1;margin-top:18px;font-family:var(--hand-cn);font-size:18px;line-height:34px;color:var(--ink);
    outline:none;letter-spacing:.03em;
    background-image:repeating-linear-gradient(180deg,transparent 0 33px,var(--paper-line) 33px 34px);
    background-position:0 8px;overflow-y:auto;}
  .write:empty::before{content:'今天想记下点什么……';color:var(--ink-soft);opacity:.55;}

  /* ── 通用：照片画布（自适应画幅） ── */
  .canvas{position:relative;flex:1;margin-top:16px;}
  .slot{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:170px;height:130px;border-radius:6px;
    border:2px dashed rgba(120,92,52,.45);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    cursor:pointer;color:var(--ink-soft);background:rgba(255,250,235,.18);transition:all .3s var(--ease);}
  .slot:hover{border-color:var(--brass);background:rgba(255,250,235,.4);transform:translate(-50%,-50%) scale(1.03);}
  .slot .ic{font-size:22px;}
  .slot .t{font-family:var(--hand-cn);font-size:14px;}
  .slot .t2{font-family:var(--hand-en);font-size:11px;opacity:.7;}

  /* 照片：原比例 + 白边 + 胶带 */
  .photo{position:absolute;background:#fbf7ef;padding:8px 8px 8px;border-radius:2px;
    box-shadow:0 10px 22px rgba(60,40,20,.32);cursor:grab;transition:transform .2s var(--ease),box-shadow .2s;}
  .photo:hover{box-shadow:0 16px 32px rgba(60,40,20,.42);z-index:30 !important;}
  .photo.dragging{cursor:grabbing;transition:none;z-index:40 !important;}
  .photo img{display:block;border-radius:1px;background:#ddd;}
  .photo .cap{font-family:var(--hand-en);font-size:15px;color:#4a3b2a;text-align:center;padding:6px 2px 2px;outline:none;min-height:14px;}
  .photo .cap:empty::before{content:'caption…';color:#b9a98a;font-size:12px;}
  .photo .tape{position:absolute;top:-10px;left:50%;width:56px;height:20px;background:var(--tape-2);
    box-shadow:0 2px 4px rgba(0,0,0,.1);}
  .photo .del{position:absolute;top:-9px;right:-9px;width:21px;height:21px;border-radius:50%;border:0;background:var(--leather);
    color:#fff;font-size:12px;cursor:pointer;opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.25);}
  .photo:hover .del{opacity:1;}

  /* 写日记型右页的小标题 */
  .side-note{font-family:var(--hand-cn);font-size:15px;color:var(--ink-soft);text-align:center;margin-top:10px;outline:none;}
  .side-note:empty::before{content:'写一句…';opacity:.5;}

  /* 翻页箭头 */
  .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:8;width:40px;height:40px;border-radius:50%;border:0;
    background:rgba(247,240,225,.6);backdrop-filter:blur(6px);color:var(--leather);font-size:19px;cursor:pointer;
    box-shadow:0 6px 16px rgba(60,40,20,.3);transition:all .25s var(--ease);display:flex;align-items:center;justify-content:center;}
  .nav:hover{background:#f7f0e1;transform:translateY(-50%) scale(1.1);}
  .nav.prev{left:-5px;} .nav.next{right:-5px;}

  /* 卷页动画 */
  .leaf{position:absolute;top:13px;bottom:13px;width:calc(50% - 13px);z-index:15;pointer-events:none;
    background:linear-gradient(160deg,var(--paper),var(--paper-2));transform-style:preserve-3d;
    box-shadow:0 0 40px rgba(60,40,20,.35);opacity:0;}
  .leaf.right{right:13px;transform-origin:left center;}
  .leaf.flip{animation:flipNext .72s var(--ease) forwards;}
  @keyframes flipNext{from{opacity:1;transform:rotateY(0);}to{opacity:1;transform:rotateY(-178deg);}}
  .leaf.left{left:13px;transform-origin:right center;}
  .leaf.flipback{animation:flipPrev .72s var(--ease) forwards;}
  @keyframes flipPrev{from{opacity:1;transform:rotateY(0);}to{opacity:1;transform:rotateY(178deg);}}

  /* 工具条 */
  .toolbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:40;display:flex;gap:8px;
    background:rgba(247,240,225,.7);backdrop-filter:blur(10px);padding:8px 10px;border-radius:999px;
    box-shadow:0 8px 24px rgba(60,40,20,.28);}
  .tb{font-size:12px;letter-spacing:.06em;color:var(--leather);background:transparent;border:0;padding:8px 15px;
    border-radius:999px;cursor:pointer;font-family:var(--body);transition:background .2s;}
  .tb:hover{background:rgba(107,82,53,.14);}
  .tb.primary{background:var(--leather);color:#f3e8d4;}
  .tb.primary:hover{background:var(--leather-2);}

  /* 新建记录的选择气泡 */
  .picker{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(10px);z-index:45;display:none;gap:12px;
    background:#f7f0e1;padding:14px;border-radius:14px;box-shadow:0 16px 40px rgba(60,40,20,.35);opacity:0;transition:all .25s var(--ease);}
  .picker.show{display:flex;opacity:1;transform:translateX(-50%) translateY(0);}
  .pick{width:120px;padding:18px 14px;border-radius:10px;border:1.5px solid rgba(107,82,53,.25);background:var(--paper);
    cursor:pointer;text-align:center;transition:all .2s;}
  .pick:hover{border-color:var(--brass);transform:translateY(-2px);}
  .pick .pic-ic{font-size:26px;}
  .pick .pic-t{font-family:var(--hand-cn);font-size:15px;color:var(--ink);margin-top:8px;}
  .pick .pic-d{font-size:10.5px;color:var(--ink-soft);margin-top:4px;letter-spacing:.04em;}
</style>
</head>
<body>
  <div class="hint" id="hint"><b>点封面</b>，翻开你的手帐 →</div>

  <div class="stage" id="stage">
    <div class="cover" id="cover">
      <div class="stitch"></div>
      <div class="band"></div>
      <div class="tag">
        <div class="title">重要时刻</div>
        <div class="sub">my journal</div>
      </div>
      <div class="open-tip">轻触翻开 →</div>
    </div>

    <div class="spread">
      <button class="nav prev" id="navPrev">‹</button>
      <button class="nav next" id="navNext">›</button>
      <div class="book">
        <div class="page left"><div class="page-inner" id="pageL"></div><span class="pageno" id="pnL"></span></div>
        <div class="page right"><div class="page-inner" id="pageR"></div><span class="pageno" id="pnR"></span></div>
      </div>
      <div class="leaf right" id="leafR"></div>
      <div class="leaf left" id="leafL"></div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" multiple style="display:none" />

  <div class="picker" id="picker">
    <div class="pick" data-type="write"><div class="pic-ic">✎</div><div class="pic-t">写日记</div><div class="pic-d">文字为主</div></div>
    <div class="pick" data-type="photo"><div class="pic-ic">▢</div><div class="pic-t">贴照片</div><div class="pic-d">照片拼贴</div></div>
  </div>

  <div class="toolbar">
    <button class="tb primary" id="btnNew">＋ 新记录</button>
    <button class="tb" id="btnToc">目录</button>
    <button class="tb" id="btnPhoto">＋ 贴照片</button>
    <button class="tb" id="btnClose">合上</button>
  </div>

<script>
(function(){
  const stage=document.getElementById('stage'),cover=document.getElementById('cover'),hint=document.getElementById('hint');
  const pageL=document.getElementById('pageL'),pageR=document.getElementById('pageR');
  const pnL=document.getElementById('pnL'),pnR=document.getElementById('pnR');
  const leafR=document.getElementById('leafR'),leafL=document.getElementById('leafL');
  const fileInput=document.getElementById('fileInput'),picker=document.getElementById('picker');

  function demoImg(c,label,w,h){const svg="<svg xmlns='http://www.w3.org/2000/svg' width='"+w+"' height='"+h+"'><rect width='"+w+"' height='"+h+"' fill='"+c+"'/><text x='"+(w/2)+"' y='"+(h/2)+"' font-size='15' fill='rgba(0,0,0,.35)' text-anchor='middle' font-family='cursive'>"+label+"</text></svg>";return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);}

  // 记录数据：type=write|photo
  const entries=[
    {type:'write',date:'2024.11.12',dateCn:'星期二 · 晴',
     html:'今天和妈妈聊了很久，<br>她说她年轻的时候也想过当画家。<br><br>第一次听她讲这个。她说那时候没钱买颜料，就用铅笔在练习本背面画。',
     note:'妈妈',
     photos:[{src:demoImg('#caa37a','mom',300,400),cap:'',x:18,y:20,rot:4,w:150}]},
    {type:'photo',date:'2024.10.04',dateCn:'国庆 · 海边',
     html:'',note:'走了很远的海岸线',
     photos:[
       {src:demoImg('#8fa9b5','seaside',400,300),cap:'blue hour',x:14,y:10,rot:-5,w:188},
       {src:demoImg('#b6c2a0','little things',300,420),cap:'little things',x:230,y:60,rot:5,w:150},
       {src:demoImg('#d8c08a','good week',420,300),cap:'good week!',x:60,y:230,rot:-3,w:196},
     ]},
  ];
  // 视图序列： 0=目录, 1..N = entries
  let pos=0,busy=false;
  const seqLen=()=>entries.length+1;

  function render(){
    pnL.textContent=pos===0?'':'';
    if(pos===0){renderToc();return;}
    renderEntry(entries[pos-1],pos);
  }

  function renderToc(){
    pageL.innerHTML='<span class="washi stripe" style="top:22px;left:26px;transform:rotate(-6deg);"></span>'+
      '<div class="toc"><div class="toc-head">目录<span class="en">contents</span></div><div class="toc-rule"></div>'+
      '<ul class="toc-list" id="tocList"></ul></div>';
    const ul=pageL.querySelector('#tocList');
    if(entries.length===0){ul.innerHTML='<li class="toc-empty">还没有记录。<br>点下面「＋ 新记录」开始第一篇 →</li>';}
    entries.forEach((e,i)=>{
      const prev=e.type==='write'?(stripHtml(e.html)||'（空白日记）'):(e.note||'（照片拼贴）');
      const li=document.createElement('li');li.className='toc-item';
      li.innerHTML='<span class="toc-ic">'+(e.type==='write'?'✎':'▢')+'</span>'+
        '<span class="toc-date">'+e.date+'</span>'+
        '<span class="toc-prev">'+prev+'</span>'+
        '<span class="toc-pg">'+(i+1)+'</span>';
      li.addEventListener('click',()=>jumpTo(i+1));
      ul.appendChild(li);
    });
    // 右页：手帐扉页装饰
    pageR.innerHTML='<span class="washi stripe" style="top:28px;right:30px;transform:rotate(5deg);"></span>'+
      '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--ink-soft);">'+
      '<div style="font-family:var(--hand-en);font-size:30px;color:var(--brass);">keep going,</div>'+
      '<div style="font-family:var(--hand-cn);font-size:16px;margin-top:10px;letter-spacing:.1em;">把值得记住的，<br>都收进这本子里。</div>'+
      '<div style="margin-top:24px;font-size:38px;">🧭</div></div>';
    pnL.textContent='';pnR.textContent='';
  }

  function renderEntry(e,p){
    if(e.type==='write'){
      // 左页：写字
      pageL.innerHTML='<span class="washi stripe" style="top:20px;left:26px;transform:rotate(-5deg);"></span>'+
        '<div class="stamp">'+e.date+' <small>'+(e.dateCn||'')+'</small></div>'+
        '<div class="write" id="wr" contenteditable="true"></div>';
      pageL.querySelector('#wr').innerHTML=e.html;
      pageL.querySelector('#wr').addEventListener('input',ev=>e.html=ev.target.innerHTML);
      // 右页：贴图（自适应）+ 一句
      pageR.innerHTML='<div class="canvas" id="cv"></div><div class="side-note" id="sn" contenteditable="true"></div>';
      pageR.querySelector('#sn').textContent=e.note||'';
      pageR.querySelector('#sn').addEventListener('input',ev=>e.note=ev.target.textContent);
      mountCanvas(e,pageR.querySelector('#cv'),true);
    } else {
      // 照片型：两页都是拼贴画布（左右各一块，照片可跨）
      pageL.innerHTML='<div class="stamp">'+e.date+' <small>'+(e.dateCn||'')+'</small></div><div class="canvas" id="cvL"></div>';
      pageR.innerHTML='<div class="canvas" id="cvR"></div><div class="side-note" id="sn" contenteditable="true"></div>';
      pageR.querySelector('#sn').textContent=e.note||'';
      pageR.querySelector('#sn').addEventListener('input',ev=>e.note=ev.target.textContent);
      // 用左页画布承载全部照片（绝对定位可超出到右页观感）
      mountCanvas(e,pageL.querySelector('#cvL'),false);
    }
    pnL.textContent=(p*2-1);pnR.textContent=(p*2);
  }

  function mountCanvas(e,cv,small){
    cv.innerHTML='';
    const slot=document.createElement('div');slot.className='slot';
    slot.innerHTML='<span class="ic">📎</span><span class="t">'+(small?'贴张照片':'把照片贴上来')+'</span><span class="t2">drop a memory</span>';
    slot.addEventListener('click',()=>{curCanvas=cv;curEntry=e;fileInput.click();});
    if(e.photos.length<(small?4:8))cv.appendChild(slot);
    e.photos.forEach((ph,i)=>cv.appendChild(buildPhoto(e,ph,i)));
  }

  function buildPhoto(e,ph,i){
    const el=document.createElement('div');el.className='photo';
    el.style.left=(ph.x||20)+'px';el.style.top=(ph.y||20)+'px';
    el.style.transform='rotate('+(ph.rot||0)+'deg)';el.style.zIndex=2+i;
    const w=ph.w||160;
    el.innerHTML='<span class="tape" style="transform:translateX(-50%) rotate('+((ph.rot||0)*-0.6)+'deg)"></span>'+
      '<button class="del">×</button>'+
      '<img src="'+ph.src+'" style="width:'+w+'px;height:auto"/>'+
      '<div class="cap" contenteditable="true">'+(ph.cap||'')+'</div>';
    el.querySelector('.cap').addEventListener('input',ev=>ph.cap=ev.target.textContent);
    el.querySelector('.del').addEventListener('click',ev=>{ev.stopPropagation();e.photos.splice(e.photos.indexOf(ph),1);render();});
    dragify(el,ph);
    return el;
  }

  function dragify(el,ph){let sx,sy,ox,oy,d=false;
    el.addEventListener('pointerdown',ev=>{if(ev.target.classList.contains('cap')||ev.target.classList.contains('del'))return;
      d=true;el.classList.add('dragging');el.setPointerCapture(ev.pointerId);sx=ev.clientX;sy=ev.clientY;ox=ph.x||20;oy=ph.y||20;});
    el.addEventListener('pointermove',ev=>{if(!d)return;ph.x=ox+(ev.clientX-sx);ph.y=oy+(ev.clientY-sy);el.style.left=ph.x+'px';el.style.top=ph.y+'px';});
    el.addEventListener('pointerup',()=>{d=false;el.classList.remove('dragging');});
  }

  // 贴图：读出真实画幅，按原比例算宽度
  let curCanvas=null,curEntry=null;
  fileInput.addEventListener('change',ev=>{
    [...ev.target.files].forEach(f=>{const r=new FileReader();
      r.onload=()=>{const img=new Image();img.onload=()=>{
        const ratio=img.width/img.height;
        // 横图宽一点、竖图窄一点，长边约束
        let w = ratio>=1 ? 200 : 150;
        const e=curEntry;
        e.photos.push({src:r.result,cap:'',x:24+e.photos.length*22,y:18+e.photos.length*18,rot:(Math.random()*12-6),w:w});
        render();
      };img.src=r.result;};
      r.readAsDataURL(f);});
    ev.target.value='';
  });

  function stripHtml(h){const d=document.createElement('div');d.innerHTML=h||'';return (d.textContent||'').replace(/\s+/g,' ').trim().slice(0,30);}

  // 翻开
  function openBook(){stage.classList.add('open');hint.style.opacity=0;pos=0;render();}
  cover.addEventListener('click',openBook);

  // 翻页
  function flip(dir){if(busy)return;const ni=pos+dir;if(ni<0||ni>=seqLen())return;busy=true;
    const leaf=dir>0?leafR:leafL;leaf.classList.remove('flip','flipback');void leaf.offsetWidth;
    leaf.classList.add(dir>0?'flip':'flipback');
    setTimeout(()=>{leaf.classList.remove('flip','flipback');pos=ni;render();busy=false;},700);}
  function jumpTo(p){if(busy||p===pos)return;busy=true;const dir=p>pos?1:-1;const leaf=dir>0?leafR:leafL;
    leaf.classList.remove('flip','flipback');void leaf.offsetWidth;leaf.classList.add(dir>0?'flip':'flipback');
    setTimeout(()=>{leaf.classList.remove('flip','flipback');pos=p;render();busy=false;},700);}
  document.getElementById('navNext').addEventListener('click',()=>flip(1));
  document.getElementById('navPrev').addEventListener('click',()=>flip(-1));
  document.getElementById('btnToc').addEventListener('click',()=>{if(!stage.classList.contains('open'))openBook();else jumpTo(0);});
  document.getElementById('btnClose').addEventListener('click',()=>{stage.classList.remove('open');hint.style.opacity=1;picker.classList.remove('show');});

  // 新记录：选类型
  document.getElementById('btnNew').addEventListener('click',()=>{if(!stage.classList.contains('open'))openBook();picker.classList.toggle('show');});
  picker.querySelectorAll('.pick').forEach(b=>b.addEventListener('click',()=>{
    const type=b.dataset.type;picker.classList.remove('show');
    entries.push({type,date:todayStr(),dateCn:'',html:'',note:'',photos:[]});
    const target=entries.length;jumpTo(target);
  }));
  document.getElementById('btnPhoto').addEventListener('click',()=>{
    if(!stage.classList.contains('open')){openBook();}
    if(pos===0){ // 在目录上点贴照片→新建一个照片记录
      entries.push({type:'photo',date:todayStr(),dateCn:'',html:'',note:'',photos:[]});jumpTo(entries.length);
      setTimeout(()=>{const cv=pageL.querySelector('.canvas');if(cv){curCanvas=cv;curEntry=entries[pos-1];fileInput.click();}},760);
      return;
    }
    curEntry=entries[pos-1];const cv=pageR.querySelector('.canvas')||pageL.querySelector('.canvas');curCanvas=cv;fileInput.click();
  });

  function todayStr(){const d=new Date();return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}
})();
</script>
</body>
</html>
