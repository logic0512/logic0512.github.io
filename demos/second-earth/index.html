<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>寻找第二个地球 - 单观测点 3D 原型</title>
    <style>
      :root {
        /* ponytail: 不用 color-scheme:dark，否则 iframe 会强制画不透明深色底，盖不住、装置后有一层背景 */
        --bg: #05080d;
        --cyan: #76d9ff;
        --cyan-dim: #2e5a78;
        --green: #63e6a8;
        --yellow: #ffd166;
        --red: #ff6b6b;
        --text: #edf8ff;
        --muted: #91aabb;
        --stage-scale: 0.83;
        --shell-offset-y: 6px;       /* 外壳整体垂直微调（调参面板定稿） */
        --stage: min(
          calc(88vw * var(--stage-scale)),
          calc((100vh - 130px) * var(--stage-scale)),
          calc(980px * var(--stage-scale))
        );

        /* —— 统一字号规范：5 级梯度，全部以 --stage 为基准，整体一起缩放 ——
           viewBox 数字版（SVG placeArcText 用，viewBox≈1000≈stage）：
           display 30 / title 21 / lead 18 / body 14.5 / label 12 / micro 10 */
        --fs-display: calc(var(--stage) * 0.030);  /* H1 主标题 */
        --fs-title:   calc(var(--stage) * 0.021);  /* 反馈句 */
        --fs-lead:    calc(var(--stage) * 0.018);  /* 结算当前推理（醒目主行） */
        --fs-body:    calc(var(--stage) * 0.0145); /* 仪表标签/值、读数、目标名、面板内主文字 */
        --fs-label:   calc(var(--stage) * 0.0118); /* 面板标题、轴刻度、meta、eyebrow */
        --fs-micro:   calc(var(--stage) * 0.0098); /* 键位图例、caption、小注 */

        /* —— 中心曲线面板位置/尺寸（可被调试面板实时改写） —— */
        --curve-top: 62%;
        --curve-left: 50%;
        --curve-width: 30%;
        --curve-height: 16%;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent; /* ponytail: 圆外透明，让圆形装置漂浮在作品集背景上（圆内由 canvas 自填深色） */
        color: var(--text);
        font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      }

      .app {
        width: 100vw;
        height: 100vh;
        padding: 0 24px;
        display: grid;
        grid-template-rows: 1fr;
        gap: 0;
      }

      body[data-frame="telescope"],
      body[data-frame="hybrid"],
      body[data-frame="clean"] {
        overflow: hidden;
      }

      /* 外壳超过视口高度时也保持上下居中（对称溢出/裁切），而不是滚动顶部对齐 */
      body[data-frame="telescope"] .app,
      body[data-frame="hybrid"] .app,
      body[data-frame="clean"] .app {
        height: 100vh;
        min-height: 0;
        grid-template-rows: 1fr;
      }

      header,
      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 48px;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: var(--cyan);
        font-size: var(--fs-label);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(22px, 2.5vw, 34px);
        letter-spacing: 0;
      }

      .phase-pill {
        min-width: 150px;
        height: 38px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(118, 217, 255, 0.35);
        background: rgba(6, 15, 23, 0.74);
        color: var(--green);
        font-weight: 700;
      }

      .stage-wrap {
        position: relative;
        min-height: 0;
        display: grid;
        place-items: center;
        overflow: visible;
      }

      /* 绝对定位 + transform 居中：外壳比视口大时也从视口正中对称溢出，永远上下/左右居中 */
      .window-shell {
        --shell-scale: 1;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, calc(-50% + var(--shell-offset-y, 0px)));
        width: calc(var(--stage) * var(--shell-scale));
        height: calc(var(--stage) * var(--shell-scale));
        display: grid;
        place-items: center;
        overflow: visible;
      }

      body[data-frame="telescope"] .window-shell {
        --shell-scale: 1.38;
      }

      body[data-frame="hybrid"] .window-shell {
        --shell-scale: 1.32;
      }

      body[data-frame="clean"] .window-shell {
        --shell-scale: 1.34;
      }

      .round-stage {
        position: relative;
        width: var(--stage);
        height: var(--stage);
        z-index: 1;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid rgba(118, 217, 255, 0.32);
        background:
          radial-gradient(circle, transparent 0 30%, rgba(9, 25, 37, 0.22) 31%, rgba(2, 7, 12, 0.95) 100%),
          conic-gradient(from -24deg, rgba(118, 217, 255, 0.05), rgba(118, 217, 255, 0.15), rgba(118, 217, 255, 0.05));
        box-shadow: 0 0 70px rgba(35, 139, 190, 0.14);
      }

      .viewport-frame {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 100%;
        height: 100%;
        transform: translate(-50%, -50%);
        object-fit: contain;
        pointer-events: none;
        z-index: 8;
        display: none;
        opacity: 0.82;
        filter: drop-shadow(0 0 calc(var(--stage) * 0.035) rgba(60, 170, 220, 0.18));
      }

      .viewport-frame.frame-hybrid {
        opacity: 0.76;
      }

      .viewport-frame.frame-clean {
        opacity: 0.9;
      }

      .reflection-layer {
        --reflect-x: 0px;
        --reflect-y: 0px;
        --reflect-hot-x: 50%;
        --reflect-hot-y: 50%;
        --reflect-top-x: 50%;
        --reflect-top-y: 11%;
        --reflect-bottom-x: 50%;
        --reflect-bottom-y: 89%;
        position: absolute;
        left: 50%;
        top: 50%;
        width: 100%;
        height: 100%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 9;
        display: none;
        opacity: 0.72;
        mix-blend-mode: screen;
        background:
          radial-gradient(ellipse at var(--reflect-top-x) var(--reflect-top-y),
            rgba(255, 181, 96, 0.42) 0 2.4%,
            rgba(255, 129, 56, 0.20) 4.8%,
            transparent 9.5%),
          radial-gradient(ellipse at var(--reflect-bottom-x) var(--reflect-bottom-y),
            rgba(255, 151, 72, 0.32) 0 2.2%,
            rgba(255, 107, 44, 0.14) 4.8%,
            transparent 8.5%);
        -webkit-mask-image: url("assets/frames/frame-telescope-clean-v2.png");
        mask-image: url("assets/frames/frame-telescope-clean-v2.png");
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
      }

      .reflection-layer::before,
      .reflection-layer::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translate(var(--reflect-x), var(--reflect-y));
        transition: transform 0.18s ease-out, opacity 0.18s ease-out;
        background:
          radial-gradient(ellipse at var(--reflect-top-x) var(--reflect-top-y),
            rgba(255, 226, 165, 0.26) 0 1.2%,
            transparent 5.6%),
          radial-gradient(ellipse at var(--reflect-bottom-x) var(--reflect-bottom-y),
            rgba(255, 194, 126, 0.20) 0 1%,
            transparent 4.8%);
        filter: blur(0.45px);
      }

      .reflection-layer::after {
        inset: 0;
        transform: translate(calc(var(--reflect-x) * -0.22), calc(var(--reflect-y) * -0.18));
        opacity: 0.34;
        background:
          radial-gradient(ellipse at calc(var(--reflect-top-x) + 6%) calc(var(--reflect-top-y) + 2%),
            rgba(255, 137, 62, 0.26) 0 1.8%,
            transparent 5.8%);
        filter: blur(1px);
      }

      body[data-frame="telescope"] .viewport-frame.frame-telescope,
      body[data-frame="hybrid"] .viewport-frame.frame-hybrid,
      body[data-frame="clean"] .viewport-frame.frame-clean,
      body[data-frame="clean"] .reflection-layer {
        display: block;
      }

      #universe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      /* ===== 弧形驾驶舱（150° 扇环，圆形内嵌） ===== */

      .cockpit {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      /* 玻璃扇环底板：150° 楔形 × 同心环带，半透明玻璃感 */
      .cockpit-bg {
        position: absolute;
        inset: 0;
        opacity: var(--cockpit-opacity, 100%);
        background: radial-gradient(
          circle at 50% 50%,
          rgba(12, 26, 38, 0) 0,
          rgba(12, 26, 38, 0) calc(var(--stage) * 0.285),
          rgba(13, 28, 41, 0.58) calc(var(--stage) * 0.305),
          rgba(8, 18, 27, 0.74) calc(var(--stage) * 0.42),
          rgba(12, 26, 38, 0.82) calc(var(--stage) * 0.5)
        );
        -webkit-mask-image:
          radial-gradient(circle at 50% 50%, transparent 0 calc(var(--stage) * 0.29 - 1px),
            #000 calc(var(--stage) * 0.29) calc(var(--stage) * 0.497), transparent calc(var(--stage) * 0.497 + 1px)),
          conic-gradient(from var(--wedge-from, 131deg) at 50% 50%, #000 0 var(--wedge-span, 98deg), transparent var(--wedge-span, 98deg) 360deg);
        -webkit-mask-composite: source-in;
        mask-image:
          radial-gradient(circle at 50% 50%, transparent 0 calc(var(--stage) * 0.29 - 1px),
            #000 calc(var(--stage) * 0.29) calc(var(--stage) * 0.497), transparent calc(var(--stage) * 0.497 + 1px)),
          conic-gradient(from var(--wedge-from, 131deg) at 50% 50%, #000 0 var(--wedge-span, 98deg), transparent var(--wedge-span, 98deg) 360deg);
        mask-composite: intersect;
      }

      .cockpit svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .cockpit svg text {
        font-family: inherit;
      }

      #arcFeedback,
      #arcMeters {
        transition: opacity 0.3s ease;
      }

      .cockpit[data-phase="settled"] #arcMeters {
        opacity: 0;
      }

      /* =========================================================
         中心焦点区：恒星正下方、弧带之上的一块空带（约 52%–72% 高度）。
         一次只显示一个仪器；所有仪器共享同一套语汇：
         细青描边 + 半透明深玻璃，绝不多重粗边框。
         分层编排：每个阶段只让该阶段的那一个焦点仪器可见。
         ========================================================= */
      .curve-screen,
      .settle-board {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
      }

      /* locked/collecting/period：曲线屏可见——淡入 + 上浮 + 放大归位（中心焦点入场缓动） */
      .cockpit[data-phase="locked"] .curve-screen,
      .cockpit[data-phase="collecting"] .curve-screen,
      .cockpit[data-phase="period"] .curve-screen {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      /* settled：单条结算推理——淡入 + 上浮 + 放大归位 */
      .cockpit[data-phase="settled"] .settle-board {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      /* —— 光变曲线屏：细青描边 + 半透明深玻璃，无矩形粗边 —— */
      .curve-screen {
        position: absolute;
        left: var(--curve-left);
        top: var(--curve-top);
        width: var(--curve-width);
        height: var(--curve-height);
        transform: translate(-50%, calc(-50% + var(--stage) * 0.045)) scale(0.94); /* 隐藏态下沉+略小，显示态上浮放大归位 */
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
        border-radius: calc(var(--stage) * 0.012);
        border: 1px solid rgba(118, 217, 255, 0.32);
        background: transparent; /* 玻璃底色由 canvas 按可调 alpha 填充，便于透明度调节 */
        box-shadow: inset 0 0 calc(var(--stage) * 0.018) rgba(118, 217, 255, 0.1);
        transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.35s ease;
      }

      /* collecting：曲线屏单独居中（目镜已移除），仅以黄描边强调采集态 */
      .cockpit[data-phase="collecting"] .curve-screen {
        border-color: rgba(255, 209, 102, 0.5);
        box-shadow: inset 0 0 calc(var(--stage) * 0.018) rgba(255, 209, 102, 0.1);
      }
      /* 采集启动那一下：曲线面板边框闪一记琥珀光，把"按下 Space 开始记录"和数据屏绑起来 */
      @keyframes captureBorderFlash {
        0% {
          border-color: rgba(255, 233, 170, 0.95);
          box-shadow: inset 0 0 calc(var(--stage) * 0.05) rgba(255, 209, 102, 0.5),
            0 0 calc(var(--stage) * 0.03) rgba(255, 209, 102, 0.55);
        }
        100% {
          border-color: rgba(255, 209, 102, 0.5);
          box-shadow: inset 0 0 calc(var(--stage) * 0.018) rgba(255, 209, 102, 0.1);
        }
      }
      .curve-screen.capture-flash {
        animation: captureBorderFlash 0.55s ease-out;
      }
      /* 卡尺"咔"上那一下：曲线面板边框闪一记绿光（对准成功=绿色确认，镜像锁定语言） */
      @keyframes caliperBorderFlash {
        0% {
          border-color: rgba(150, 255, 200, 0.95);
          box-shadow: inset 0 0 calc(var(--stage) * 0.05) rgba(99, 230, 168, 0.5),
            0 0 calc(var(--stage) * 0.03) rgba(99, 230, 168, 0.55);
        }
        100% {
          border-color: rgba(118, 217, 255, 0.32);
          box-shadow: inset 0 0 calc(var(--stage) * 0.018) rgba(118, 217, 255, 0.1);
        }
      }
      .curve-screen.caliper-flash {
        animation: caliperBorderFlash 0.6s ease-out;
      }

      .curve-title {
        padding: 0.35em 0.9em 0.15em;
        color: var(--cyan);
        font-size: var(--fs-body);
        letter-spacing: 0.16em;
        opacity: 0.78;
      }

      .curve-screen canvas {
        width: 100%;
        height: 100%;
        min-height: 0;
        display: block;
      }

      /* —— 结算：一次只放当前一条推理，无框、居中铺在中心焦点区 —— */
      .settle-board {
        position: absolute;
        left: 50%;
        top: 61%;
        transform: translate(-50%, calc(-50% + var(--stage) * 0.045)) scale(0.94); /* 隐藏态下沉+略小，显示态上浮放大归位 */
        transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        width: 56%;
        display: grid;
        gap: calc(var(--stage) * 0.012);
        justify-items: center;
        text-align: center;
        color: var(--text);
      }

      .settle-head {
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 0.7em;
        color: var(--cyan);
        font-size: var(--fs-label);
        letter-spacing: 0.14em;
      }

      .settle-head b {
        color: var(--text);
        font-size: 1.18em;
        letter-spacing: 0.02em;
      }

      /* 逐条揭示：按 → 推进时，当前这条推理淡入上滑出现（每次 innerHTML 重建即播放一次） */
      @keyframes settleStepIn {
        from {
          opacity: 0;
          transform: translateY(calc(var(--stage) * 0.022));
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .settle-step {
        font-size: var(--fs-lead);
        line-height: 1.5;
        color: var(--text);
        max-width: 100%;
        animation: settleStepIn 0.42s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .settle-step strong {
        color: var(--green);
        font-weight: 700;
      }

      .settle-progress {
        display: flex;
        gap: 0.6em;
      }

      .settle-progress i {
        width: calc(var(--stage) * 0.026);
        height: calc(var(--stage) * 0.004);
        border-radius: 999px;
        background: rgba(118, 217, 255, 0.22);
      }

      .settle-progress i.on {
        background: var(--green);
      }

      @media (max-width: 1100px) {
        :root {
          --stage: min(86vw, calc(100vh - 120px), 780px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app" aria-label="寻找第二个地球单观测点 3D 凌星法原型">
      <section class="stage-wrap">
        <section class="window-shell">
          <section class="round-stage">
            <canvas id="universe"></canvas>

            <div class="cockpit" id="cockpit" data-phase="aiming" aria-label="弧形观测驾驶舱">
              <div class="cockpit-bg"></div>
              <svg id="cockpitSvg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                <g id="arcStatic"></g>
                <g id="arcFeedback"></g>
                <g id="arcMeters">
                  <g id="meterSlot0"></g>
                  <g id="meterSlot1"></g>
                  <g id="meterSlot2"></g>
                </g>
              </svg>
              <div class="curve-screen" id="curveScreen">
                <span class="curve-title" id="curveTitle">光变曲线</span>
                <canvas id="curveView"></canvas>
              </div>
              <div class="settle-board" id="settleBoard"></div>
            </div>
          </section>
          <img class="viewport-frame frame-telescope" src="assets/frames/frame-telescope-eyepiece-v1.png" alt="" aria-hidden="true" />
          <img class="viewport-frame frame-hybrid" src="assets/frames/frame-hybrid-window-v1.png" alt="" aria-hidden="true" />
          <img class="viewport-frame frame-clean" src="assets/frames/frame-telescope-clean-v2.png" alt="" aria-hidden="true" />
          <div class="reflection-layer" id="reflectionLayer" aria-hidden="true"></div>
        </section>
      </section>
    </main>

    <script>
      const TAU = Math.PI * 2;
      const SAMPLE_DURATION = 6600;
      const FAIL_RECOVERY_MS = 1300;
      const CALIPER_MIN = 0.16;
      const CALIPER_MAX = 0.78;
      const LOCK_ANIM_MS = 650; // 锁定确认动效时长（对准→锁定的绿色脉冲）
      const CAPTURE_ANIM_MS = 560; // 采集启动脉冲时长（按 Space 那一下的琥珀快门）
      const CALIPER_ANIM_MS = 700; // 卡尺锁定确认脉冲时长（"咔"上周期那一下的绿色辉光）
      const PERIOD_HOLD_MS = 2600; // 卡尺锁定后停留多久再自动进结算（留足时间看清量出的周期）
      const CALIPER_STEP = 0.025;
      const CALIPER_TOLERANCE = 0.025;
      const STAR_RADIUS_EARTH = 10.8;
      const READY_TOLERANCE = 0.08;
      const ORBIT_ROTATION = -0.22;

      // —— 冲击参数 3D 因果模型（来自 3d-causal-spike.html，已验收）——
      // 行星/恒星盘面比例 k 不再是全局常量：每颗行星自带 disc 字段（见 planets），
      // 画面遮挡、望远镜小窗、光变曲线深度全部由同一个 k 推导，保证所见即所得。
      const PATH_SPAN = 3.0;        // 凌星横扫路径全长（恒星半径单位）
      const ORBIT_TO_STARR = 2.0;   // planet.orbit → 轨道半径（恒星半径单位）
      const AIM_TOL = 0.1;          // ← → 对准恒星的容差
      const ORBIT_OMEGA = 0.45;     // 公转角速度（统一压缩，周期约 14 秒，凌星约 1.5-2 秒）

      const canvas = document.getElementById("universe");
      const phasePill = document.getElementById("phasePill");
      const cockpit = document.getElementById("cockpit");
      const curveTitle = document.getElementById("curveTitle");
      const settleBoard = document.getElementById("settleBoard");
      const reflectionLayer = document.getElementById("reflectionLayer");
      const params = new URLSearchParams(window.location.search);
      const frameMode = params.get("frame") || "clean";
      document.body.dataset.frame = ["none", "telescope", "hybrid", "clean"].includes(frameMode) ? frameMode : "telescope";
      const startAzimuthParam = Number(params.get("az"));
      const startElevationParam = Number(params.get("el"));
      const stageScaleParam = Number(params.get("scale"));
      // 只有真正带了 ?scale 才覆盖；否则保持 CSS 默认（避免 Number(null)=0 被当成有效值压成 0.6）
      if (params.has("scale") && Number.isFinite(stageScaleParam) && stageScaleParam > 0) {
        const normalizedScale = clamp(stageScaleParam > 3 ? stageScaleParam / 100 : stageScaleParam, 0.6, 1.05);
        document.documentElement.style.setProperty("--stage-scale", normalizedScale);
      }

      const TEXTURE_BASE = "assets/planets/";

      function loadTexture(file) {
        const img = new Image();
        img.src = TEXTURE_BASE + file;
        return img;
      }

      const starTexture = loadTexture("parent-star-emissive-v1.png");
      const planetTextures = {
        terra: loadTexture("eos-90e-earthlike-candidate-v2-unlit.png"),
        hot: loadTexture("hot-lava-world-v2-unlit.png"),
        giant: loadTexture("gas-giant-v2-unlit.png"),
        outer: loadTexture("outer-ice-world-v2-unlit.png"),
      };

      const planets = [
        {
          id: "terra",
          label: "Eos-90e",
          orbit: 1.7,
          radius: 0.08,
          earthRadius: 1.08,
          periodDays: 384,
          temp: 285,
          speed: 0.32,

        {

        {

          speed: 0.22,
