<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>治愈星 · Memory Sparks</title>
  <script src="/assets/vendor/gsap/gsap.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #2b2440;
      color: rgba(255, 246, 226, 0.92);
    }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; border: 0; }
    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }
    /* composer 的层选按钮：原 36px 圆形装不下中文 2 字，改胶囊矩形 */
    .msc-backdrop[data-planet="healing"] .msc-tier-buttons button {
      width: auto;
      min-width: 60px;
      height: 32px;
      padding: 0 16px;
      border-radius: 16px;
      font-size: 12.5px;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* 介绍卡 .ms-orb 走 ms-shared.css 的标准样式，跟其他 7 颗星一致（圆角矩形 + 深色底 + 透明 PNG 透出来） */

    .hud {
      display: none !important; /* 由 ms-intro-card 替代左上角介绍 */
      position: fixed;
      z-index: 5;
      left: clamp(20px, 3vw, 42px);
      top: clamp(20px, 3.5vh, 42px);
      color: rgba(245, 220, 168, 0.78);
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .hud h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 300;
      letter-spacing: 0.42em;
      padding-left: 0.2em;
    }
    .hud .hint {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(245, 220, 168, 0.42);
      font-weight: 300;
    }
    .hud.soft { opacity: 0.36; }
    .layer-title {
      position: fixed;
      z-index: 4;
      top: clamp(78px, 11vh, 116px);
      left: 50%;
      transform: translateX(-50%);
      font-family: "SF Mono", "JetBrains Mono", "Menlo", "Courier New", monospace;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 0.58em;
      padding-left: 0.58em;
      text-transform: uppercase;
      color: rgba(80, 52, 38, 0.40);
      pointer-events: none;
      white-space: nowrap;
      opacity: 1;
      transition: opacity 0.45s ease;
    }
    .layer-title.fade-out { opacity: 0; }
    .add {
      /* 右下按钮隐藏，入口只保留右上 ms-shared FAB */
      display: none !important;
    }
    .add-orig-style-unused {
      position: fixed;
      z-index: 6;
      right: clamp(24px, 4vw, 48px);
      bottom: clamp(24px, 4.5vh, 48px);
      padding: 10px 18px 10px 14px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 0;
      color: rgba(245, 220, 168, 0.72);
      font-size: 13px;
      letter-spacing: 0.16em;
      font-weight: 300;
      transition: color 0.25s ease, transform 0.25s ease;
    }
    .add:hover {
      color: rgba(255, 240, 200, 0.95);
      transform: translateY(-1px);
    }
    .add .plus {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 1px solid currentColor;
      border-radius: 50%;
      line-height: 20px;
      text-align: center;
      font-size: 14px;
      font-weight: 200;
    }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 8;
      opacity: 0;
      pointer-events: none;
      background: rgba(36, 26, 52, 0.22);
      /* backdrop-filter 只在 .on 时启用，否则 opacity:0 也会残留虚化（CSS 标准行为，跟透明度无关） */
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      visibility: hidden;
      transition: opacity 0.2s ease;
      /* 性能：GPU 层预热，避免弹出瞬间合成卡 */
      will-change: backdrop-filter, opacity;
      contain: layout style;
      isolation: isolate;
      backface-visibility: hidden;
    }
    .overlay.on {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
      /* 不再做全屏 backdrop-filter blur — panel 自己已经 blur(7)，叠两次 GPU 合成会拖帧
         overlay 只留半透微暗（rgba alpha 0.22），辨别上下文够了 */
    }
    /* L1 Gentle 默认；body[data-layer="..."] 切换变量
       任务 3：CSS variable 跟 3D 卡片调色板 CARD_LAYER_PALETTE 完全对齐 → 弹窗 = 卡片的放大版 */
    body {
      /* 卡片底色（跟 CARD_LAYER_PALETTE[0].bg 一致） */
      --rd-card-bg: rgba(223, 184, 168, 0.68);
      --rd-card-border: rgba(255, 245, 235, 0.50);
      --rd-card-highlight: rgba(255, 250, 245, 0.42);
      --rd-card-bottom-dim: rgba(80, 50, 38, 0.10);
      --rd-card-inset: rgba(255, 250, 238, 0.6);
      --rd-card-shadow: 0 12px 40px rgba(180, 90, 60, 0.18), 0 0 60px rgba(255, 200, 175, 0.32);
      --rd-text: #5b2f1f;
      --rd-meta: rgba(91, 47, 31, 0.62);
      --rd-line: rgba(91, 47, 31, 0.22);
      --rd-accent: rgba(184, 90, 58, 0.72);
    }
    body[data-layer="companion"] {
      --rd-card-bg: rgba(222, 194, 154, 0.68);
      --rd-card-border: rgba(255, 248, 230, 0.52);
      --rd-card-highlight: rgba(255, 252, 240, 0.42);
      --rd-card-bottom-dim: rgba(80, 58, 28, 0.10);
      --rd-card-inset: rgba(255, 250, 222, 0.6);
      --rd-card-shadow: 0 12px 40px rgba(170, 110, 40, 0.16), 0 0 60px rgba(245, 200, 130, 0.30);
      --rd-text: #5d3618;
      --rd-meta: rgba(93, 54, 24, 0.62);
      --rd-line: rgba(93, 54, 24, 0.22);
      --rd-accent: rgba(184, 106, 42, 0.72);
    }
    body[data-layer="inspire"] {
      --rd-card-bg: rgba(241, 229, 219, 0.80);
      --rd-card-border: rgba(255, 252, 248, 0.55);
      --rd-card-highlight: rgba(255, 254, 252, 0.48);
      --rd-card-bottom-dim: rgba(74, 52, 38, 0.08);
      --rd-card-inset: rgba(255, 250, 240, 0.6);
      --rd-card-shadow: 0 12px 40px rgba(150, 100, 70, 0.14), 0 0 60px rgba(240, 215, 195, 0.28);
      --rd-text: #533622;
      --rd-meta: rgba(83, 54, 34, 0.62);
      --rd-line: rgba(83, 54, 34, 0.22);
      --rd-accent: rgba(160, 109, 58, 0.72);
    }

    .panel {
      /* 任务 3：弹窗 = 3D 卡片的放大版
         - 圆角 18px / 描边 1.8px（drawGlassEdge 同款）
         - 多层 background 复刻 drawGlassBase：顶部高光 + 底部微暗 + 底色
         - 动画：GSAP 接管 x/y/opacity，layout 永远不变 → 字体永远清晰
         - GSAP 用 xPercent/yPercent -50 让 panel 始终居中（CSS 不设 translate） */
      position: fixed;
      z-index: 9;
      left: 50%;
      top: 50%;
      width: min(460px, calc(100vw - 34px));
      padding: 32px 32px 28px;
      border: 1.8px solid var(--rd-card-border);
      border-radius: 18px;
      background:
        linear-gradient(180deg, var(--rd-card-highlight) 0%, rgba(255,255,255,0.06) 35%, transparent 55%),
        linear-gradient(180deg, transparent 70%, var(--rd-card-bottom-dim) 100%),
        var(--rd-card-bg);
      box-shadow: var(--rd-card-shadow), inset 0 1px 0 var(--rd-card-inset);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      color: var(--rd-text);
      opacity: 0;
      pointer-events: none;
      /* GPU 合成层稳定：GSAP 频繁改 transform/opacity 时减少重排 */
      will-change: opacity, transform;
      contain: layout style;
      isolation: isolate;
      backface-visibility: hidden;
    }
    .panel.open {
      pointer-events: auto;
      /* shape-text 现在 460×575（面积比之前 420×320 翻倍），blur 12 持续合成会拖帧率
         降到 7 saturate 1.04，视觉差异微小但合成成本大幅下降 */
      backdrop-filter: blur(7px) saturate(1.04);
      -webkit-backdrop-filter: blur(7px) saturate(1.04);
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }
    .panel-title {
      margin: 0;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.32em;
      color: var(--rd-meta);
    }
    /* close × 跟 ms-card-edit-btn / ms-card-del-btn 对齐：absolute top:10 size 28×28
       三个按钮一行：close (left:10) | ... | edit (right:78) | del (right:44) */
    .reader .close {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--rd-line);
      background: transparent;
      color: var(--rd-meta);
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      z-index: 10;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    .reader .close:hover {
      color: var(--rd-text);
      border-color: var(--rd-accent);
    }
    input[type="text"],
    textarea {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--rd-line);
      background: transparent;
      outline: none;
      color: var(--rd-text);
      transition: border-color 0.2s ease;
    }
    input[type="text"]:focus,
    textarea:focus { border-bottom-color: var(--rd-accent); }
    input[type="text"] {
      height: 40px;
      margin-bottom: 18px;
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 0.02em;
    }
    textarea {
      min-height: 120px;
      padding: 10px 0;
      resize: none;
      line-height: 1.85;
      font-size: 14px;
      font-weight: 300;
    }
    input::placeholder,
    textarea::placeholder {
      color: var(--rd-meta);
      opacity: 0.55;
      font-weight: 300;
    }
    .row {
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--rd-meta);
      font-size: 11px;
      letter-spacing: 0.14em;
    }
    .file {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      max-width: 240px;
      padding: 0 2px 6px;
      border: 0;
      border-bottom: 1px solid var(--rd-line);
      background: transparent;
      color: var(--rd-meta);
      font-size: 12px;
      letter-spacing: 0.08em;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: border-color 0.2s ease, color 0.2s ease;
    }
    .file:hover {
      color: var(--rd-text);
      border-bottom-color: var(--rd-accent);
    }
    .file input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .warmth { display: flex; gap: 8px; }
    .warmth button {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid var(--rd-line);
      background: transparent;
      color: transparent;
      font-size: 0;
      padding: 0;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .warmth button.active {
      background: var(--rd-accent);
      border-color: var(--rd-accent);
      box-shadow: 0 0 14px var(--rd-accent);
    }
    .submit {
      width: 100%;
      min-height: 44px;
      margin-top: 26px;
      border: 1px solid var(--rd-line);
      border-radius: 2px;
      background: transparent;
      color: var(--rd-text);
      font-size: 13px;
      letter-spacing: 0.28em;
      font-weight: 300;
      transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
    }
    .submit:hover {
      background: var(--rd-card-inset);
      color: var(--rd-text);
      border-color: var(--rd-accent);
    }
    .reader-media {
      border-radius: 8px;
      overflow: hidden;
      min-height: 220px;
      margin-bottom: 22px;
      background: rgba(255, 245, 230, 0.18);
    }
    .reader-media:empty { display: none; }
    .reader-media img,
    .reader-media video {
      display: block;
      width: 100%;
      max-height: 340px;
      object-fit: cover;
    }
    .reader h2 {
      margin: 0 0 14px;
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--rd-text);
    }
    .reader p {
      margin: 0;
      font-family: "Noto Serif SC", "Songti SC", serif;
      color: var(--rd-text);
      opacity: 0.88;
      line-height: 1.95;
      font-size: 14px;
      font-weight: 400;
    }

    /* ============ composer · 朋友圈式 ============ */
    .composer textarea { min-height: 120px; }
    .composer-media {
      border-radius: 10px;
      overflow: hidden;
      margin-top: 14px;
      margin-bottom: 6px;
      background: rgba(255, 245, 230, 0.18);
      max-height: 280px;
    }
    .composer-media:empty { display: none; }
    .composer-media img { display: block; width: 100%; max-height: 280px; object-fit: cover; }
    .composer-media video { display: block; width: 100%; max-height: 280px; }
    .composer-media audio { display: block; width: 100%; margin: 14px 0; }
    .big-file-note {
      padding: 6px 12px;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(180, 100, 60, 0.78);
      background: rgba(255, 220, 195, 0.32);
      text-align: center;
    }

    .media-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--rd-line);
    }
    .media-pick {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--rd-line);
      background: transparent;
      color: var(--rd-meta);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .media-pick:hover {
      color: var(--rd-text);
      border-color: var(--rd-accent);
      background: var(--rd-card-inset);
    }
    .media-pick svg { width: 18px; height: 18px; }
    .media-pick.clear {
      margin-left: auto;
      color: rgba(180, 80, 60, 0.62);
    }
    .media-pick[hidden] { display: none; }

    /* tag row · 3 标签替换情感重量 */
    .tag-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      gap: 14px;
    }
    .tag-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--rd-meta);
    }
    .tag-group {
      display: flex;
      gap: 8px;
    }
    .tag-group button {
      padding: 6px 14px;
      border: 1px solid var(--rd-line);
      border-radius: 99px;
      background: transparent;
      color: var(--rd-meta);
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-size: 12px;
      letter-spacing: 0.18em;
      padding-left: calc(14px + 0.18em);
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .tag-group button:hover {
      color: var(--rd-text);
      border-color: var(--rd-accent);
    }
    .tag-group button.active {
      color: var(--rd-text);
      border-color: var(--rd-accent);
      background: var(--rd-card-inset);
    }

    /* ============ 形状 = 内容形状 · 6 套 ============ */
    /* 默认所有 shape 都不显示日期，仅 shape-text 显示 */
    .panel.reader .reader-date { display: none; }
    /* shape-text：demo 版式放大版 — 4:5 竖版，顶部小日期 + 大正文
       padding-top 加到 56 给三个按钮（close / edit / del top:10 size:28）让出空间 */
    .panel.reader.shape-text {
      width: min(460px, calc(100vw - 34px));
      aspect-ratio: 4 / 5;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 56px 32px 28px;
    }
    .panel.reader.shape-text .reader-date {
      display: block;
      margin: 0 0 14px;
      font-family: "SF Mono", "Menlo", monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--rd-meta);
    }
    .panel.reader.shape-text .reader-media:empty { display: none; }
    /* 文字卡正文：跟 3D 卡片同字体（PingFang），demo 字号行距，可内 scroll */
    .panel.reader.shape-text #readerText {
      flex: 1;
      overflow-y: auto;
      margin: 0;
      font-family: "PingFang SC", -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.85;
      letter-spacing: 0.02em;
      color: var(--rd-text);
      opacity: 1;
    }
    .panel.reader.shape-audio {
      width: min(440px, calc(100vw - 34px));
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .panel.reader.shape-audio .reader-media { min-height: 0; margin-bottom: 18px; background: transparent; }

    /* 图/视频：照片填满 panel，标题/正文 overlay 在底部 */
    .panel.reader.shape-image-h,
    .panel.reader.shape-image-v,
    .panel.reader.shape-video-h,
    .panel.reader.shape-video-v {
      padding: 0;
      overflow: hidden;
      /* 照片/视频盖满 panel，背后模糊看不见还耗 GPU，关掉 */
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      background: rgba(0, 0, 0, 0.4);
    }
    .panel.reader.shape-image-h,
    .panel.reader.shape-video-h { width: min(680px, calc(100vw - 34px)); }
    .panel.reader.shape-image-v,
    .panel.reader.shape-video-v { width: min(340px, calc(100vw - 34px)); }

    .panel.reader[class*="shape-image"] .reader-media,
    .panel.reader[class*="shape-video"] .reader-media {
      margin: 0;
      border-radius: 0;
      min-height: 0;
      background: transparent;
    }
    .panel.reader.shape-image-h .reader-media img,
    .panel.reader.shape-image-h .reader-media video { width: 100%; height: auto; max-height: none; aspect-ratio: 16/10; object-fit: cover; }
    .panel.reader.shape-image-v .reader-media img,
    .panel.reader.shape-image-v .reader-media video { width: 100%; height: auto; max-height: none; aspect-ratio: 9/16; object-fit: cover; }
    .panel.reader.shape-video-h .reader-media img,
    .panel.reader.shape-video-h .reader-media video { width: 100%; height: auto; max-height: none; aspect-ratio: 16/9; object-fit: cover; }
    .panel.reader.shape-video-v .reader-media img,
    .panel.reader.shape-video-v .reader-media video { width: 100%; height: auto; max-height: none; aspect-ratio: 9/16; object-fit: cover; }

    /* panel-head 在图/视频形态下绝对定位到右上 */
    .panel.reader[class*="shape-image"] .panel-head,
    .panel.reader[class*="shape-video"] .panel-head {
      position: absolute;
      top: 14px;
      right: 14px;
      left: auto;
      margin: 0;
      z-index: 3;
    }
    .panel.reader[class*="shape-image"] .panel-title,
    .panel.reader[class*="shape-video"] .panel-title { display: none; }
    .panel.reader[class*="shape-image"] .close,
    .panel.reader[class*="shape-video"] .close {
      background: rgba(0, 0, 0, 0.32);
      border-color: rgba(255, 247, 232, 0.42);
      color: rgba(255, 247, 232, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .panel.reader[class*="shape-image"] h2,
    .panel.reader[class*="shape-video"] h2 {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 52px;
      margin: 0;
      color: #fff7e8;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.55);
      z-index: 3;
    }
    .panel.reader[class*="shape-image"] p,
    .panel.reader[class*="shape-video"] p {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 20px;
      color: rgba(255, 247, 232, 0.88);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
      font-size: 13px;
      z-index: 3;
    }
    /* 底部暗化让标题可读 */
    .panel.reader[class*="shape-image"]::after,
    .panel.reader[class*="shape-video"]::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 42%;
      background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.55) 100%);
      pointer-events: none;
      z-index: 2;
    }
    .empty {
      position: fixed;
      z-index: 4;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      text-align: center;
      pointer-events: none;
    }
    .empty.on { display: flex; }
    .empty-line {
      margin: 0;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.32em;
      color: rgba(255, 235, 200, 0.72);
      padding-left: 0.32em;

<script>
// Visibility pause: 父页面切 tab 时停掉本 iframe 的 RAF/setInterval，避免后台烧 CPU
(function(){
  let _raf = window.requestAnimationFrame.bind(window);
  let _caf = window.cancelAnimationFrame.bind(window);
  let _setInt = window.setInterval.bind(window);
  let _clrInt = window.clearInterval.bind(window);
  let active = true;
  let pendingRafs = [];      // {cb, id}
  let liveIntervals = new Map();
  let nextId = 1;
  window.requestAnimationFrame = function(cb){
    if (active) return _raf(cb);
    const id = nextId++;
    pendingRafs.push({cb, id});
    return id;
  };
  window.cancelAnimationFrame = function(id){
    pendingRafs = pendingRafs.filter(x => x.id !== id);
    return _caf(id);
  };
  window.setInterval = function(cb, ms){
    const id = _setInt(function(){ if (active) cb(); }, ms);
    liveIntervals.set(id, true);
    return id;
  };
  window.clearInterval = function(id){
    liveIntervals.delete(id);
    return _clrInt(id);
  };
  window.addEventListener("message", function(e){
    if (!e.data || e.data.type !== "memory-sparks:visibility") return;
    const wasActive = active;
    active = !!e.data.visible;
    if (!wasActive && active && pendingRafs.length){
      const q = pendingRafs; pendingRafs = [];
      q.forEach(({cb}) => _raf(cb));
    }
  });
})();
</script>

    function loadRecords() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        if (Array.isArray(stored) && stored.length) {
          return SHOW_DEMO ? [...stored, ...demoRecords] : stored;
        }
      } catch {}
      return SHOW_DEMO ? demoRecords : [];
    }

    function updateEmptyState() {
      const emptyEl = document.getElementById('empty');
      const addBtn = document.getElementById('addBtn');
      const isEmpty = records.length === 0;
      emptyEl.classList.toggle('on', isEmpty);
      addBtn.classList.toggle('hidden', isEmpty);
      if (isEmpty) hud.classList.add('soft');
    }

    // U盘建库（STORE-006）：同步进 healing/records.json + 总索引 / 插盘恢复 / 通知父级。
    function healingSyncFile() {
      const s = window.MS && window.MS.mediaStore;
      if (s && s.syncRecordsFromStorage) {
        s.syncRecordsFromStorage('healing', STORAGE_KEY, {
          meta: { name: '治愈星', keyword: '治愈' },
          mediaFields: ['src', 'image', 'video', 'audio'],
        }).catch(() => {});
      }
    }
    function healingRestoreFile() {
      const s = window.MS && window.MS.mediaStore;
      if (!s || !s.restoreToStorage) return Promise.resolve(false);
      return s.restoreToStorage('healing', STORAGE_KEY).then(restored => {
        if (restored) {
          try { window.parent && window.parent.postMessage({ type: 'memory-sparks:storage-changed', key: STORAGE_KEY }, '*'); } catch (_) {}
        }
        return restored;
      });
    }

    function saveRecords() {
      const cleaned = records
        .filter(item => !item.id.startsWith('demo-'))
        .map(item => {
          // fsa 真文件：内存里的 src/媒体字段已被水合成 blob: URL（会话级），
          // 存回 localStorage 时必须还原成持久的 'fsa:引用'（留底在 _fsaSrc），
          // 否则下次启动读不到媒体。
          if (item._fsaSrc && item._fsaSrc.startsWith('fsa:')) {
            const { _fsaSrc, ...rest } = item;
            const ref = _fsaSrc;
            const restored = { ...rest, src: ref };
            // 对应 kind 的媒体字段也写回引用（与 beforeSave 一致），其它清空
            if (item.type === 'image') { restored.image = ref; restored.images = [ref]; restored.video = ''; restored.audio = ''; }
            else if (item.type === 'video') { restored.video = ref; restored.image = ''; restored.images = []; restored.audio = ''; }
            else if (item.type === 'audio') { restored.audio = ref; restored.image = ''; restored.images = []; restored.video = ''; }
            return restored;
          }
          // blob: URL（非 fsa 来源，如大文件兜底）是会话级，刷新即失，不存进 localStorage
          if (item.src && item.src.startsWith('blob:')) {
            return { ...item, src: '', _largeFile: true };
          }
          return item;
        });
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cleaned));
      } catch (e) {
        // localStorage 满了（base64 太大）：去掉所有 src 再存
        const fallback = cleaned.map(item => ({ ...item, src: '', _largeFile: true }));
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(fallback)); } catch {}
      }
      healingSyncFile(); // U盘建库（STORE-006）
    }

    function init() {
      if (!window.THREE) {
        fallback.classList.add('on');
        return;
      }
      try {
        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false, powerPreference: 'high-performance' });
      } catch {
        fallback.classList.add('on');
        return;
      }
      // Retina(dpr=2) 全分辨率 = 渲染像素 ×4，治愈磨砂玻璃风格不需要 razor-sharp，
      // cap 到 1.5 省约 40% GPU，视觉几乎看不出差
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace || undefined;

      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0xf2ded4, 0.010);
      camera = new THREE.PerspectiveCamera(FOV_DEFAULT, window.innerWidth / window.innerHeight, 0.1, 180);
      camera.position.copy(layerCenters[0]);
      applyInitialLayerFromUrl();
      camera.position.z = -forward;
      raycaster = new THREE.Raycaster();
      pointer = new THREE.Vector2();
      bgGroup = new THREE.Group();
      cardGroup = new THREE.Group();
      particleGroup = new THREE.Group();
      decorGroup = new THREE.Group();
      scene.add(bgGroup, cardGroup, particleGroup, decorGroup);

      createBackground();
      createParticles();
      const hasBackend = !!(MS.mediaVault && MS.mediaVault.hasFileBackend && MS.mediaVault.hasFileBackend());
      if (!hasBackend) {
        // 无 U 盘（开发期默认路径）：直接同步建，行为与改动前完全一致。
        records = loadRecords();
        buildCards();
      } else {
        // 已有 U 盘句柄：先水合（把 fsa 引用换成 blob:）再建，避免拿 fsa: src 建一次空图。
        loadHydratedRecords().then(hydrated => {
          records = hydrated;
          buildCards();
        }).catch(err => {
          console.warn('[healing] 初次水合失败，降级直接建卡：', err);
          records = loadRecords();
          buildCards();
        });
      }
      bindEvents();
      animate();
      window.__healingSceneReady = true;
      // dev/debug only：expose 关键状态便于 CDP 自测
      window.__heal = { get cardMeshes(){ return cardMeshes; }, get records(){ return records; }, get currentLayer(){ return currentLayer; } };
      // 调试用：?open=<id> 自动打开 reader / ?testShape=<text|audio|image-h|image-v|video-h|video-v> 强制某形状
      const params = new URLSearchParams(location.search);
      const openId = params.get('open');
      if (openId) setTimeout(() => openReader(openId), 800);
      const testShape = params.get('testShape');
      if (testShape) setTimeout(() => openReaderTestShape(testShape), 800);
      if (params.get('openComposer')) setTimeout(() => openComposer(), 800);

      // 自动连测：?autoSeq=1 依次跨层添加 3 条
      if (params.get('autoSeq')) {
        const sequence = [
          { layer: 1, title: 'A · 陪伴' },
          { layer: 2, title: 'B · 启发' },
          { layer: 0, title: 'C · 温柔' },
        ];
        let i = 0;
        const dumpState = (tag) => {
          const layerCounts = [0, 1, 2].map(layer =>
            cardMeshes.filter(m => m.userData.base.layer === layer).length
          );
          const visibleByLayer = [0, 1, 2].map(layer =>
            cardMeshes.filter(m => m.userData.base.layer === layer && m.visible).length
          );
          window.__autoSeqLog = window.__autoSeqLog || [];
          window.__autoSeqLog.push({ tag, currentLayer, layerCounts, visibleByLayer, time: Date.now() });
        };
        const runOne = (step) => {
          if (step >= sequence.length) {
            dumpState('done');
            window.__autoSeqDone = true;
            return;
          }
          const s = sequence[step];
          dumpState(`before_${step}_layer${s.layer}`);
          openComposer();
          setTimeout(() => {
            titleInput.value = s.title;
            textInput.value = '自测条目 #' + (step + 1);
            selectedLayer = s.layer;
            document.querySelectorAll('#layerTags button').forEach(b => {
              b.classList.toggle('active', Number(b.dataset.layer) === s.layer);
            });
            setTimeout(async () => {
              await addMemory();
              setTimeout(() => {
                dumpState(`after_${step}_layer${s.layer}`);
                runOne(step + 1);
              }, 3000); // 等 flyIn 跑完
            }, 300);
          }, 200);
        };
        setTimeout(() => runOne(0), 1200);
      }
    }

    function openReaderTestShape(shape) {
      const isVertical = shape.endsWith('-v');
      const isHorizontal = shape.endsWith('-h');
      const isImage = shape.startsWith('image');
      const isVideo = shape.startsWith('video');
      const w = isVertical ? 360 : 800;
      const h = isVertical ? 640 : (shape === 'video-h' ? 450 : 500);
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e8a89e"/><stop offset="40%" stop-color="#f4c89e"/><stop offset="100%" stop-color="#4a3a52"/></linearGradient></defs><rect width="${w}" height="${h}" fill="url(#g)"/></svg>`;
      const dataUrl = 'data:image/svg+xml;base64,' + btoa(svg);
      const titles = { text: '把话说出来', audio: '奶奶哼歌', 'image-h': '回家的桥', 'image-v': '小巷', 'video-h': '傍晚的雨', 'video-v': '猫' };
      const titleEl = document.getElementById('readerTitle');
      const textEl = document.getElementById('readerText');
      const mediaEl = document.getElementById('readerMedia');
      titleEl.textContent = titles[shape] || shape;
      textEl.textContent = '那天天色融得很慢，像有人在远处轻轻揉它。';
      if (isImage) mediaEl.innerHTML = `<img src="${dataUrl}" alt="">`;
      else if (isVideo) mediaEl.innerHTML = `<img src="${dataUrl}" alt="">`; // 用图代替视频静帧
      else if (shape === 'audio') mediaEl.innerHTML = '';
      else mediaEl.innerHTML = '';
      READER_SHAPES.forEach(c => reader.classList.remove(c));
      reader.classList.add('shape-' + shape);
      reader.classList.add('open');
      overlay.classList.add('on');
      // dev 用：直接 set 到屏幕中心 + 完全可见（绕过动画）
      gsap.set(reader, { xPercent: -50, yPercent: -50, x: 0, y: 0, opacity: 1 });
    }
