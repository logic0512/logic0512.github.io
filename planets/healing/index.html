    function createBackground() {
      const geometry = new THREE.SphereGeometry(140, 48, 24);
      SCENE_PALETTE.forEach((palette, index) => {
        const texture = new THREE.CanvasTexture(makeVoidCanvas(1024, 1024, palette));
        texture.colorSpace = THREE.SRGBColorSpace || undefined;
        const material = new THREE.MeshBasicMaterial({
          map: texture,
          side: THREE.BackSide,
          transparent: true,
          opacity: index === currentLayer ? 1 : 0,
          depthTest: false,
          depthWrite: false
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.userData.layer = index;
        mesh.userData.baseOpacity = 1;
        mesh.renderOrder = -1000;
        mesh.visible = index === currentLayer;
        bgGroup.add(mesh);
      });
    }

    function makeVoidCanvas(width, height, palette) {
      const c = document.createElement('canvas');
      c.width = width;
      c.height = height;
      const ctx = c.getContext('2d');
      ctx.fillStyle = palette.base;
      ctx.fillRect(0, 0, width, height);

      addRadial(ctx, width * 0.18, height * 0.16, width * 0.86, palette.glowA, 'rgba(255, 248, 232, 0)');
      addRadial(ctx, width * 0.72, height * 0.32, width * 0.76, palette.glowB, 'rgba(235, 244, 239, 0)');
      addRadial(ctx, width * 0.52, height * 0.84, width * 0.70, palette.glowC, 'rgba(238, 242, 252, 0)');
      addRadial(ctx, width * 0.46, height * 0.44, width * 0.54, 'rgba(255, 255, 255, 0.26)', 'rgba(255, 255, 255, 0)');

      const starCount = 340;
      for (let i = 0; i < starCount; i++) {
        const x = Math.random() * width;
        const y = Math.random() * height;
        const tiny = Math.random();
        const r = tiny < 0.92 ? 0.35 + Math.random() * 0.45 : 0.8 + Math.random() * 0.95;
        const alpha = tiny < 0.92 ? 0.11 + Math.random() * 0.2 : 0.22 + Math.random() * 0.28;
        ctx.fillStyle = `rgba(${palette.speck}, ${alpha.toFixed(3)})`;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      return c;
    }

    function addRadial(ctx, x, y, r, a, b) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, a);
      g.addColorStop(1, b);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    }

    function createParticles() {
      const count = 150;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const colorA = new THREE.Color(0xfff4d7);
      const colorB = new THREE.Color(0xf1b99a);
      for (let i = 0; i < count; i++) {
        positions[i * 3 + 0] = (Math.random() - 0.5) * 18;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 9;
        positions[i * 3 + 2] = -Math.random() * FIELD_DEPTH - 2;
        const color = colorA.clone().lerp(colorB, Math.random() * 0.7);
        colors[i * 3 + 0] = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const mat = new THREE.PointsMaterial({
        size: 0.045,
        sizeAttenuation: true,
        vertexColors: true,
        transparent: true,
        opacity: 0.42,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      particleGroup.add(new THREE.Points(geo, mat));
    }

    function flyInNewCard(newId) {
      // 找被标记 spawning 的那一份（buildCards 只标第一份）
      const mesh = cardMeshes.find(m => m.userData.record.id === newId && m.userData.spawning)
                || cardMeshes.find(m => m.userData.record.id === newId);
      if (!mesh) return;
      if (typeof gsap === 'undefined') {
        if (mesh.userData.spawning) {
          spawningCount = Math.max(0, spawningCount - 1);
          mesh.userData.spawning = false;
        }
        const baseScale = mesh.userData.base?.scale || 1;
        mesh.userData.currentScale = baseScale;
        mesh.userData.targetScale = baseScale;
        mesh.scale.setScalar(baseScale);
        mesh.material.opacity = mesh.userData.base?.opacity || 1;
        return;
      }

      // 终点 = 卡片已经在 buildCards 里确定的位置
      const finalPos = mesh.position.clone();
      const finalScale = 1;
      const finalOpacity = mesh.userData.base.opacity || 1;

      // 起点 = 相机正前方 ~2.4 单位（即用户刚刚看 composer 的位置）
      const camForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
      const startPos = camera.position.clone().add(camForward.clone().multiplyScalar(2.4));

      // 控制点 = 起点→终点中点 + 垂直方向 hash 偏移 → 每张卡曲线不一样
      const idHash = hashId(newId);
      const midPos = startPos.clone().lerp(finalPos, 0.5);
      const dirToFinal = finalPos.clone().sub(startPos).normalize();
      const camUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
      const perp = new THREE.Vector3().crossVectors(dirToFinal, camUp).normalize();
      const sideAmount = ((idHash % 1000) / 1000 - 0.5) * 5.0;
      const upAmount = ((idHash % 71) / 71 - 0.15) * 3.5;
      const ctrlPos = midPos
        .add(perp.multiplyScalar(sideAmount))
        .add(camUp.clone().multiplyScalar(upAmount));

      mesh.position.copy(startPos);
      mesh.scale.setScalar(0.35);
      mesh.material.opacity = 0;
      mesh.userData.spawning = true;
      mesh.userData.currentScale = 0.35;
      mesh.userData.targetScale = 1;

      const halo = makeHaloMesh(mesh);
      mesh.add(halo);

      // 相机引导：朝向 finalPos
      const camTarget = computeYawPitchTo(finalPos.clone().sub(camera.position));
      const yawDelta = shortestAngleDelta(targetYaw, camTarget.yaw);
      const pitchDelta = camTarget.pitch - targetPitch;
      velocityYaw = 0;
      velocityPitch = 0;
      targetYaw += yawDelta * 0.92;
      targetPitch = clampPitch(targetPitch + pitchDelta * 0.92);

      // bezier 轨迹 · 每张卡独立曲线
      const t = { value: 0 };
      const tl = gsap.timeline({
        onComplete: () => {
          if (mesh.userData.spawning) spawningCount = Math.max(0, spawningCount - 1);
          mesh.userData.spawning = false;
          mesh.userData.currentScale = finalScale;
          mesh.userData.targetScale = finalScale;
          mesh.position.copy(finalPos);
          mesh.remove(halo);
          halo.geometry.dispose();
          halo.material.map?.dispose();
          halo.material.dispose();
        }
      });

      tl.to(t, {
        value: 1,
        duration: 2.4,
        ease: 'power3.out',
        onUpdate: () => {
          const tt = t.value;
          const omt = 1 - tt;
          const k0 = omt * omt;
          const k1 = 2 * omt * tt;
          const k2 = tt * tt;
          mesh.position.set(
            k0 * startPos.x + k1 * ctrlPos.x + k2 * finalPos.x,
            k0 * startPos.y + k1 * ctrlPos.y + k2 * finalPos.y,
            k0 * startPos.z + k1 * ctrlPos.z + k2 * finalPos.z
          );
        }
      }, 0)
      .to(mesh.scale, {
        x: finalScale, y: finalScale, z: finalScale,
        duration: 2.0, ease: 'expo.out'
      }, 0)
      .to(mesh.material, {
        opacity: finalOpacity,
        duration: 1.2, ease: 'power2.out'
      }, 0)
      .to(halo.material, { opacity: 0.48, duration: 1.0, ease: 'power2.out' }, 0)
      .to(halo.material, { opacity: 0, duration: 1.4, ease: 'sine.inOut' }, '>-0.2')
      .to(mesh.scale, {
        x: finalScale * 1.05, y: finalScale * 1.05, z: finalScale * 1.05,
        duration: 0.7, ease: 'sine.inOut', yoyo: true, repeat: 1
      }, '>-0.1');
    }

    function makeHaloMesh(cardMesh) {
      const c = document.createElement('canvas');
      c.width = c.height = 256;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(128, 128, 24, 128, 128, 128);
      g.addColorStop(0, 'rgba(255,230,195,0.72)');
      g.addColorStop(0.4, 'rgba(255,205,165,0.30)');
      g.addColorStop(1, 'rgba(255,195,155,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 256, 256);
      const tex = new THREE.CanvasTexture(c);
      const pose = cardMesh.userData.base;
      const geo = new THREE.PlaneGeometry(pose.w * 2.0, pose.h * 2.0);
      const mat = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: true,
        opacity: 0,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const halo = new THREE.Mesh(geo, mat);
      halo.position.z = -0.02;
      return halo;
    }

    function computeYawPitchTo(worldVector) {
      const v = worldVector.clone().normalize();
      const pitch = Math.asin(Math.max(-1, Math.min(1, v.y)));
      const yaw = Math.atan2(-v.x, -v.z);
      return { yaw, pitch };
    }

    function shortestAngleDelta(from, to) {
      const TAU = Math.PI * 2;
      let d = (to - from) % TAU;
      if (d > Math.PI) d -= TAU;
      if (d < -Math.PI) d += TAU;
      return d;
    }

    function repositionLayer(layer) {
      cardMeshes.forEach(mesh => {
        if (mesh.userData.base.layer !== layer) return;
        const pose = mesh.userData.base;
        mesh.position.copy(pose.localOffset);
        mesh.lookAt(pose.lookTarget);
        if (pose.rollJitter) mesh.rotateZ(pose.rollJitter);
        mesh.userData.baseEuler.copy(mesh.rotation);
      });
    }

    // 层切换串行队列：连续两次调用不会被吞掉，第二次等第一次跑完再开始
    let _layerTransitionChain = Promise.resolve();
    function goToLayer(target) {
      const next = _layerTransitionChain.then(() => new Promise(resolve => {
        if (target < 0 || target >= TOTAL_LAYERS) { resolve(); return; }
        if (target === currentLayer) { resolve(); return; }
        const fromLayer = currentLayer;
        currentLayer = target;
        targetForward = FOCUS_DEPTHS[target] ?? FOCUS_DEPTHS[0];
        targetFov = FOV_DEFAULT + Math.min(5, targetForward * 0.12);
        hud.classList.add('soft');
        applyLayerTitleOverlay(target);
        let settled = false;
        const settle = () => { if (!settled) { settled = true; resolve(); } };
        transitionLayer(fromLayer, target, settle);
        // 兜底：gsap 异常或 onComplete 没触发时，最长 2.5s 强制结束
        setTimeout(settle, 2500);
      }));
      _layerTransitionChain = next.catch(() => {});
      return next;
    }

    function deepen() { goToLayer(currentLayer + 1); }
    function surface() { goToLayer(currentLayer - 1); }

    function resetView() {
      targetYaw = INITIAL_YAW;
      targetPitch = INITIAL_PITCH;
      targetFov = INITIAL_FOV;
      velocityYaw = 0;
      velocityPitch = 0;
      dragging = false;
      hoverMesh = null;
      hud.classList.add('soft');
    }

    function applyInitialLayerFromUrl() {
      const layer = Number(new URLSearchParams(location.search).get('layer'));
      if (!Number.isInteger(layer) || layer < 0 || layer >= TOTAL_LAYERS) return;
      currentLayer = layer;
      targetForward = FOCUS_DEPTHS[layer] ?? 0;
      forward = targetForward;
      targetFov = FOV_DEFAULT + Math.min(5, targetForward * 0.12);
    }

    function buildCards(newId = null) {
      const disposedMaps = new Set();
      cardMeshes.forEach(mesh => {
        mesh.userData.disposed = true;
        mesh.geometry.dispose();
        const map = mesh.material.map;
        if (map && !disposedMaps.has(map)) {
          map.dispose();
          disposedMaps.add(map);
        }
        mesh.material.dispose();
        cardGroup.remove(mesh);
      });
      clearDecorGroup();
      sceneTitleMeshes = [];
      cardMeshes = [];
      currentLayerCards = [];
      spawningCount = 0;
      // STORE-008：场景只渲染最新 90 张（records 新→旧，存档/日志页仍是全部，saveRecords 写全量，不丢）
      const visualItems = expandVisualItems(records.slice(0, HEALING_DISPLAY_MAX));
      pruneMediaThumbnailCache(visualItems);
      const cardTextureCache = new Map();
      let newIdSpawnAssigned = false;
      visualItems.forEach((item, index) => {
        const { record, visualId } = item;
        const slot = Number.isInteger(item.slotIndex) ? item.slotIndex : index;
        const layer = getPointForSlot(slot);
        const pose = getPose(record, Number(record.warmth || 3), slot, layer, visualId);
        const { texture } = getSharedCardTexture(record, pose, cardTextureCache);
        const geometry = new THREE.PlaneGeometry(pose.w, pose.h, 1, 1);
        const material = new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          opacity: pose.opacity,
          side: THREE.DoubleSide,
          depthWrite: false
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(pose.localOffset);
        mesh.lookAt(pose.lookTarget);
        if (pose.rollJitter) mesh.rotateZ(pose.rollJitter);
        mesh.renderOrder = 10;
        const baseEuler = new THREE.Euler(mesh.rotation.x, mesh.rotation.y, mesh.rotation.z, mesh.rotation.order);
        const isSpawnTarget = record.id === newId && !newIdSpawnAssigned;
        if (isSpawnTarget) newIdSpawnAssigned = true;
        mesh.userData = {
          record,
          visualId,
          base: pose,
          baseEuler,
          targetScale: pose.scale,
          currentScale: isSpawnTarget ? 0.05 : pose.scale
        };
        // 只有第一份 newId 走 flyInNewCard 入场动画，其他副本正常出现
        if (isSpawnTarget) {
          material.opacity = 0;
          mesh.userData.spawning = true;
          spawningCount++;
        }
        mesh.scale.setScalar(mesh.userData.currentScale);
        cardGroup.add(mesh);
        cardMeshes.push(mesh);
      });
      buildSceneDecor();
      applyLayerVisibility(currentLayer, true);
      refreshCurrentLayerCards();
      decorateMediaForLayer(currentLayer);
      updateEmptyState();
      window.__healingDebug = {
        cards: cardMeshes.length,
        layerCounts: [0, 1, 2].map(layer => cardMeshes.filter(mesh => mesh.userData.base.layer === layer).length),
        layout: 'orbit-field-with-layer-scenes'
      };
    }

    function refreshCurrentLayerCards() {
      currentLayerCards = cardMeshes.filter(mesh => mesh.userData.base.layer === currentLayer);
    }

    function decorateMediaForLayer(layer) {
      const seen = new Set();
      cardMeshes.forEach(mesh => {
        if (mesh.userData.base.layer !== layer) return;
        const record = mesh.userData.record;
        if (!record?.src || (record.type !== 'image' && record.type !== 'video')) return;
        const key = mediaCacheKey(record);
        if (!key || seen.has(key)) return;
        seen.add(key);
        decorateMediaMesh(mesh, record);
      });
    }

    function getSharedCardTexture(record, pose, cache) {
      const key = cardTextureKey(record, pose);
      const cached = cache.get(key);
      if (cached) return { texture: cached, shouldDecorate: false };
      const texture = new THREE.CanvasTexture(makeCardCanvas(record, pose));
      texture.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
      texture.minFilter = THREE.LinearMipMapLinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = true;
      texture.colorSpace = THREE.SRGBColorSpace || undefined;
      cache.set(key, texture);
      return { texture, shouldDecorate: true };
    }

    function cardTextureKey(record, pose) {
      return [
        record.id,
        record.type || 'text',
        pose?.shape || getRecordShape(record),
        record.title || '',
        record.text || '',
        record.duration || '',
        record.fileName || '',
        mediaSignature(record.src)
      ].join('|');
    }

    function layerObjects(layer) {
      const objects = cardMeshes.filter(mesh => mesh.userData.base.layer === layer);
      decorGroup.children.forEach(obj => {
        if (obj.userData.layer === layer) objects.push(obj);
      });
      return objects;
    }

    function backgroundObjects(layer) {
      return bgGroup.children.filter(obj => obj.userData.layer === layer);
    }

    function setObjectOpacity(obj, opacity) {
      const materials = [];
      if (obj.material) {
        materials.push(...(Array.isArray(obj.material) ? obj.material : [obj.material]));
      } else if (obj.children?.length) {
        obj.traverse(child => {
          if (!child.material) return;
          materials.push(...(Array.isArray(child.material) ? child.material : [child.material]));
        });
      }
      materials.forEach(mat => {
        mat.transparent = true;
        mat.opacity = opacity;
      });
    }

    function objectBaseOpacity(obj) {
      if (typeof obj.userData.baseOpacity === 'number') return obj.userData.baseOpacity;
      if (typeof obj.userData.base?.opacity === 'number') return obj.userData.base.opacity;
      return 1;
    }

    function applyLayerVisibility(layer, immediate = false) {
      [...bgGroup.children, ...cardMeshes, ...decorGroup.children].forEach(obj => {
        // spawning 状态的卡（新增中）opacity/scale 由 flyInNewCard 接管，这里只确保 visible
        if (obj.userData.spawning) {
          obj.visible = true;
          return;
        }
        const active = obj.userData.base?.layer === layer || obj.userData.layer === layer;
        obj.visible = active;
        setObjectOpacity(obj, active ? objectBaseOpacity(obj) : 0);
        if (obj.userData.base) {
          const baseScale = obj.userData.base.scale || 1;
          obj.userData.currentScale = active || immediate ? baseScale : baseScale * 0.82;
          obj.userData.targetScale = baseScale;
          obj.scale.setScalar(obj.userData.currentScale);
        }
      });
    }

    function transitionLayer(fromLayer, toLayer, onDone) {
      isLayerAnimating = true;
      const oldBackgrounds = backgroundObjects(fromLayer);
      const newBackgrounds = backgroundObjects(toLayer);
      const oldObjects = layerObjects(fromLayer);
      const newObjects = layerObjects(toLayer);

      newBackgrounds.forEach(obj => {
        obj.visible = true;
        setObjectOpacity(obj, 0);
      });
      newObjects.forEach(obj => {
        obj.visible = true;
        setObjectOpacity(obj, 0);
        if (obj.userData.base) {
          const baseScale = obj.userData.base.scale || 1;
          obj.userData.currentScale = baseScale * 0.82;
          obj.userData.targetScale = baseScale;
          obj.scale.setScalar(obj.userData.currentScale);
        }
      });

      if (typeof gsap === 'undefined') {
        oldBackgrounds.forEach(obj => { obj.visible = false; setObjectOpacity(obj, 0); });
        newBackgrounds.forEach(obj => { obj.visible = true; setObjectOpacity(obj, objectBaseOpacity(obj)); });
        oldObjects.forEach(obj => { obj.visible = false; setObjectOpacity(obj, 0); });
        newObjects.forEach(obj => setObjectOpacity(obj, objectBaseOpacity(obj)));
        isLayerAnimating = false;
        refreshCurrentLayerCards();
        decorateMediaForLayer(toLayer);
        onDone?.();
        return;
      }

      const tl = gsap.timeline({
        onComplete: () => {
          oldBackgrounds.forEach(obj => { obj.visible = false; setObjectOpacity(obj, 0); });
          newBackgrounds.forEach(obj => { obj.visible = true; setObjectOpacity(obj, objectBaseOpacity(obj)); });
          oldObjects.forEach(obj => { obj.visible = false; setObjectOpacity(obj, 0); });
          newObjects.forEach(obj => {
            obj.visible = true;
            setObjectOpacity(obj, objectBaseOpacity(obj));
            if (obj.userData.base) {
              const baseScale = obj.userData.base.scale || 1;
              obj.userData.currentScale = baseScale;
              obj.userData.targetScale = baseScale;
              obj.scale.setScalar(baseScale);
            }
          });
          isLayerAnimating = false;
          refreshCurrentLayerCards();
          decorateMediaForLayer(toLayer);
          onDone?.();
        }
      });

      oldBackgrounds.forEach(obj => {
        const materials = Array.isArray(obj.material) ? obj.material : [obj.material].filter(Boolean);
        materials.forEach(mat => tl.to(mat, { opacity: 0, duration: 0.95, ease: 'sine.inOut' }, 0));
      });
      newBackgrounds.forEach(obj => {
        const materials = Array.isArray(obj.material) ? obj.material : [obj.material].filter(Boolean);
        materials.forEach(mat => tl.to(mat, { opacity: objectBaseOpacity(obj), duration: 0.95, ease: 'sine.inOut' }, 0));
      });
      oldObjects.forEach(obj => {
        const materials = Array.isArray(obj.material) ? obj.material : [obj.material].filter(Boolean);
        materials.forEach(mat => tl.to(mat, { opacity: 0, duration: 0.42, ease: 'sine.out' }, 0.08));
      });
      newObjects.forEach(obj => {
        const materials = Array.isArray(obj.material) ? obj.material : [obj.material].filter(Boolean);
        materials.forEach(mat => tl.to(mat, { opacity: objectBaseOpacity(obj), duration: 0.9, ease: 'sine.out' }, 0.62));
        if (obj.userData.base) {
          const baseScale = obj.userData.base.scale || 1;
          tl.to(obj.scale, { x: baseScale, y: baseScale, z: baseScale, duration: 1.0, ease: 'power2.out' }, 0.62);
        }
      });
    }

    function getRecordLayer(record) {
      if (Number.isInteger(record.layer) && record.layer >= 0 && record.layer < TOTAL_LAYERS) return record.layer;
      const w = Math.max(1, Math.min(5, Number(record.warmth) || 3));
      if (w >= 5) return 2;
      if (w >= 4) return 1;
      return 0;
    }

    function expandVisualItems(sourceRecords) {
      if (!sourceRecords.length) return [];
      const layerBuckets = [[], [], []];
      sourceRecords.forEach(record => {
        const layer = getRecordLayer(record);
        layerBuckets[layer].push(record);
      });
      const items = [];
      layerBuckets.forEach((bucket, layer) => {
        if (!bucket.length) return;
        const copies = 1; // 1 个内容只占 1 张卡（修：原来 < 15 时复制 3 份，会出 1 变 3 的视觉 bug）
        const layerStart = layer * CARDS_PER_POINT;
        let slotInLayer = 0;
        bucket.forEach((record, idx) => {
          for (let c = 0; c < copies; c++) {
            if (slotInLayer >= CARDS_PER_POINT) break;
            items.push({
              record,
              visualId: `${record.id}:v${c}:${slotInLayer}`,
              slotIndex: layerStart + slotInLayer,
            });
            slotInLayer++;
          }
        });
      });
      return items;
    }

    const LAYER_TITLES = ['GENTLE', 'COMPANION', 'INSPIRE'];

    function clearDecorGroup() {
      if (!decorGroup) return;
      decorGroup.traverse(obj => {
        obj.geometry?.dispose?.();
        if (Array.isArray(obj.material)) obj.material.forEach(mat => mat.dispose?.());
        else obj.material?.dispose?.();
        obj.material?.map?.dispose?.();
      });
      decorGroup.clear();
    }

    function buildSceneDecor() {
      createSceneTitles();
      createGentleLightPanes();
      createCompanionThreads();
      createInspirationTrails();
    }

    function createSceneTitles() {
      // 标题改用 HTML overlay（在 #layerTitle），不再创建 3D plane
      // 3D plane 即使 depthTest:false 也会被 transparent 卡片的 alpha 稀释
      applyLayerTitleOverlay(currentLayer);
    }

    function applyLayerTitleOverlay(layerIndex) {
      const paletteName = (SCENE_PALETTE[layerIndex] && SCENE_PALETTE[layerIndex].name) || 'gentle';
      document.body.dataset.layer = paletteName;
      const el = document.getElementById('layerTitle');
      if (!el) return;
      const target = LAYER_TITLES[layerIndex] || '';
      if (el.dataset.text === target) return;
      el.classList.add('fade-out');
      setTimeout(() => {
        el.textContent = target;
        el.dataset.text = target;
        el.classList.remove('fade-out');
      }, 260);
    }

    function makeTitleCanvas(title, palette, index) {
      const c = document.createElement('canvas');
      c.width = 1280;
      c.height = 280;
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, c.width, c.height);

      ctx.fillStyle = palette.title.replace(/[\d.]+\)$/, '0.55)');
      ctx.font = '300 64px "SF Mono", "JetBrains Mono", "Menlo", "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const spacedTitle = [...title].join('  ');
      ctx.fillText(spacedTitle, c.width / 2, c.height / 2);
      return c;
    }

    function drawSpacedText(ctx, text, x, y, spacing) {
      let cursor = x;
      [...text].forEach(char => {
        ctx.fillText(char, cursor, y);
        cursor += ctx.measureText(char).width + spacing;
      });
    }

    function createGentleLightPanes() {
      const material = new THREE.MeshBasicMaterial({
        color: 0xfff4e8,
        transparent: true,
        opacity: 0.16,
        depthTest: false,
        depthWrite: false,
        side: THREE.DoubleSide
      });
      for (let i = 0; i < 7; i++) {
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(3.4 + i * 0.12, 1.5), material.clone());
        mesh.position.set((i - 3) * 1.55, 1.7 + (i % 2) * 0.9, -4.5 - i * 1.2);
        mesh.rotation.set(0.12, -0.36 + i * 0.12, 0.05);
        mesh.renderOrder = 2;
        mesh.userData.layer = 0;
        mesh.userData.baseOpacity = 0.16;
        decorGroup.add(mesh);
      }
    }

    function createCompanionThreads() {
      const meshes = cardMeshes.filter(mesh => mesh.userData.base.layer === 1);
      const points = [];
      for (let i = 0; i < meshes.length - 1; i += 5) {
        const a = meshes[i].position;
        const b = meshes[(i + 3) % meshes.length].position;
        if (a.distanceTo(b) > 7.8) continue;
        points.push(a.x, a.y, a.z, b.x, b.y, b.z);
      }
      if (!points.length) return;
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
      const material = new THREE.LineBasicMaterial({
        color: 0xfff0cf,
        transparent: true,
        opacity: 0.20,
        depthTest: false,
        depthWrite: false
      });
      const line = new THREE.LineSegments(geometry, material);
      line.renderOrder = 3;
      line.userData.layer = 1;
      line.userData.baseOpacity = 0.20;
      decorGroup.add(line);
    }

    function createInspirationTrails() {
      const centerZ = -2 * POINT_GAP;
      const material = new THREE.LineBasicMaterial({
        color: 0xffead8,
        transparent: true,
        opacity: 0.20,
        depthTest: false,
        depthWrite: false
      });
      for (let i = 0; i < 6; i++) {
        const side = i % 2 ? -1 : 1;
        const y = -1.9 + i * 0.72;
        const curve = new THREE.CatmullRomCurve3([
          new THREE.Vector3(side * 5.2, y, centerZ + 5.2),
          new THREE.Vector3(side * 2.2, y * 0.42, centerZ - 1.4),
          new THREE.Vector3(side * 0.9, y * 0.18, centerZ - 8.4),
          new THREE.Vector3(side * 3.2, y * 0.08, centerZ - 15.8)
        ]);
        const geometry = new THREE.BufferGeometry().setFromPoints(curve.getPoints(36));
        const line = new THREE.Line(geometry, material.clone());
        line.renderOrder = 3;
        line.userData.layer = 2;
        line.userData.baseOpacity = 0.20;
        decorGroup.add(line);
      }
    }

    const CARD_SIZE = 2.25; // 原 1.32 → 1.5 → 2.25（用户反复反馈要更大）
    const FIELD_DEPTH = 72;
    const FORWARD_MAX = 56;
    const TOTAL_LAYERS = 3;
    const FOCUS_DEPTHS = [0, 28, 56];
    const POINT_GAP = 28;
    // 横竖编排不重叠规则（CARD_SIZE=2.25 下重新验算）：
    //   - 每 ring 12 个 slot → yawStep 30°
    //   - 最大卡（ring0 横版+anchor1.18+warmth5+random max1.07）卡角宽 ≈ 20°
    //   - yawJitter ±4°（0.14 coeff），最坏 slot 间距 = 30° - 8° = 22° > 20° → 不重叠
    //   - ring 1/2（scale 0.82）卡角 14.4°、ring 3（scale 0.62）卡角 9°，都安全
    const RING_SLOTS = 12;
    const CARDS_PER_POINT = RING_SLOTS * 4; // 每层 4 圈 × 12 = 48 槽位
    const HEALING_SPREAD = 1.2; // STORE-008 定稿：卡片圈半径倍数（间距）
    const HEALING_DISPLAY_MAX = 90; // STORE-008 定稿：场景最多同时显示最新 90 张（其余仍在日志页/存档）
    const ORBIT_RINGS = [
      { radius: 8.7, pitch: -0.02, scale: 1.00, count: RING_SLOTS },
      { radius: 9.7, pitch: 0.34, scale: 0.82, count: RING_SLOTS },
      { radius: 9.7, pitch: -0.34, scale: 0.82, count: RING_SLOTS },
      { radius: 11.4, pitch: 0.10, scale: 0.62, count: RING_SLOTS }
    ];
    const layerCenters = [
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, 0, 0)
    ];

    function getLayerForWarmth(w) {
      const wn = Math.max(1, Math.min(5, Number(w) || 3));
      if (wn >= 5) return 2;
      if (wn === 4) return 1;
      return 0;
    }

    // 卡片形状 = 内容形状（含异步测量缓存）
    const SHAPE_DIM = {
      'image-h': { w: 1.18, h: 0.74 }, // 16/10
      'image-v': { w: 0.66, h: 1.18 }, // 9/16
      'video-h': { w: 1.20, h: 0.68 }, // 16/9
      'video-v': { w: 0.66, h: 1.18 }, // 9/16
      'audio':   { w: 0.95, h: 0.95 }, // 1/1
      'text':    { w: 0.80, h: 1.12 }, // 5/7
    };
    const aspectCache = new Map(); // id → 'h' | 'v'
    const aspectInflight = new Set();

    function getRecordShape(record) {
      if (!record) return 'text';
      if (record.type === 'text') return 'text';
      if (record.type === 'audio') return 'audio';
      if (record.type === 'image' || record.type === 'video') {
        // 1) record.aspect 持久化优先（保存时已测量过）
        if (record.aspect === 'h' || record.aspect === 'v') {
          return `${record.type}-${record.aspect}`;
        }
        // 2) 内存缓存（异步测量后存的）
        const cached = aspectCache.get(record.id);
        if (cached) return `${record.type}-${cached}`;
        // 3) 未测量：先返回横向默认；如果有 src 异步测一下
        if (record.src && !aspectInflight.has(record.id)) {
          aspectInflight.add(record.id);
          measureAspect(record).then(asp => {
            aspectInflight.delete(record.id);
            if (!asp) return;
            const prev = aspectCache.get(record.id);
            aspectCache.set(record.id, asp);
            // 顺手把 aspect 写回 record + 持久化，下次启动就不用再测了
            const target = records.find(r => r.id === record.id);
            if (target && target.aspect !== asp) {
              target.aspect = asp;
              try { saveRecords(); } catch {}
            }
            if (prev !== asp) buildCards();
          });
        }
        return `${record.type}-h`;
      }
      return 'text';
    }

    function measureAspect(record) {
      return new Promise(resolve => {
        if (!record.src) return resolve(null);
        if (record.type === 'image') {
          const img = new Image();
          img.onload = () => resolve(img.naturalWidth >= img.naturalHeight ? 'h' : 'v');
          img.onerror = () => resolve(null);
          img.src = record.src;
        } else if (record.type === 'video') {
          const v = document.createElement('video');
          let done = false;
          const finish = (value) => {
            if (done) return;
            done = true;
            try {
              v.removeAttribute('src');
              v.load();
            } catch {}
            resolve(value);
          };
          v.preload = 'metadata';
          v.muted = true;
          v.playsInline = true;
          v.onloadedmetadata = () => finish(v.videoWidth >= v.videoHeight ? 'h' : 'v');
          v.onerror = () => finish(null);
          v.src = record.src;
        } else {
          resolve(null);
        }
      });
    }

    function hashId(s) {
      const str = String(s || 'x');
      let h = 5381;
      for (let i = 0; i < str.length; i++) {
        h = ((h * 33) ^ str.charCodeAt(i)) | 0;
      }
      return Math.abs(h) + 1;
    }

    function getPointForSlot(slot) {
      return Math.min(TOTAL_LAYERS - 1, Math.floor(slot / CARDS_PER_POINT));
    }

    function getPose(record, warmth, slot, layer, visualId = record.id) {
      const idHash = hashId(visualId);
      const point = getPointForSlot(slot);
      const local = slot % CARDS_PER_POINT;
      const ringIndex = Math.floor(local / RING_SLOTS);
      const ringSlot = local % RING_SLOTS;
      const ring = ORBIT_RINGS[ringIndex] || ORBIT_RINGS[0];
      const centerZ = -point * POINT_GAP;
      const yawStep = (Math.PI * 2) / ring.count;
      // jitter 收紧到 ±4°（原 ±6.9°）→ 配合 ring 14 slot 让最大横版卡完全不重叠
      const yawJitter = (seeded(idHash + 31) - 0.5) * 0.14;
      const theta = ringSlot * yawStep + ringIndex * 0.31 + point * 0.23 + yawJitter;
      const pitch = ring.pitch + (seeded(idHash + 32) - 0.5) * 0.16;
      const radius = ring.radius * HEALING_SPREAD + (seeded(idHash + 33) - 0.5) * 1.1;
      const horizontal = Math.cos(pitch) * radius;
      const x = Math.sin(theta) * horizontal * 1.12;
      const y = Math.sin(pitch) * radius * 0.94;
      const z = centerZ - Math.cos(theta) * horizontal;
      const localOffset = new THREE.Vector3(x, y, z);
      const lookTarget = new THREE.Vector3(x * 0.10, y * 0.10, centerZ);

      const shape = getRecordShape(record);
      const dim = SHAPE_DIM[shape] || SHAPE_DIM['text'];
      const isPortrait = dim.h > dim.w;
      const warmthScale = 0.92 + Math.min(5, Math.max(1, warmth)) * 0.032;
      const anchorScale = ringSlot % 6 === 0 ? 1.18 : 0.92;
      const sizeMul = ring.scale * anchorScale * warmthScale * (0.92 + seeded(idHash + 17) * 0.15);
      const w = CARD_SIZE * sizeMul * dim.w;
      const h = CARD_SIZE * sizeMul * dim.h;

      return {
        localOffset,
        lookTarget,
        w, h,
        layer,
        shape,
        isPortrait,
        scale: layer === 1 ? 1.04 : 1,
        rollJitter: (seeded(idHash + 6) - 0.5) * 0.13,
        opacity: 0.94,
        breathSeed: (idHash % 9973) * 0.013
      };
    }

    function recordAspect(index) {
      return [0, 4, 7, 12, 15].includes(index % 18) ? 'portrait' : 'landscape';
    }

    function seeded(n) {
      const x = Math.sin(n * 999.91) * 10000;
      return x - Math.floor(x);
    }

    // 3D 卡片每层色调（取 SCENE_PALETTE.card 衍生，磨砂玻璃风格）
    const CARD_LAYER_PALETTE = [
      { // gentle 温柔
        bg: 'rgba(223, 184, 168, 0.68)',
        highlight: 'rgba(255, 250, 245, 0.42)',
        bottomDim: 'rgba(80, 50, 38, 0.10)',
        border: 'rgba(255, 245, 235, 0.50)',
        text: 'rgb(82, 50, 38)',
        mute: 'rgba(82, 50, 38, 0.55)',
        accent: 'rgba(112, 60, 44, 0.85)',
        accentSolid: '#703c2c'
      },
      { // companion 陪伴
        bg: 'rgba(222, 194, 154, 0.68)',
        highlight: 'rgba(255, 252, 240, 0.42)',
        bottomDim: 'rgba(80, 58, 28, 0.10)',
        border: 'rgba(255, 248, 230, 0.52)',
        text: 'rgb(82, 58, 28)',
        mute: 'rgba(82, 58, 28, 0.55)',
        accent: 'rgba(140, 90, 32, 0.88)',
        accentSolid: '#8c5a20'
      },
      { // inspire 启发
        bg: 'rgba(241, 229, 219, 0.80)',
        highlight: 'rgba(255, 254, 252, 0.48)',
        bottomDim: 'rgba(74, 52, 38, 0.08)',
        border: 'rgba(255, 252, 248, 0.55)',
        text: 'rgb(74, 52, 38)',
        mute: 'rgba(74, 52, 38, 0.55)',
        accent: 'rgba(132, 80, 56, 0.80)',
        accentSolid: '#845038'
      }
    ];
    function getCardPalette(layer) {
      return CARD_LAYER_PALETTE[layer] || CARD_LAYER_PALETTE[0];
    }

    function makeCardCanvas(record, pose) {
      const shape = pose?.shape || getRecordShape(record);
      const dim = SHAPE_DIM[shape] || SHAPE_DIM['text'];
      const aspect = dim.h / dim.w;
      const baseW = CARD_TEXTURE_WIDTH;
      const w = baseW;
      const h = Math.round(baseW * aspect);
      const c = document.createElement('canvas');
      c.width = w;
      c.height = h;
      const ctx = c.getContext('2d');
      const layer = pose?.layer ?? 0;
      const pal = getCardPalette(layer);

      drawGlassBase(ctx, w, h, pal);

      const type = record.type || 'text';
      if (type === 'image' || type === 'video') {
        drawMediaPlaceholder(ctx, w, h, record, pal);
        drawCardMeta(ctx, w, h, record, type, pal);
        if (type === 'video') drawVideoCorner(ctx, w, h, pal);
      } else if (type === 'audio') {
        drawAudioContent(ctx, w, h, record, pal);
      } else {
        drawTextContent(ctx, w, h, record, pal);
      }

      drawGlassEdge(ctx, w, h, pal);
      return c;
    }

    function drawGlassBase(ctx, w, h, pal) {
      // 磨砂玻璃：半透色底 + 顶部高光 + 底部微暗
      ctx.save();
      ctx.beginPath();
      roundRect(ctx, 0, 0, w, h, 18);
      ctx.clip();
      // 底色
      ctx.fillStyle = pal.bg;
      ctx.fillRect(0, 0, w, h);
      // 顶部高光（玻璃反光）
      const hi = ctx.createLinearGradient(0, 0, 0, h * 0.55);
      hi.addColorStop(0, pal.highlight);
      hi.addColorStop(0.35, 'rgba(255, 255, 255, 0.06)');
      hi.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = hi;
      ctx.fillRect(0, 0, w, h * 0.55);
      // 底部微暗（增加立体感）
      const dim = ctx.createLinearGradient(0, h * 0.7, 0, h);
      dim.addColorStop(0, 'rgba(0, 0, 0, 0)');
      dim.addColorStop(1, pal.bottomDim);
      ctx.fillStyle = dim;
      ctx.fillRect(0, h * 0.7, w, h * 0.3);
      ctx.restore();
    }

    function drawGlassEdge(ctx, w, h, pal) {
      ctx.save();
      ctx.strokeStyle = pal.border;
      ctx.lineWidth = 1.8;
      roundRect(ctx, 0.9, 0.9, w - 1.8, h - 1.8, 18);
      ctx.stroke();
      ctx.restore();
    }

    function drawMediaPlaceholder(ctx, w, h, record, pal) {
      const dx = 24, dy = 24;
      const dw = w - 48;
      const dh = h - 130;
      ctx.save();
      ctx.beginPath();
      roundRect(ctx, dx, dy, dw, dh, 10);
      ctx.clip();
      const g = ctx.createLinearGradient(dx, dy, dx + dw, dy + dh);
      g.addColorStop(0, 'rgba(255, 232, 200, 0.42)');
      g.addColorStop(1, 'rgba(180, 140, 110, 0.38)');
      ctx.fillStyle = g;
      ctx.fillRect(dx, dy, dw, dh);
      ctx.fillStyle = pal.mute;
      ctx.font = '300 56px "PingFang SC", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(record.type === 'video' ? '▶' : '◯', dx + dw / 2, dy + dh / 2);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.restore();
    }

    function drawAudioContent(ctx, w, h, record, pal) {
      // 音频卡：上半 = 播放按钮 + 波形 / 下半 = 标题 + AUDIO·时长
      const padding = 36;
      // 播放按钮（左上，圆形 accent 色）
      const btnR = 36;
      const btnX = padding + btnR;
      const btnY = padding + btnR + 6;
      ctx.save();
      ctx.fillStyle = pal.accent;
      ctx.beginPath();
      ctx.arc(btnX, btnY, btnR, 0, Math.PI * 2);
      ctx.fill();
      // 播放三角（在按钮中央）
      ctx.fillStyle = '#fff8ee';
      ctx.beginPath();
      ctx.moveTo(btnX - 9, btnY - 12);
      ctx.lineTo(btnX + 13, btnY);
      ctx.lineTo(btnX - 9, btnY + 12);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // 波形（按钮右边，跟按钮 vertically 对齐）
      const waveStartX = btnX + btnR + 18;
      const waveEndX = w - padding;
      const waveCenterY = btnY;
      const bars = 14;
      const spacing = (waveEndX - waveStartX) / bars;
      const seed = (record.id ? record.id.length : 7) + Number(record.warmth || 3);
      ctx.save();
      for (let i = 0; i < bars; i++) {
        const phase = (i + seed) * 0.62;
        const amp = Math.sin(phase) * 0.55 + Math.sin(phase * 1.6) * 0.30 + Math.sin(phase * 0.73) * 0.32;
        const barH = 14 + Math.abs(amp) * 42;
        const x = waveStartX + i * spacing;
        ctx.fillStyle = pal.accent;
        ctx.globalAlpha = 0.62;
        ctx.beginPath();
        roundRect(ctx, x, waveCenterY - barH / 2, Math.max(4, spacing - 6), barH, 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      ctx.restore();

      // 音频名（下半左对齐）
      ctx.save();
      ctx.fillStyle = pal.text;
      ctx.font = '400 44px "PingFang SC", -apple-system, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      const title = (record.title || record.text || '语音记录').trim();
      const titleLine = title.length > 12 ? title.slice(0, 11) + '…' : title;
      ctx.fillText(titleLine, padding, h - 78);
      // AUDIO + 时长（左右两端对齐）
      ctx.fillStyle = pal.mute;
      ctx.font = '300 26px "SF Mono", "Menlo", monospace';
      ctx.fillText('AUDIO', padding, h - 32);
      if (record.duration) {
        const durText = formatDuration(record.duration);
        ctx.textAlign = 'right';
        ctx.fillText(durText, w - padding, h - 32);
        ctx.textAlign = 'left';
      }
      ctx.restore();
    }

    function drawTextContent(ctx, w, h, record, pal) {
      // 文字卡 v4：跟 reader 弹窗版式一致 — 顶部小日期（SF Mono 左对齐）+ 大正文（左对齐从日期下方排）
      // canvas 1024 宽对 reader 460 宽，scale ≈ 2.23
      // reader：padding 32 / date 13px / body 16px → canvas：padding ~64 / date ~30px / body ~46px
      ctx.save();
      const padX = 72;
      const padTop = 96;

      // 顶部日期：SF Mono 左对齐，跟弹窗 reader-date 同字体同格式
      ctx.fillStyle = pal.mute;
      ctx.font = '500 32px "SF Mono", "Menlo", monospace';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      const dateText = record.date || '';
      ctx.fillText(dateText, padX, padTop);

      // 正文：PingFang 左对齐，从日期下方起，跟弹窗 readerText 同字体
      ctx.fillStyle = pal.text;
      ctx.font = '400 50px "PingFang SC", -apple-system, sans-serif';
      ctx.textBaseline = 'alphabetic';
      const body = (record.text || record.title || '').trim();
      const lines = wrapTextLines(ctx, body, w - padX * 2, 9);
      const lineH = 80; // 行距 ≈ 1.6 → 跟弹窗 line-height 1.85 视觉接近
      const bodyStartY = padTop + 76; // 日期下方留 76px 呼吸
      lines.forEach((line, i) => {
        ctx.fillText(line, padX, bodyStartY + i * lineH);
      });

      ctx.restore();
    }

    function drawCardMeta(ctx, w, h, record, type, pal) {
      // 图卡/视频卡底部的标题 + meta（覆盖在 photo 渐变上）
      ctx.save();
      ctx.fillStyle = pal.text;
      ctx.font = '400 46px "PingFang SC", -apple-system, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      const title = (record.title || record.text || '').trim();
      const titleLine = title.length > 14 ? title.slice(0, 13) + '…' : title;
      ctx.fillText(titleLine, 32, h - 64);

      let metaText = type.toUpperCase();
      if (type === 'audio' && record.duration) {
        metaText = `AUDIO · ${formatDuration(record.duration)}`;
      }
      ctx.fillStyle = pal.mute;
      ctx.font = '300 24px "SF Mono", "Menlo", monospace';
      ctx.fillText(metaText, 32, h - 28);
      ctx.restore();
    }

    function drawVideoCorner(ctx, w, h, pal) {
      const cx = w - 48, cy = h - 146;
      ctx.save();
      // 用 accent 色画播放按钮（跟音频卡风格统一）
      ctx.fillStyle = pal.accent;
      ctx.beginPath();
      ctx.arc(cx, cy, 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff8ee';
      ctx.beginPath();
      ctx.moveTo(cx - 6, cy - 8);
      ctx.lineTo(cx + 9, cy);
      ctx.lineTo(cx - 6, cy + 8);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawCoverImage(ctx, source, dx, dy, dw, dh) {
      const sw = source.videoWidth || source.naturalWidth || source.width;
      const sh = source.videoHeight || source.naturalHeight || source.height;
      if (!sw || !sh) return;
      const destRatio = dw / dh;
      const srcRatio = sw / sh;
      let sx, sy, ssw, ssh;
      if (srcRatio > destRatio) {
        ssh = sh;
        ssw = sh * destRatio;
        sx = (sw - ssw) / 2;
        sy = 0;
      } else {
        ssw = sw;
        ssh = sw / destRatio;
        sx = 0;
        sy = (sh - ssh) / 2;
      }
      ctx.save();
      ctx.beginPath();
      roundRect(ctx, dx, dy, dw, dh, 6);
      ctx.clip();
      ctx.drawImage(source, sx, sy, ssw, ssh, dx, dy, dw, dh);
      ctx.restore();
    }

    function formatDuration(seconds) {
      const total = Math.max(0, Math.round(Number(seconds) || 0));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function wrapTextLines(ctx, text, maxWidth, maxLines) {
      const chars = [...String(text)];
      const lines = [];
      let line = '';
      for (const ch of chars) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = ch;
          if (lines.length >= maxLines) break;
        } else {
          line = test;
        }
      }
      if (line && lines.length < maxLines) lines.push(line);
      return lines;
    }

    function decorateMediaMesh(mesh, record) {
      if (!record.src) return;
      const key = mediaCacheKey(record);
      const cached = mediaThumbnailCache.get(key);
      if (cached) {
        redrawMeshWithSource(mesh, record, cached);
        return;
      }
      const waiting = mediaThumbnailInflight.get(key);
      if (waiting) {
        waiting.push({ mesh, record });
        return;
      }
      mediaThumbnailInflight.set(key, [{ mesh, record }]);
      const finish = (source) => {
        if (!source) {
          mediaThumbnailInflight.delete(key);
          return;
        }
        mediaThumbnailCache.set(key, source);
        const waiters = mediaThumbnailInflight.get(key) || [];
        mediaThumbnailInflight.delete(key);
        waiters.forEach(item => redrawMeshWithSource(item.mesh, item.record, source));
      };
      if (record.type === 'video') {
        const video = document.createElement('video');
        // blob: URL 不需要 crossOrigin；http(s) 远程才需要
        if (!record.src.startsWith('blob:')) video.crossOrigin = 'anonymous';
        video.muted = true;
        video.playsInline = true;
        video.preload = 'auto';
        let drawn = false;
        const tryDraw = () => {
          if (drawn) return;
          // 视频维度准备好才能 drawImage
          if (!video.videoWidth || !video.videoHeight) return;
          drawn = true;
          finish(captureMediaFrame(video));
          try {
            video.pause();
            video.removeAttribute('src');
            video.load();
          } catch {}
        };
        video.addEventListener('loadeddata', () => {
          try {
            video.currentTime = Math.min(0.6, (video.duration || 1) / 4);
          } catch {
            tryDraw();
          }
        }, { once: true });
        video.addEventListener('seeked', tryDraw, { once: true });
        // 兜底：3 秒还没 seeked 就用当前帧
        setTimeout(tryDraw, 3000);
        video.addEventListener('error', () => {
          finish(null);
          try {
            video.removeAttribute('src');
            video.load();
          } catch {}
        }, { once: true });
        video.src = record.src;
        video.load();
        return;
      }
      const img = new Image();
      img.onload = () => finish(captureMediaFrame(img));
      img.onerror = () => finish(null);
      img.src = record.src;
    }

    function mediaCacheKey(record) {
      if (!record?.src || (record.type !== 'image' && record.type !== 'video')) return '';
      return `${record.id}|${record.type}|${record.fileName || ''}|${mediaSignature(record.src)}`;
    }

    function mediaSignature(src) {
      if (!src) return '';
      const s = String(src);
      if (s.startsWith('blob:')) return s;
      return `${s.length}:${s.slice(0, 32)}:${s.slice(-32)}`;
    }

    function pruneMediaThumbnailCache(visualItems) {
      const active = new Set();
      visualItems.forEach(item => {
        const key = mediaCacheKey(item.record);
        if (key) active.add(key);
      });
      mediaThumbnailCache.forEach((_, key) => {
        if (!active.has(key)) mediaThumbnailCache.delete(key);
      });
    }

    function captureMediaFrame(source) {
      const sw = source.videoWidth || source.naturalWidth || source.width;
      const sh = source.videoHeight || source.naturalHeight || source.height;
      if (!sw || !sh) return null;
      const maxSide = 720;
      const scale = Math.min(1, maxSide / Math.max(sw, sh));
      const c = document.createElement('canvas');
      c.width = Math.max(1, Math.round(sw * scale));
      c.height = Math.max(1, Math.round(sh * scale));
      const ctx = c.getContext('2d');
      try {
        ctx.drawImage(source, 0, 0, c.width, c.height);
      } catch {
        return null;
      }
      return c;
    }

    function redrawMeshWithSource(mesh, record, source) {
      if (!mesh || mesh.userData.disposed) return;
      const map = mesh.material.map;
      const canvas = map?.image;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      const layer = mesh.userData.base?.layer ?? 0;
      const pal = getCardPalette(layer);
      ctx.clearRect(0, 0, w, h);
      drawGlassBase(ctx, w, h, pal);
      drawCoverImage(ctx, source, 24, 24, w - 48, h - 130);
      drawCardMeta(ctx, w, h, record, record.type || 'image', pal);
      if (record.type === 'video') drawVideoCorner(ctx, w, h, pal);
      drawGlassEdge(ctx, w, h, pal);
      map.needsUpdate = true;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const chars = [...String(text)];
      let line = '';
      let lines = 0;
      for (const ch of chars) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line, x, y + lines * lineHeight);
          line = ch;
          lines++;
          if (lines >= maxLines) return;
        } else {
          line = test;
        }
      }
      if (line && lines < maxLines) ctx.fillText(line, x, y + lines * lineHeight);
    }

    function bindEvents() {
      window.addEventListener('resize', resize);
      canvas.addEventListener('pointerdown', onPointerDown);
      canvas.addEventListener('pointermove', onPointerMove);
      canvas.addEventListener('pointerup', onPointerUp);
      canvas.addEventListener('pointerleave', onPointerUp);
      canvas.addEventListener('click', onClick);
      canvas.addEventListener('wheel', onWheel, { passive: false });
      // composer 由 ms-composer.js 接管，按钮直接调 MS.composer.open()
      const openMS = () => { if (window.MS?.composer?.open) MS.composer.open(); };
      document.getElementById('addBtn')?.addEventListener('click', openMS);
      document.getElementById('emptyAdd')?.addEventListener('click', openMS);
      document.getElementById('closeReader').addEventListener('click', closeReader);
      overlay.addEventListener('click', () => { closeReader(); });
      window.addEventListener('keydown', event => {
        if (event.key === 'Escape') { closeReader(); }
        if (event.code === 'Space' || event.key === ' ') {
          const tag = document.activeElement?.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA') return;
          if (isComposerOpen() || reader.classList.contains('open')) return;
          event.preventDefault();
          resetView();
        }
        if (event.key === 'ArrowDown' || event.key === 'ArrowUp') {
          const tag = document.activeElement?.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA') return;
          if (isComposerOpen() || reader.classList.contains('open')) return;
          event.preventDefault();
          if (event.key === 'ArrowUp') deepen();
          else surface();
        }
      });
    }

    function resize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      // Retina(dpr=2) 全分辨率 = 渲染像素 ×4，治愈磨砂玻璃风格不需要 razor-sharp，
      // cap 到 1.5 省约 40% GPU，视觉几乎看不出差
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }

    function onPointerDown(event) {
      dragging = true;
      dragStart = { x: event.clientX, y: event.clientY, yaw: targetYaw, pitch: targetPitch, time: performance.now() };
      lastPointer = { x: event.clientX, y: event.clientY, time: performance.now() };
      velocityYaw = 0;
      velocityPitch = 0;
      canvas.setPointerCapture(event.pointerId);
      hud.classList.add('soft');
    }

    function onPointerMove(event) {
      updatePointer(event);
      if (dragging) {
        const now = performance.now();
        const dx = event.clientX - (lastPointer?.x ?? event.clientX);
        const dy = event.clientY - (lastPointer?.y ?? event.clientY);
        const dt = Math.max(1, now - (lastPointer?.time ?? now));
        const yawPerPx = (Math.PI * 1.4) / window.innerWidth;
        const pitchPerPx = (Math.PI * 0.9) / window.innerHeight;
        targetYaw -= dx * yawPerPx;
        targetPitch = clampPitch(targetPitch - dy * pitchPerPx);
        velocityYaw = -dx * yawPerPx / dt * 16;
        velocityPitch = -dy * pitchPerPx / dt * 16;
        lastPointer = { x: event.clientX, y: event.clientY, time: now };
      }
    }

    function onPointerUp(event) {
      dragging = false;
      try { canvas.releasePointerCapture(event.pointerId); } catch {}
    }

    function onWheel(event) {
      // 触控板/滚轮：控制场景视野（推近/拉远），不再切层（切层走上下方向键）
      event.preventDefault();
      // 双指捏合在 macOS 触控板上会带 ctrlKey；普通滚动不带
      const speed = event.ctrlKey ? 0.06 : 0.02;
      targetFov = Math.max(FOV_MIN, Math.min(FOV_MAX, targetFov + event.deltaY * speed));
      hud.classList.add('soft');
    }

    function updatePointer(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function onClick(event) {
      if (dragStart && Math.abs(event.clientX - dragStart.x) + Math.abs(event.clientY - dragStart.y) > 8) return;
      updatePointer(event);
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(currentLayerCards, false);
      const hit = hits.find(item => item.object.visible && !item.object.userData.spawning);
      if (hit) openReader(hit.object.userData.record.id);
    }

    // 渲染节流：场景闲置时降到 ~30fps，popup 打开时几乎完全停（让出 CPU/GPU 给视频解码 + backdrop-filter）
    let _frameTick = 0;
    let _lastPointerX = -1, _lastPointerY = -1;
    function animate() {
      requestAnimationFrame(animate);
      _frameTick++;
      const t = performance.now() * 0.001;

      // composer 打开：背景被 backdrop-filter blur(22) 全屏糊了，停一帧画面用户也看不出
      //   → 完全停渲染（return），省整个 WebGL pipeline 的 GPU 开销
      // reader 打开：弹窗只占中间 460×575，屏幕边缘 3D 场景还能看到 → 走 30fps（每 2 帧 1 帧）
      if (isComposerOpen()) {
        return;
      }
      const readerOpen = reader.classList.contains('open');
      if (readerOpen && (_frameTick & 1)) {
        return;
      }
      const popupOpen = readerOpen;

      // 检测"是否有运动" — 没有就直接 return 跳过本帧
      const camMoving =
        dragging ||
        Math.abs(velocityYaw) > 0.0002 ||
        Math.abs(velocityPitch) > 0.0002 ||
        Math.abs(targetYaw - yaw) > 0.001 ||
        Math.abs(targetPitch - pitch) > 0.001 ||
        Math.abs(targetForward - forward) > 0.05 ||
        Math.abs(-forward - camera.position.z) > 0.05 ||
        Math.abs(camera.fov - targetFov) > 0.05;
      const sceneMoving = isLayerAnimating || spawningCount > 0;
      const pointerMoved = pointer.x !== _lastPointerX || pointer.y !== _lastPointerY;

      // 闲置：每 2 帧渲染一次，节省 50% GPU
      if (!camMoving && !sceneMoving && !pointerMoved && !popupOpen && (_frameTick & 1)) {
        return;
      }
      _lastPointerX = pointer.x;
      _lastPointerY = pointer.y;

      if (!dragging && (Math.abs(velocityYaw) > 0.0002 || Math.abs(velocityPitch) > 0.0002)) {
        targetYaw += velocityYaw;
        targetPitch = clampPitch(targetPitch + velocityPitch);
        velocityYaw *= 0.93;
        velocityPitch *= 0.93;
      }
      yaw += (targetYaw - yaw) * 0.10;
      pitch += (targetPitch - pitch) * 0.10;
      forward += (targetForward - forward) * 0.085;
      camera.position.x += (0 - camera.position.x) * 0.08;
      camera.position.y += (0 - camera.position.y) * 0.08;
      camera.position.z += (-forward - camera.position.z) * 0.08;
      camera.rotation.order = 'YXZ';
      camera.rotation.y = yaw;
      camera.rotation.x = pitch;
      camera.rotation.z = 0;
      if (Math.abs(camera.fov - targetFov) > 0.05) {
        camera.fov += (targetFov - camera.fov) * 0.12;
        camera.updateProjectionMatrix();
      }
      cardGroup.position.x = Math.sin(t * 0.08) * 0.06;
      cardGroup.position.y = Math.sin(t * 0.06) * 0.05;
      particleGroup.position.z += (-forward * 0.18 - particleGroup.position.z) * 0.05;
      if (bgGroup) {
        bgGroup.children.forEach((mesh, index) => {
          if (!mesh.visible) return;
          mesh.position.copy(camera.position);
          mesh.rotation.y = t * (0.003 + index * 0.0015);
        });
        scene.fog.color.lerp(SCENE_FOG_COLORS[currentLayer], 0.035);
      }
      updateHoverScale();
      renderer.render(scene, camera);
      canvas.dataset.rendered = '1';
    }

    function updateHoverScale() {
      // raycast 每 3 帧一次：人眼感知不到 hover 延迟，节省 2/3 raycast 成本
      if ((_frameTick % 3) === 0) {
        // 只 raycast 当前层的可见卡片（隐藏层的卡片不参与命中）
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects(currentLayerCards, false);
        const nextHover = hits.find(item => item.object.visible && !item.object.userData.spawning)?.object || null;
        if (nextHover !== hoverMesh) {
          if (hoverMesh && !hoverMesh.userData.spawning) hoverMesh.userData.targetScale = hoverMesh.userData.base.scale || 1;
          hoverMesh = nextHover;
          if (hoverMesh) hoverMesh.userData.targetScale = (hoverMesh.userData.base.scale || 1) * 1.08;
        }
        document.body.style.cursor = hoverMesh ? 'pointer' : 'default';
      }
      // 呼吸动画：只跑当前层卡片，隐藏层完全跳过
      const now = performance.now();
      currentLayerCards.forEach(mesh => {
        if (mesh.userData.spawning) {
          mesh.lookAt(camera.position);
          return;
        }
        if (!mesh.visible) return;
        mesh.userData.currentScale += (mesh.userData.targetScale - mesh.userData.currentScale) * 0.12;
        mesh.scale.setScalar(mesh.userData.currentScale);
        const baseEuler = mesh.userData.baseEuler;
        const seed = mesh.userData.base.breathSeed || 0;
        mesh.rotation.x = baseEuler.x + Math.sin(now * 0.00028 + seed) * 0.006;
        mesh.rotation.z = baseEuler.z + Math.sin(now * 0.00024 + seed * 0.71) * 0.005;
      });
    }

    // composer 由 ms-composer.js 接管：图/视频/音频/文 任意组合，无标题，200 字上限，层 3 选 1
    let _editingId = null;

    function revokeRecordMedia(record) {
      if (record?.src && record.src.startsWith('blob:')) {
        try { URL.revokeObjectURL(record.src); } catch {}
      }
    }

    // 删除一条记录时，把它的「真文件」媒体挪进回收站 + 清掉对应的 blob 缓存。
    // 注意：水合时 record.src 已被换成 blob: URL，原始 fsa 引用留在 record._fsaSrc。
    async function trashRecordMedia(record) {
      if (!record) return;
      const fsaRef = record._fsaSrc;
      if (typeof fsaRef === 'string' && fsaRef.startsWith('fsa:')) {
        try { await MS.mediaVault.trash(fsaRef, { planetKey: 'healing' }); }
        catch (err) { console.warn('[healing] trash 真文件失败：', fsaRef, err); }
        // 缓存里那条 blob 释放掉 + 从 cache 删，避免悬挂引用
        const cachedBlob = mediaUrlCache.get(fsaRef);
        if (cachedBlob) {
          try { URL.revokeObjectURL(cachedBlob); } catch {}
          mediaUrlCache.delete(fsaRef);
        }
      }
    }

    function stopMediaIn(container) {
      if (!container) return;
      container.querySelectorAll('video, audio').forEach(el => {
        try {
          el.pause();
          el.currentTime = 0;
          el.removeAttribute('src');
          el.load();
        } catch {}
      });
    }

    // 旧入口兼容：dev tools (?openComposer=1, ?autoSeq=1) 还可能调到 openComposer / addMemory
    function openComposer(prefill) {
      if (prefill && prefill.id) {
        const userRecs = records.filter(r => !r.id.startsWith('demo-'));
        const idx = userRecs.findIndex(r => r.id === prefill.id);
        if (idx >= 0 && window.MS?.composer?.open) { MS.composer.open(idx); return; }
      }
      if (window.MS?.composer?.open) MS.composer.open();
    }
    function closeComposer() {
      if (window.MS?.composer?.close) MS.composer.close();
    }
    async function addMemory() { /* no-op：ms-composer 的 onSaved 接管保存逻辑 */ }

    // 父 App 列表点 +/编辑 → 弹本星 composer（idx 直接给 ms-composer）
    window.__msOpenComposer = function(editIdx) {
      if (!window.MS?.composer?.open) return;
      if (typeof editIdx !== 'number' || editIdx < 0) {
        MS.composer.open();
      } else {
        MS.composer.open(editIdx);
      }
    };

    // 父 App 列表数据变了（删除等）→ 重新 load + 重建 3D 卡片
    window.__msReloadAll = function() {
      healingSyncFile(); // 父级删除/编辑后同步 records.json（STORE-006）
      loadHydratedRecords().then(hydrated => {
        records = hydrated;
        if (typeof buildCards === 'function') buildCards();
        if (typeof applyLayerVisibility === 'function') applyLayerVisibility(currentLayer, true);
      }).catch(err => {
        console.warn('[healing] __msReloadAll failed:', err);
      });
    };

    const READER_SHAPES = ['shape-text', 'shape-audio', 'shape-image-h', 'shape-image-v', 'shape-video-h', 'shape-video-v'];
    function setReaderShape(record) {
      READER_SHAPES.forEach(c => reader.classList.remove(c));
      if (!record) { reader.classList.add('shape-text'); return; }
      // audio 永远是 1:1，无论有没有 src
      if (record.type === 'audio') {
        reader.classList.add('shape-audio');
        return;
      }
      // text 或 image/video 但没有 src（demo）→ 文本形状
      if (record.type === 'text' || !record.src) {
        reader.classList.add('shape-text');
        return;
      }
      // image / video：直接复用 getRecordShape — 它已经处理了 record.aspect / aspectCache / 异步测量
      // 同一张图打开过一次后 record.aspect 已写回，再次打开走 record.aspect 直出，绝不闪
      // 首次打开如果还没测过，getRecordShape 内部会触发异步测量并 buildCards，下次就好
      const shape = getRecordShape(record);
      reader.classList.add('shape-' + shape);
      // 备用：万一 getRecordShape 当前返回 image-h（fallback），等 measureAspect 完成后切真实形状
      if (record.src && (shape === 'image-h' || shape === 'video-h') && record.aspect !== 'h') {
        measureAspect(record).then(asp => {
          if (!asp || !reader.classList.contains('open')) return;
          const finalShape = `${record.type}-${asp}`;
          if (!reader.classList.contains('shape-' + finalShape)) {
            READER_SHAPES.forEach(c => reader.classList.remove(c));
            reader.classList.add('shape-' + finalShape);
          }
        });
      }
    }

    let _readerCurrentId = null;
    let _readerFromMeshId = null; // 记下从哪张卡片打开，关闭时返回那张卡片
    // 任务 3：把 cardMesh 的世界坐标投影到屏幕 px → 转化为相对屏幕中心的偏移
    // 返回 {dx, dy}，给 GSAP 当起点 / 终点
    function getReaderOffsetFromMesh(mesh) {
      if (!mesh) return { dx: 0, dy: 0 };
      const v = new THREE.Vector3();
      mesh.getWorldPosition(v);
      v.project(camera);
      const cardX = (v.x * 0.5 + 0.5) * window.innerWidth;
      const cardY = (-v.y * 0.5 + 0.5) * window.innerHeight;
      return { dx: cardX - window.innerWidth / 2, dy: cardY - window.innerHeight / 2 };
    }

    function openReader(id) {
      const record = records.find(item => item.id === id);
      if (!record) return;
      // 算 cardMesh 屏幕位置 → GSAP 起点偏移
      const mesh = cardMeshes.find(m => m.userData?.record?.id === id);
      const { dx, dy } = getReaderOffsetFromMesh(mesh);
      _readerCurrentId = id;
      _readerFromMeshId = id;
      setReaderShape(record);
      document.getElementById('readerDate').textContent = record.date || '';
      document.getElementById('readerMedia').innerHTML = mediaHtml(record);
      document.getElementById('readerText').textContent = record.text || '';
      // 立刻加 .open（启用 backdrop-filter + pointer-events:auto）
      reader.classList.add('open');
      overlay.classList.add('on');
      // GSAP：layout 永远 460×可变高，只 translate + opacity → 字体永远清晰
      // back.out(1.2) 轻 overshoot + 0.55s，从卡片位置弹到屏幕中央
      gsap.killTweensOf(reader);
      gsap.fromTo(reader,
        { xPercent: -50, yPercent: -50, x: dx, y: dy, opacity: 0 },
        { xPercent: -50, yPercent: -50, x: 0, y: 0, opacity: 1, duration: 0.55, ease: 'back.out(1.2)' }
      );
      // 挂统一编辑/删除按钮
      if (window.MS && MS.bindEdit) {
        MS.bindEdit({
          container: reader,
          getId: () => _readerCurrentId,
          label: '再写一笔',
          onEdit: (rid) => {
            const r = records.find(x => x.id === rid);
            if (!r) return;
            closeReader();
            openComposer(r);
          },
        });
      }
      if (window.MS && MS.bindDelete) {
        MS.bindDelete({
          container: reader,
          getId: () => _readerCurrentId,
          question: '熄灭这道微光？',
          yes: '熄灭',
          onDelete: (rid) => {
            const removed = records.find(r => r.id === rid);
            if (!removed) return;
            // 真文件媒体挪进回收站（无盘 / 非 fsa 时是 no-op）；不阻塞后续 UI 更新
            trashRecordMedia(removed);
            revokeRecordMedia(removed);
            { const s = window.MS && window.MS.mediaStore; if (s && s.trashRecord) { try { s.trashRecord('healing', removed); } catch (_) {} } } // 整条进回收站（STORE-006d）
            records = records.filter(r => r.id !== rid);
            saveRecords();
            closeReader();
            document.querySelectorAll('.ms-confirm-backdrop.show').forEach(el => el.classList.remove('show'));
            const goneMeshes = cardMeshes.filter(m => m.userData?.record?.id === rid);
            goneMeshes.forEach(m => {
              m.visible = false;
              if (m.material) m.material.opacity = 0;
              m.userData.disposed = true;
            });
            currentLayerCards = currentLayerCards.filter(m => m.userData?.record?.id !== rid);
            if (window.msToast) window.msToast('已熄灭');
            requestAnimationFrame(() => requestAnimationFrame(() => buildCards()));
          },
        });
      }
    }

    function closeReader() {
      stopMediaIn(reader); // 立刻停掉视频/音频播放，不让它在后台继续出声
      const mediaWrap = document.getElementById('readerMedia');
      if (mediaWrap) mediaWrap.innerHTML = ''; // 彻底释放，避免下次打开还残留
      // 算返回目标：飞回来源卡片的当前屏幕位置
      const mesh = cardMeshes.find(m => m.userData?.record?.id === _readerFromMeshId);
      const { dx, dy } = getReaderOffsetFromMesh(mesh);
      gsap.killTweensOf(reader);
      // 立刻删 .open + .on：让 animate() 的 popupOpen 判断瞬间变 false，场景恢复正常帧率
      // （不删的话 5fps 渲染会持续到动画结束 0.47s，删除/编辑时新 buildCards 看起来卡死）
      reader.classList.remove('open');
      overlay.classList.remove('on');
      gsap.to(reader, {
        xPercent: -50, yPercent: -50, x: dx, y: dy, opacity: 0,
        duration: 0.47, ease: 'back.in(1.2)',
        onComplete: () => {
          READER_SHAPES.forEach(c => reader.classList.remove(c));
          gsap.set(reader, { clearProps: 'transform,opacity' });
        }
      });
      _readerFromMeshId = null;
    }

    // 父 App 切页面/星球时强制关 reader：ms-list-bridge 只 remove .open class，
    // 不清 GSAP 设的 inline transform/opacity → reader 还视觉残留。这里补清掉。
    window.addEventListener('message', (e) => {
      if (e?.data?.type === 'memory-sparks:close-popups') {
        try {
          gsap.killTweensOf(reader);
          gsap.set(reader, { clearProps: 'transform,opacity' });
          READER_SHAPES.forEach(c => reader.classList.remove(c));
          _readerFromMeshId = null;
          _readerCurrentId = null;
          stopMediaIn(reader);
          const mediaWrap = document.getElementById('readerMedia');
          if (mediaWrap) mediaWrap.innerHTML = '';
        } catch (_) {}
      }
      // 父 App 把 U 盘目录句柄传进来（可能晚于首屏到达）：存进保险箱后，
      // 重新水合一遍把 fsa 引用的图换成 blob: 补显示出来。
      if (e?.data?.type === 'memory-sparks:fsa-handle') {
        try {
          MS.mediaVault.setDirHandle(e.data.dirHandle || null);
          healingRestoreFile().then(() => loadHydratedRecords()).then(hydrated => {
            records = hydrated;
            if (typeof buildCards === 'function') buildCards();
          }).catch(err => console.warn('[healing] 收到句柄后恢复/水合失败：', err));
        } catch (err) {
          console.warn('[healing] 处理 fsa-handle 失败：', err);
        }
      }
    });

    function mediaHtml(record) {
      if (record.src && record.type === 'image') return `<img src="${record.src}" alt="">`;
      if (record.src && record.type === 'video') return `<video src="${record.src}" controls playsinline></video>`;
      if (record.src && record.type === 'audio') return `<audio src="${record.src}" controls style="width:78%; margin:96px 11%;"></audio>`;
      return '';
    }

    // 小文件用 base64（可持久化到 localStorage）；大文件回退到 object URL（本次会话有效，刷新即失）
    const DATAURL_LIMIT = 1.4 * 1024 * 1024; // 1.4MB
    function readFileAsDataUrl(file) {
      return new Promise(resolve => {
        if (!file) return resolve({ url: '', persistent: false });
        if (file.size > DATAURL_LIMIT) {
          const url = URL.createObjectURL(file);
          resolve({ url, persistent: false });
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve({ url: reader.result, persistent: true });
        reader.onerror = () => resolve({ url: '', persistent: false });
        reader.readAsDataURL(file);
      });
    }

    function formatToday() {
      const now = new Date();
      return `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;
    }

    // ── ms-composer 接入：图/视频/音频/文 任意组合，无标题，200 字上限，层 3 选 1 ──
    function initHealingComposer() {
      if (!window.MS || !MS.composer || !MS.composer.init) { setTimeout(initHealingComposer, 60); return; }
      const layerNames = ['温柔', '陪伴', '启发'];
      const layerToWarmth = [3, 4, 5];
      MS.composer.init({
        planet: 'healing',
        storageKey: STORAGE_KEY,
        capabilities: { image: true, video: true, audio: true },
        textareaPlaceholder: '这一刻，是什么让你又好起来了……',
        textareaMaxLength: 200,
        extraHTML: `
          <div class="msc-tier-row">
            <span class="msc-extra-label">放到哪一层</span>
            <div class="msc-tier-buttons" data-msc-tier="healing-layer">
              ${layerNames.map((n, i) => `<button type="button" data-layer="${i}"${i===0?' class="on"':''}>${n}</button>`).join('')}
            </div>
          </div>
        `,
        extraInit(extraEl, editingRec) {
          const grp = extraEl.querySelector('[data-msc-tier="healing-layer"]');
          if (!grp) return;
          let layer = 0;
          if (editingRec) {
            layer = Number.isInteger(editingRec.layer) ? editingRec.layer
                  : (editingRec.warmth >= 5 ? 2 : editingRec.warmth >= 4 ? 1 : 0);
          } else {
            layer = currentLayer || 0;
          }
          grp.querySelectorAll('button[data-layer]').forEach(b => {
            b.classList.toggle('on', Number(b.dataset.layer) === layer);
            b.addEventListener('click', () => {
              grp.querySelectorAll('button[data-layer]').forEach(x => x.classList.remove('on'));
              b.classList.add('on');
            });
          });
        },
        extraGet(extraEl) {
          const grp = extraEl.querySelector('[data-msc-tier="healing-layer"]');
          const active = grp?.querySelector('button[data-layer].on');
          return { layer: active ? Number(active.dataset.layer) : 0 };
        },
        onOpened(editingIdx) {
          // 之前用 stage.style.display='none' 省 GPU —— 错了：composer 的 .msc-backdrop
          // 半透 + blur(22) 透着背后 3D 场景做虚化，stage 不在 → 看到 body 黑底
          // 现在不动 stage，让虚化背景正常显示。animate() 已经把 composer 打开时锁到
          // 5fps，CPU/GPU 已经够省了
          // 额外省点：composer 期间把 fab 呼吸暂停（持续 box-shadow 动画的合成开销）
          document.body.classList.add('healing-composer-open');
        },
        onClosed() {
          document.body.classList.remove('healing-composer-open');
        },
        async beforeDelete(removedRecord) {
          // 共用 ms-composer 删除入口（V2 列表里编辑删除）：把真文件挪进回收站。
          // 这里的 removedRecord 来自 localStorage 原始数据，媒体字段就是 'fsa:引用'（未水合），
          // 直接逐个字段 trash + 清缓存。无盘 / base64 时各 trash 调用都是 no-op。
          if (!removedRecord || !MS.mediaVault) return;
          const refs = new Set();
          for (const f of ['src', 'image', 'video', 'audio']) {
            const v = removedRecord[f];
            if (typeof v === 'string' && v.startsWith('fsa:')) refs.add(v);
          }
          if (Array.isArray(removedRecord.images)) {
            removedRecord.images.forEach(x => {
              if (typeof x === 'string' && x.startsWith('fsa:')) refs.add(x);
            });
          }
          for (const ref of refs) {
            try { await MS.mediaVault.trash(ref, { planetKey: 'healing' }); }
            catch (err) { console.warn('[healing] beforeDelete trash 失败：', ref, err); }
            const cachedBlob = mediaUrlCache.get(ref);
            if (cachedBlob) {
              try { URL.revokeObjectURL(cachedBlob); } catch {}
              mediaUrlCache.delete(ref);
            }
          }
        },
        async beforeSave(payload, editingIdx) {
          // ms-composer 给的字段：text/image/video/audio/audioName/type/date
          // 治愈卡片渲染要的字段：title/text/type ('text'|'image'|'video'|'audio')/src/fileName/layer/warmth/date
          const layer = Number.isInteger(payload.layer) ? payload.layer : 0;
          let type = 'text', src = '', fileName = '';
          if (payload.audio) { type = 'audio'; src = payload.audio; fileName = payload.audioName || ''; }
          else if (payload.video) { type = 'video'; src = payload.video; }
          else if (payload.image) { type = 'image'; src = payload.image; }
          else if (payload.images && payload.images[0]) { type = 'image'; src = payload.images[0]; }

          // ── 媒体走真文件存储 ──────────────────────────────
          // 默认 src = base64 兜底；有 U 盘句柄时把媒体写成真文件，src 换成 'fsa:相对路径'。
          // 无 U 盘（hasFileBackend()=false）时 put 直接返回原 base64 → 行为同现在。
          // 画质优化：图片若用户本次新选了图（payload.imageFiles[0] 是原 File），有盘时用原 File
          // 落盘 → 真文件保存原画质、不压缩。视频/音频，以及编辑没重选图的图片，仍用 src（现状）。
          let mediaRef = src;
          if (src && type !== 'text' && MS.mediaVault && MS.mediaVault.hasFileBackend()) {
            const hasNewImageFile = type === 'image' && payload.imageFiles && payload.imageFiles[0];
            const source = hasNewImageFile ? payload.imageFiles[0] : src;
            try {
              mediaRef = await MS.mediaVault.put({
                planetKey: 'healing',
                id: payload.id,
                kind: type,          // 'image' | 'video' | 'audio'
                dateStr: payload.date || formatToday(),
                source,              // 原 File（新选图）或 base64 src（视频/音频/没重选图）
              });
              // 防御：原图落盘理论上不返回空；万一返回空，退回 base64 src 兜底，绝不丢媒体
              if (!mediaRef) mediaRef = src;
            } catch (err) {
              console.warn('[healing] mediaVault.put 失败，保留 base64：', err);
              mediaRef = src;
            }
          }

          const wroteFile = typeof mediaRef === 'string' && mediaRef.startsWith('fsa:');
          const patched = {
            ...payload,
            title: payload.title || '', // 砍标题
            type,
            src: mediaRef,
            fileName,
            layer,
            warmth: layerToWarmth[layer] ?? 3,
            date: payload.date || formatToday(),
          };
          // 关键清理：imageFiles 是临时的原 File 数组，不可 JSON 化，绝不能进 localStorage。
          delete patched.imageFiles;

          if (wroteFile) {
            // 真写了文件：把对应 kind 的媒体字段也设成引用，其它媒体字段清空，
            // 避免大 base64 仍被 ms-composer 写进 localStorage（视频尤其会撑爆）。
            patched.image = type === 'image' ? mediaRef : '';
            patched.images = type === 'image' ? [mediaRef] : [];
            patched.video = type === 'video' ? mediaRef : '';
            patched.audio = type === 'audio' ? mediaRef : '';
          }
          // mediaRef 还是 base64（无盘兜底）→ 保持 payload 原有 image/images/video/audio 不动

          return patched;
        },
        async onSaved(savedRecord, editingIdx) {
          // ms-composer 已写 storage；治愈内存 records 跟着对齐 + 3D 重建
          const isNew = editingIdx == null;
          const layer = savedRecord.layer ?? 0;
          // 1) 保存前同步测一下图片/视频横竖比例，写回 record，避免出来后再"先横后竖"闪一下
          if ((savedRecord.type === 'image' || savedRecord.type === 'video') && savedRecord.src && !savedRecord.aspect) {
            try {
              // src 可能是 'fsa:引用'（真文件）→ 先 resolve 成 blob: 再测；base64 原样
              const measureSrc = await resolveRef(savedRecord.src);
              const asp = await measureAspect({ type: savedRecord.type, src: measureSrc });
              if (asp) {
                savedRecord.aspect = asp;
                aspectCache.set(savedRecord.id, asp);
                // 同步写回 storage 里那条 record
                try {
                  const arr = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                  const idxInStorage = arr.findIndex(r => r.id === savedRecord.id);
                  if (idxInStorage >= 0) {
                    arr[idxInStorage] = { ...arr[idxInStorage], aspect: asp };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
                  }
                } catch {}
              }
            } catch {}
          }
          if (isNew) {
            // 跨层：先切层再 buildCards + flyIn
            if (layer !== currentLayer && typeof goToLayer === 'function') {
              await goToLayer(layer);
            }
            records = await loadHydratedRecords();
            buildCards(savedRecord.id);
            if (typeof flyInNewCard === 'function') flyInNewCard(savedRecord.id);
          } else {
            records = await loadHydratedRecords();
            buildCards(savedRecord.id);
          }
          if (typeof hud !== 'undefined' && hud) hud.classList.add('soft');
          healingSyncFile(); // 录入主路径建库：storage 已最终态（含 aspect）（STORE-006）
        },
      });
    }
    initHealingComposer();

    // P3 性能：延迟 800ms 启动 WebGL，给父 App 转场动画让出 GPU 资源
    setTimeout(init, 800);
    })().catch(error => {
      console.error(error);
      document.getElementById('fallback')?.classList.add('on');
    });
  </script>

<script>
  // ── Memory Sparks · 统一组件挂载（介绍卡 + 添加按钮） ──
  // 在 DOM ready 后挂载，避免被原有 init 顺序覆盖
  (function bootMSShared() {
    // 治愈 .hud 已隐藏，由 ms-intro-card 替代左上角介绍
    function go() {
      if (window.MS && window.MS.bootstrap) {
        MS.bootstrap('healing');
      } else setTimeout(go, 60);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', go);
    else go();
  })();
</script>
</body>
