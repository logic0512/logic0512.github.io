<script>
// Visibility pause: 父页面切 tab 时停掉本 iframe 的 RAF/setInterval，避免后台烧 CPU
(function(){
  let _raf = window.requestAnimationFrame.bind(window);
  let _caf = window.cancelAnimationFrame.bind(window);
  let _setInt = window.setInterval.bind(window);
  let _clrInt = window.clearInterval.bind(window);
  let active = true;
  let pendingRafs = [];      // {cb, id}
  let liveIntervals = new Map();
  let nextId = 1;
  window.requestAnimationFrame = function(cb){
    if (active) return _raf(cb);
    const id = nextId++;
    pendingRafs.push({cb, id});
    return id;
  };
  window.cancelAnimationFrame = function(id){
    pendingRafs = pendingRafs.filter(x => x.id !== id);
    return _caf(id);
  };
  window.setInterval = function(cb, ms){
    const id = _setInt(function(){ if (active) cb(); }, ms);
    liveIntervals.set(id, true);
    return id;
  };
  window.clearInterval = function(id){
    liveIntervals.delete(id);
    return _clrInt(id);
  };
  window.addEventListener("message", function(e){
    if (!e.data || e.data.type !== "memory-sparks:visibility") return;
    const wasActive = active;
    active = !!e.data.visible;
    if (!wasActive && active && pendingRafs.length){
      const q = pendingRafs; pendingRafs = [];
      q.forEach(({cb}) => _raf(cb));
    }
  });
})();
</script>

function pointInPoly(px, pz, poly) {
  let inside = false;
  for (let i=0,j=poly.length-1; i<poly.length; j=i++) {
    const xi=poly[i].x,zi=poly[i].z,xj=poly[j].x,zj=poly[j].z;
    if (((zi>pz)!==(zj>pz)) && px<((xj-xi)*(pz-zi)/(zj-zi)+xi)) inside=!inside;
  }
  return inside;
}
function polyArea(poly) {
  let a=0;
  for (let i=0,j=poly.length-1;i<poly.length;j=i++) a+=poly[j].x*poly[i].z-poly[i].x*poly[j].z;
  return Math.abs(a)/2;
}
const ZONE_AREAS = SOIL_ZONES.map(polyArea);
const ZONE_TOTAL = ZONE_AREAS.reduce((s,a)=>s+a,0);
function randomZone() {
  let r=Math.random()*ZONE_TOTAL;
  for (let i=0;i<SOIL_ZONES.length;i++) { r-=ZONE_AREAS[i]; if (r<=0) return SOIL_ZONES[i]; }
  return SOIL_ZONES[SOIL_ZONES.length-1];
}
const FENCE = 7.0;
const PROBE_DIRS = [[1,0],[-1,0],[0,1],[0,-1],[0.707,0.707],[-0.707,0.707],[0.707,-0.707],[-0.707,-0.707]];
function randomPoint(minDist, existing, modelRadius=0) {
  for (let t=0; t<600; t++) {
    const zone = randomZone(); // 按面积加权：大区多花、小区少花
    const xs=zone.map(p=>p.x), zs=zone.map(p=>p.z);
    const px = Math.min(...xs)+Math.random()*(Math.max(...xs)-Math.min(...xs));
    const pz = Math.min(...zs)+Math.random()*(Math.max(...zs)-Math.min(...zs));
    if (!pointInPoly(px,pz,zone)) continue;
    if (Math.abs(px)>FENCE || Math.abs(pz)>FENCE) continue;
    if (modelRadius>0) {
      const edgeOk = PROBE_DIRS.every(([dx,dz]) =>
        SOIL_ZONES.some(z => pointInPoly(px+dx*modelRadius, pz+dz*modelRadius, z))
      );
      if (!edgeOk) continue;
    }
    if (minDist>0 && existing.some(e=>Math.hypot(e.x-px,e.z-pz)<minDist)) continue;
    return { x:px, z:pz };
  }
  return null;
}

const templates = {};

async function loadModels() {
  const total = FLOWERS.length + 1;
  let loaded = 0;

  // 先加载花园模型（确定地面高度后才能摆花）
  await new Promise((res, rej) => {
    loader.load('garden-terrain.glb', gltf => {
      const g = gltf.scene;
      // 缩放到 14 单位宽，与 SOIL_ZONES 坐标系一致
      g.updateMatrixWorld(true);
      const box0 = new THREE.Box3().setFromObject(g);
      const size0 = box0.getSize(new THREE.Vector3());
      const ctr0  = box0.getCenter(new THREE.Vector3());
      const sc = 14 / Math.max(size0.x, size0.z);
      g.scale.setScalar(sc * gardenScaleMult);
      g.position.set(-ctr0.x * sc, -box0.min.y * sc, -ctr0.z * sc);
      // 消除 Tripo 地形材质的高光反射；花模型材质不受影响。
      g.traverse(child => {
        if (!child.isMesh) return;
        child.renderOrder = 0;
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(m => {
          m.envMap = null;
          m.envMapIntensity = 0;
          if (m.roughness  !== undefined) m.roughness  = 1;
          if (m.roughnessMap !== undefined) m.roughnessMap = null;
          if (m.metalness  !== undefined) m.metalness  = 0;
          if (m.metalnessMap !== undefined) m.metalnessMap = null;
          if ('clearcoat'  in m) m.clearcoat  = 0;
          if ('clearcoatMap' in m) m.clearcoatMap = null;
          if ('clearcoatRoughness' in m) m.clearcoatRoughness = 1;
          if ('clearcoatRoughnessMap' in m) m.clearcoatRoughnessMap = null;
          if ('transmission' in m) m.transmission = 0;
          if ('transmissionMap' in m) m.transmissionMap = null;
          if ('specularIntensity' in m) m.specularIntensity = 0;
          if ('specularIntensityMap' in m) m.specularIntensityMap = null;
          if ('sheen'      in m) m.sheen      = 0;
          if ('sheenRoughness' in m) m.sheenRoughness = 1;
          if ('reflectivity' in m) m.reflectivity = 0;
          m.needsUpdate = true;
        });
      });
      scene.add(g);
      g.updateWorldMatrix(true, true);
      // 向下射线探测地面真实高度
      const surfRay = new THREE.Raycaster();
      surfRay.set(new THREE.Vector3(0, 500, 0), new THREE.Vector3(0, -1, 0));
      const surfHits = surfRay.intersectObject(g, true);
      gardenSurfaceY = surfHits.length ? surfHits[0].point.y : 0;
      groundPlane.constant = -gardenSurfaceY;
      loaded++;
      document.getElementById('ld-bar').style.width = `${loaded / total * 100}%`;
      document.getElementById('ld-msg').textContent = `加载中 ${loaded}/${total}…`;
      // 花园加载完，立即渲染一帧并隐藏遮罩，让用户先看到场景
      needsRender = true;
      const ov = document.getElementById('loading');
      if (ov) {
        ov.style.opacity = '0';
        setTimeout(() => ov.style.display = 'none', 450);
      }
      res();
    }, undefined, e => { console.warn('garden-terrain.glb failed, using flat ground', e); res(); });
  });

  // P4 懒加载：第一个花种立即加载（让用户最快能用），其他 7 个后台异步加载
  function loadFlowerModel(fl) {
    return new Promise((res, rej) => {
      loader.load(fl.file, gltf => {
        const root = gltf.scene;
        root.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(root);
        const cx  = (box.min.x + box.max.x) / 2;
        const cz  = (box.min.z + box.max.z) / 2;
        root.position.set(-cx, -box.min.y, -cz);
        const wrapper = new THREE.Group();
        wrapper.add(root);
        wrapper.updateMatrixWorld(true);
        const box2 = new THREE.Box3().setFromObject(wrapper);
        const h     = box2.max.y - box2.min.y;
        const scale = TARGET_H / h;
        const xzRadius = Math.max(box2.max.x - box2.min.x, box2.max.z - box2.min.z) / 2 * scale;
        templates[fl.key] = { root: wrapper, scale, xzRadius };
        loaded++;
        document.getElementById('ld-bar').style.width = `${loaded / total * 100}%`;
        document.getElementById('ld-msg').textContent = loaded < total
          ? `加载中 ${loaded}/${total}…` : '全部就绪';
        res();
      }, undefined, rej);
    });
  }

  // 第一个花立即加载
  await loadFlowerModel(FLOWERS[0]);
  // 原 #plant-btn 已删除（ms-composer 接管）；ms-composer 的保存按钮由 textarea 内容驱动 disabled
  document.getElementById('ld-msg').textContent = '可以开始种了';

  // 其他花种：requestIdleCallback 或 setTimeout 后台串行加载（不阻塞主交互）
  const queue = FLOWERS.slice(1);
  const loadNext = () => {
    if (!queue.length) return;
    const fl = queue.shift();
    loadFlowerModel(fl).then(() => {
      // template 加载完成 → 补建所有"曾因 template 未就绪而 skip"的同花种 record
      try {
        const arr = JSON.parse(localStorage.getItem(KEY) || '[]');
        arr.forEach(r => {
          if (r.flower === fl.key && !clusters.some(c => c.id === r.id)) {
            buildCluster(r, false);
          }
        });
        needsRender = true;
      } catch (_) {}
      // 间隔 150ms 避免连续大请求卡顿
      setTimeout(loadNext, 150);
    }).catch(e => {
      console.warn('lazy load failed', fl.key, e);
      setTimeout(loadNext, 150);
    });
  };
  // 首屏稳定后 1s 开始
  setTimeout(loadNext, 1000);
}

// ── 弹簧动画 ─────────────────────────────────────────────────
const animQ = [];
function spring(t) { return t <= 0 ? 0 : 1 - Math.exp(-5 * t) * Math.cos(8 * t); }

// ── 花丛偏移（黄金螺旋） ──────────────────────────────────────
function clusterOffsets(n) {
  if (n === 1) return [{ dx: 0, dz: 0 }];
  const ga = Math.PI * (3 - Math.sqrt(5));
  return Array.from({ length: n }, (_, i) => ({
    dx: 0.08 * Math.sqrt(i / (n - 1)) * Math.cos(i * ga),
    dz: 0.08 * Math.sqrt(i / (n - 1)) * Math.sin(i * ga),
  }));
}

// ── 花丛管理 ─────────────────────────────────────────────────
const clusters    = [];
const meshCluster = new Map();

// 移除一丛花时，把它的 mesh 从命中表里清掉 —— 否则这张表会一直攥着已删花的引用，
// 导致旧花朵永远无法被回收（长时间反复增删改的内存泄漏根源）。
// 注意：不要 dispose geometry/material —— 它们是同花种所有克隆共享的模板资源，dispose 会搞坏其他同种花。
function forgetClusterMeshes(group) {
  if (!group) return;
  group.traverse(o => { if (o.isMesh) meshCluster.delete(o.uuid); });
}

function buildCluster(rec, animate) {
  const tmpl = templates[rec.flower]; if (!tmpl) return;
  // 种下一朵花那一刻（新种才响，加载已有的不响）→ 一记植物生长音
  if (animate && window.MS_SOUND && MS_SOUND.play) MS_SOUND.play('bloom');
  const group = new THREE.Group();
  group.position.set(rec.x, gardenSurfaceY, rec.z);

  // 株数固定 2-4，重量改为影响个体大小（避免高 weight 产生大量 draw call）
  const plantCount = Math.min(rec.weight + 1, 4);
  const weightScale = 0.82 + rec.weight * 0.07; // weight 1→0.89×, weight 5→1.17×
  clusterOffsets(plantCount).forEach(({ dx, dz }, idx) => {
    const vary  = 0.72 + Math.random() * 0.46;
    const sc    = tmpl.scale * vary * weightScale * flowerScaleMult;
    const plant = tmpl.root.clone(true);
    plant.position.set(dx, 0, dz);
    plant.rotation.y = Math.random() * Math.PI * 2;
    plant.traverse(c => { if (c.isMesh) c.renderOrder = 1; });
    group.add(plant);
    if (animate) {
      animQ.push({ plant, tgtScale: sc, groundY: 0, elapsed: -(idx * 0.14), done: false });
    }
  });

  scene.add(group);
  const c = { ...rec, group };
  clusters.push(c);
  group.traverse(o => { if (o.isMesh) meshCluster.set(o.uuid, c); });
  needsRender = true;
  return c;
}

// ── 持久化 ───────────────────────────────────────────────────
const KEY = 'memory-sparks:flower-records';
// 启动迁移旧 key
(function() {
  try {
    if (!localStorage.getItem(KEY)) {
      const old = localStorage.getItem('flower_garden_v5');
      if (old) localStorage.setItem(KEY, old);
    }
  } catch (_) {}
})();
let saved = [];
try { saved = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (_) {}

// 统一字段：老数据可能缺 date / ts / id —— 一次性补齐并写回。
//   date：全站只用这一种日期存法（不再用 ts 兼作日期）；
//   id：记录唯一标识，编辑/删除都按 id 定位 —— 缺 id 会误伤存档第一条，必须补。
(function migrateRecords() {
  let changed = false;
  saved = saved.map(r => {
    if (!r) return r;
    let next = r;
    if (!next.date) {
      const dt = next.ts ? new Date(next.ts) : new Date();
      const iso = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
      next = { ...next, date: iso }; changed = true;
    }
    if (next.ts == null) { next = { ...next, ts: Date.now() }; changed = true; }
    if (!next.id) { next = { ...next, id: 'f_' + (next.ts || Date.now()) + '_' + Math.random().toString(36).slice(2, 8) }; changed = true; }
    return next;
  });
  if (changed) { try { localStorage.setItem(KEY, JSON.stringify(saved)); } catch (_) {} }
})();

// STORE-008：花园最多同时显示「最新 180 丛」，其余记录仍完整保留在存档 / 日志页，绝不丢。
const DISPLAY_MAX = 180;
function newestForDisplay(all) {
  return [...all].sort((a, b) => (b.ts || 0) - (a.ts || 0)).slice(0, DISPLAY_MAX);
}
// 新种花后若超过上限，移除「最旧的」一丛（仅从画面移除，存档里仍在）
function enforceDisplayCap() {
  if (clusters.length <= DISPLAY_MAX) return;
  const byOld = [...clusters].sort((a, b) => (a.ts || 0) - (b.ts || 0));
  const removeN = clusters.length - DISPLAY_MAX;
  for (let i = 0; i < removeN; i++) {
    const c = byOld[i];
    const idx = clusters.indexOf(c);
    if (idx >= 0) clusters.splice(idx, 1);
    if (c.group) { forgetClusterMeshes(c.group); scene.remove(c.group); }
  }
  needsRender = true;
}

function persist() {
  // STORE-008：花园只显示最新 180 丛，但存档保留全部。
  // persist 只更新「当前在场景里」的花（位置/内容等），未显示的旧记录原样保留 —— 限显示、不丢数据。
  let all = [];
  try { all = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (_) {}
  const live = new Map(clusters.map(({ group, ...rec }) => [rec.id, rec]));
  const merged = all.map(r => (r.id != null && live.has(r.id)) ? live.get(r.id) : r);
  localStorage.setItem(KEY, JSON.stringify(merged));
  updateStats();
}
function loadSaved() { newestForDisplay(saved).forEach(r => buildCluster(r, false)); updateStats(); }
function updateStats() {
  const n = clusters.length;
  const t = clusters.reduce((s, c) => s + c.weight, 0);
  document.getElementById('stats').textContent = n ? `${t} 株花  ·  ${n} 份记忆` : '';
}

// ── 落点（在 SOIL_ZONES 热区内随机取点，与已有花丛保持间距）──
function findSpot(flowerKey) {
  const tmpl = templates[flowerKey];
  // 花丛扩散半径 0.08（来自 clusterOffsets 最大偏移）
  // 玫瑰额外加上模型自身半径；其余花种只校验花丛边缘
  const clusterSpread = 0.08;
  const xzR = (flowerKey === 'rose' && tmpl)
    ? tmpl.xzRadius + clusterSpread
    : clusterSpread;
  // 逐级放宽间距：理想间距找不到就缩小，最低不破"部分重叠下限"，避免把花全堆到中心穿模
  for (const minDist of [1.05, 0.8, 0.6, DRAG_MIN_GAP]) {
    const pt = randomPoint(minDist, clusters, xzR);
    if (pt) return [pt.x, pt.z];
  }
  // 实在满了：土壤区内任取合法点（忽略间距，但绝不固定丢中心）
  const any = randomPoint(0, clusters, xzR) || randomPoint(0, clusters, 0);
  return any ? [any.x, any.z] : [0, 0];
}

// ── 拖动间距约束：允许部分重叠，禁止把花完全叠在同一点 ──
// 中心间距 < DRAG_MIN_GAP 视为"叠在一起"，拖动时会被挡住（花停在上一个有效位置）。
// 数值越大越不许靠近；想让重叠更明显就调小。auto 落点用 1.05（基本不重叠），这里用更小值放行部分重叠。
const DRAG_MIN_GAP = 0.45;
function tooCloseToOthers(x, z, selfCluster) {
  return clusters.some(c => c !== selfCluster &&
    Math.hypot(c.x - x, c.z - z) < DRAG_MIN_GAP);
}

// ── 射线检测 ─────────────────────────────────────────────────
const rc = new THREE.Raycaster(), ndc = new THREE.Vector2();
function setNDC(e) {
  ndc.set(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
}
function hitCluster(e) {
  setNDC(e); rc.setFromCamera(ndc, camera);
  const meshes = [];
  clusters.forEach(c => c.group.traverse(o => { if (o.isMesh) meshes.push(o); }));
  const hits = rc.intersectObjects(meshes, false);
  return hits.length ? meshCluster.get(hits[0].object.uuid) || null : null;
}
// 复用同一个向量：拖拽 pointermove 高频调用，避免每次 new THREE.Vector3 产生 GC 压力
// （调用方立即读取 x/z，不留存引用，复用安全）
const _groundVec = new THREE.Vector3();
function groundPt(e) {
  setNDC(e); rc.setFromCamera(ndc, camera);
  rc.ray.intersectPlane(groundPlane, _groundVec);
  return _groundVec;
}

// ── 拖拽 / 点击 ───────────────────────────────────────────────
let drag = null;
canvas.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  const c = hitCluster(e); if (!c) return;
  controls.enabled = false;
  drag = { cluster: c, sx: e.clientX, sy: e.clientY, moved: false };
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!drag) return;
  if (!drag.moved && Math.hypot(e.clientX - drag.sx, e.clientY - drag.sy) > 5) drag.moved = true;
  if (drag.moved) {
    const pt = groundPt(e);
    // 只在热区内移动 + 不准叠到别的花头上（部分重叠 OK，完全重合不行）；不满足则花停在上一个有效位置
    if (pt && Math.abs(pt.x) <= FENCE && Math.abs(pt.z) <= FENCE &&
        SOIL_ZONES.some(z => pointInPoly(pt.x, pt.z, z)) &&
        !tooCloseToOthers(pt.x, pt.z, drag.cluster)) {
      drag.cluster.x = pt.x; drag.cluster.z = pt.z;
      drag.cluster.group.position.set(pt.x, gardenSurfaceY, pt.z);
      needsRender = true;
    }
  }
});
canvas.addEventListener('pointerup', e => {
  if (!drag) return;
  if (!drag.moved) openPopup(drag.cluster); else persist();
  drag = null; controls.enabled = true;
});

// ── 弹层 ─────────────────────────────────────────────────────
let _popupCurrent = null;
function openPopup(c) {
  _popupCurrent = c;
  const fl = FLOWER_MAP[c.flower] || {};
  document.getElementById('popup-title').textContent   = fl.name || c.flower;
  document.getElementById('popup-body').textContent    = c.content || c.text || '';
  // 日期手动拆 YYYY-MM-DD 显示 —— 不走 new Date(字符串)，避免某些浏览器按 UTC 解析导致差一天
  const dm = /^(\d{4})-(\d{2})-(\d{2})/.exec(c.date || '');
  document.getElementById('popup-date').textContent    = dm
    ? `${dm[1]}年${+dm[2]}月${+dm[3]}日` : '';
  // 花种线稿水印（与列表卡片一致）
  const decoImg = document.getElementById('popup-deco-img');
  if (decoImg) {
    if (FLOWER_MAP[c.flower]) { decoImg.src = `/flower-lineart/${c.flower}.png`; decoImg.parentElement.style.display = ''; }
    else { decoImg.removeAttribute('src'); decoImg.parentElement.style.display = 'none'; }
  }
  const popupEl = document.getElementById('popup');
  popupEl.classList.add('visible');
  document.getElementById('backdrop').classList.add('on');
  // 统一编辑按钮
  if (window.MS && MS.bindEdit) {
    MS.bindEdit({
      container: popupEl,
      getId: () => _popupCurrent?.id || _popupCurrent?.ts,
      label: '修剪',
      onEdit: (rid) => {
        closePopup();
        // 按 id 在 localStorage 记录里定位 —— 不能用 clusters 序号：
        // 新增花时 ms-composer 把新记录塞到存档最前，clusters 却把新花放最后，两者顺序不一致，
        // 用 clusters 序号会编辑到另一朵花。统一按存档真实顺序找索引。
        try {
          const recs = JSON.parse(localStorage.getItem(KEY) || '[]');
          const idx = recs.findIndex(r => (r.id || r.ts) === rid);
          if (idx >= 0 && window.MS && MS.composer) MS.composer.open(idx);
        } catch (_) {}
      },
    });
  }
  // 统一删除按钮
  if (window.MS && MS.bindDelete) {
    MS.bindDelete({
      container: popupEl,
      getId: () => _popupCurrent?.id || _popupCurrent?.ts,
      question: '让这朵花凋谢？',
      yes: '凋谢',
      onDelete: (rid) => {
        const idx = clusters.findIndex(x => (x.id || x.ts) === rid);
        if (idx >= 0) {
          const c = clusters[idx];
          // 移除整个 group（含 mesh + 装饰元素）而不是只删 mesh —— 之前删 mesh 不彻底花没消失
          if (c.group) { forgetClusterMeshes(c.group); scene.remove(c.group); }
          else if (c.mesh && c.mesh.parent) c.mesh.parent.remove(c.mesh);
          clusters.splice(idx, 1);
          needsRender = true;
        }
        // STORE-008：从全量存档按 id 精准删除（不能靠 persist 从场景反推，否则未显示的旧记录会被漏删）
        try {
          const all = JSON.parse(localStorage.getItem(KEY) || '[]').filter(r => (r.id || r.ts) !== rid);
          localStorage.setItem(KEY, JSON.stringify(all));
        } catch (_) {}
        updateStats();
        closePopup();
      },
    });
  }
}
function closePopup() {
  document.getElementById('popup').classList.remove('visible');
  document.getElementById('backdrop').classList.remove('on');
}
document.getElementById('popup-close').addEventListener('click', closePopup);

// ── Composer ─────────────────────────────────────────────────
let selWeight = 1;  // 情感重量已下线，固定 1（驱动花朵尺寸）

// 录入界面：交给 ms-composer 统一渲染
function _bootFlowerComposer() {
  if (!window.MS || !MS.composer) { setTimeout(_bootFlowerComposer, 60); return; }
  const flowerBtnsHTML = FLOWERS.map((fl, i) => `
    <button type="button" data-flower="${fl.key}"${i === 0 ? ' class="on"' : ''}>
      <span>${fl.name}</span>
      <span class="emotion">${fl.emotion}</span>
    </button>
  `).join('');
  const extraHTML = `
    <div>
      <span class="msc-extra-label">这是什么花</span>
      <div class="msc-flower-grid" data-msc-extra="flower-grid">${flowerBtnsHTML}</div>
    </div>
  `;
  MS.composer.init({
    planet: 'flower',
    storageKey: KEY,
    capabilities: { image: false, video: false, audio: false },
    textareaPlaceholder: '想要保留的这束花是什么故事……',
    textareaMaxLength: 100,
    extraHTML,
    extraInit: (extraEl, editingRec) => {
      const cur = editingRec?.flower && FLOWER_MAP[editingRec.flower] ? editingRec.flower : FLOWERS[0].key;
      extraEl.querySelectorAll('[data-flower]').forEach(b => {
        b.classList.toggle('on', b.dataset.flower === cur);
        b.addEventListener('click', () => {
          extraEl.querySelectorAll('[data-flower]').forEach(x => x.classList.remove('on'));
          b.classList.add('on');
        });
      });
    },
    extraGet: (extraEl) => {
      const active = extraEl.querySelector('[data-flower].on');
      return { flower: active ? active.dataset.flower : FLOWERS[0].key };
    },
    beforeSave: (payload, editingIdx) => {
      // 新建：补 x/z/ts（编辑模式 ms-composer spread 保留原值）
      if (editingIdx == null) {
        try {
          const [x, z] = findSpot(payload.flower || FLOWERS[0].key);
          payload.x = x; payload.z = z; payload.ts = Date.now();
        } catch (_) {}
      }
      // 路 A 统一 text，但花星交互页/list 仍读 content 兼容
      if (payload.text) payload.content = payload.text;
      // weight 已下线，固定 1
      if (typeof payload.weight !== 'number') payload.weight = selWeight;
      return payload;
    },
    onOpened: () => { document.body.classList.add('flower-composer-open'); },
    onClosed: () => { document.body.classList.remove('flower-composer-open'); },
    onSaved: (payload, editingIdx) => {
      // 只处理 1 朵花的差异（不调 __msReloadAll 清场重建——会让 50 朵花全部重建导致卡顿）
      try {
        if (editingIdx == null) {
          // 新建：直接 buildCluster 单朵
          buildCluster(payload, true);
          enforceDisplayCap(); // STORE-008：超过 180 丛时移出最旧的（仅画面，存档仍在）
        } else {
          // 编辑：找到原 cluster，移除旧 group，buildCluster 新参数（位置/id 沿用原值）
          const idx = clusters.findIndex(c => c.id === payload.id);
          if (idx >= 0) {
            const orig = clusters[idx];
            if (orig.group) { forgetClusterMeshes(orig.group); scene.remove(orig.group); }
            else if (orig.mesh && orig.mesh.parent) orig.mesh.parent.remove(orig.mesh);
            clusters.splice(idx, 1);
            // 用原花的坐标/ts 打底 + payload 的新花种/内容覆盖：
            // payload 编辑时不带 x/z（坐标只在新种花时生成），直接用会丢位置。
            buildCluster({ ...orig, ...payload }, true);
          } else {
            // 兜底（找不到对应 cluster）：单朵 buildCluster
            buildCluster(payload, true);
          }
        }
        needsRender = true;
      } catch (e) { console.warn('[flower] onSaved failed:', e); }
      flowerSyncFile(); // 录入主路径建库（STORE-006）
    },
  });
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', _bootFlowerComposer);
else _bootFlowerComposer();

// 父 App 列表删除/编辑后同步：清场 + 重读 + 重种（C4）

// ── Resize（canvas 全屏，场景铺满整个背景）───────────────────
function onResize() {
  const W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);

// ── 按需渲染循环（场景静止时不烧 GPU）─────────────────────────
let prev = performance.now();
let needsRender = true;
const requestRender = () => { needsRender = true; };

controls.addEventListener('change', requestRender);
window.addEventListener('resize', requestRender);

(function tick() {
  requestAnimationFrame(tick);
  const now = performance.now(), dt = Math.min((now - prev) * 0.001, 0.05);
  prev = now;

  // 动画推进 → 触发渲染
  let anyActive = false;
  for (const a of animQ) {
    if (a.done) continue;
    anyActive = true;
    a.elapsed += dt; if (a.elapsed < 0) continue;
    const r = spring(a.elapsed);
    a.plant.scale.setScalar(Math.max(a.tgtScale * Math.min(r, 1.05), 0.001));
    a.plant.position.y = a.groundY * Math.min(r, 1);
    if (a.elapsed > 2.5) { a.plant.scale.setScalar(a.tgtScale); a.plant.position.y = a.groundY; a.done = true; }
  }
  if (anyActive) needsRender = true;
  else if (animQ.length) animQ.length = 0;  // 动画全部结束 → 清空队列，静止时不再每帧空遍历

  // OrbitControls damping 期间持续触发
  if (controls.update()) needsRender = true;

  if (needsRender) {
    renderer.clear();
    renderer.render(scene, camera);
    needsRender = false;
  }
})();

/* ── 卡片入场动画（标题逐字浮现） ── */
function animateCardEntrance() {
  if (typeof gsap === 'undefined') return;
  const card = document.querySelector('.intro-card');
  if (!card) return;

  const nameEl  = card.querySelector('.p-name, h1');
  const eyebrow = card.querySelector('.p-eyebrow, .eyebrow');
  const story   = card.querySelector('.p-story, .story');
  const orb     = card.querySelector('.planet-orb');
  const hint    = card.querySelector('.hint-row');

  let chars = [];
  if (nameEl) {
    const text = nameEl.textContent;
    nameEl.innerHTML = '';
    for (const ch of text) {
      const span = document.createElement('span');
      span.textContent = ch;
      span.style.display = 'inline-block';
      nameEl.appendChild(span);
      chars.push(span);
    }
  }

  if (orb)     gsap.set(orb,     { autoAlpha: 0, scale: 0.88 });
  if (eyebrow) gsap.set(eyebrow, { autoAlpha: 0, y: -4 });
  if (chars.length) gsap.set(chars, { autoAlpha: 0, y: 14, filter: 'blur(8px)' });
  if (story)   gsap.set(story,   { autoAlpha: 0, y: 6 });
  if (hint)    gsap.set(hint,    { autoAlpha: 0 });

  const tl = gsap.timeline({ delay: 0.25 });
  if (orb)     tl.to(orb, { autoAlpha: 1, scale: 1, duration: 1.0, ease: 'power2.out' });
  if (eyebrow) tl.to(eyebrow, { autoAlpha: 0.45, y: 0, duration: 0.5, ease: 'power2.out' }, '-=0.55');
  if (chars.length) tl.to(chars, {
    autoAlpha: 1, y: 0, filter: 'blur(0px)',
    duration: 0.6, ease: 'power2.out', stagger: 0.06
  }, '-=0.30');
  if (story)   tl.to(story, { autoAlpha: 0.72, y: 0, duration: 0.7, ease: 'power2.out' }, '-=0.35');
  if (hint)    tl.to(hint,  { autoAlpha: 0.52, duration: 0.4, ease: 'power2.out' }, '-=0.45');
}
// B4.1：旧 .intro-card 已被 ms-mount 隐藏（用 ms-intro-card 替代），
// 这里调用 animateCardEntrance 在 display:none 元素上无效但占 RAF —— 去掉避免抖动叠加

loadModels().then(() => {
  // 不再 seedDemoGarden；空状态留给用户
  if (saved.length) loadSaved();
}).catch(showErr);

} catch(e) { showErr(e); }
</script>

<script>
  // ── Memory Sparks · 统一组件挂载（介绍卡 + 添加按钮） ──
  // 在 DOM ready 后挂载，避免被原有 init 顺序覆盖
  (function bootMSShared() {
    // onAdd 直接打开录入面板（ms-composer）——不再依赖"点击隐藏旧按钮"的脆弱链路
    function go() {
      if (window.MS && window.MS.bootstrap) {
        MS.bootstrap('flower', { onAdd: () => { if (window.MS && MS.composer) MS.composer.open(); } });
      } else setTimeout(go, 60);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', go);
    else go();
  })();
</script>
